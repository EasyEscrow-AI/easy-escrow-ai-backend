  # ── Institution Escrow ─────────────────────────────────────────────────

  /api/v1/institution-escrow:
    post:
      tags:
        - Institution Escrow
      summary: Create escrow
      description: |
        Create a new USDC escrow between a payer and recipient wallet.

        The escrow is created in `CREATED` status. The payer must then send USDC to the
        escrow address and call the deposit endpoint with the transaction signature.

        **Compliance checks** are performed automatically based on the corridor configuration,
        allowlist status, and daily/monthly limits.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstitutionEscrowCreateRequest'
            example:
              payerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              recipientWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              amount: 50000
              corridor: "SG-CH"
              conditionType: "ADMIN_RELEASE"
              expiryHours: 72
              settlementAuthority: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
      responses:
        '201':
          description: Escrow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Compliance check failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    get:
      tags:
        - Institution Escrow
      summary: List escrows
      description: |
        List escrows for the authenticated institution with optional filters and pagination.

        By default returns escrows where the institution is the **payer** or the **recipient**.
        Use the `role` query param to filter by relationship.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [payer, recipient, all]
            default: all
          description: Filter by institution's role — payer (created by), recipient (received), or all (both)
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, CREATED, FUNDED, COMPLIANCE_HOLD, RELEASING, RELEASED, INSUFFICIENT_FUNDS, COMPLETE, CANCELLING, CANCELLED, EXPIRED, FAILED]
          description: Filter by escrow status
        - in: query
          name: corridor
          schema:
            type: string
            pattern: '^[A-Z]{2}-[A-Z]{2}$'
          description: Filter by corridor (e.g., SG-CH)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Escrows listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      escrows:
                        type: array
                        items:
                          $ref: '#/components/schemas/InstitutionEscrowDetail'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/institution-escrow/draft:
    post:
      tags:
        - Institution Escrow
      summary: Save escrow as draft
      description: |
        Save an escrow as a draft with partial information. Only `payerWallet` is required;
        all other fields can be filled in later via the update draft endpoint.

        Drafts are created in `DRAFT` status. No compliance checks, nonce assignment, or
        expiry timers are set. The draft can be updated multiple times before submission.

        Use `POST /api/v1/institution-escrow/{id}/submit` to validate and submit the draft.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstitutionEscrowDraftRequest'
            example:
              payerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              amount: 50000
              corridor: "SG-CH"
      responses:
        '201':
          description: Draft saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/institution-escrow/{id}/draft:
    put:
      tags:
        - Institution Escrow
      summary: Update draft
      description: |
        Update fields on a `DRAFT` escrow. Only escrows in `DRAFT` status can be updated.
        All fields are optional — only provided fields will be changed.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstitutionEscrowDraftUpdateRequest'
            example:
              recipientWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              amount: 75000
              conditionType: "ADMIN_RELEASE"
      responses:
        '200':
          description: Draft updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/institution-escrow/{id}/submit:
    post:
      tags:
        - Institution Escrow
      summary: Submit draft
      description: |
        Submit a `DRAFT` escrow for processing. Validates that all required fields are present
        (`recipientWallet`, `amount > 0`, `corridor`, `conditionType`), runs compliance checks,
        assigns a durable nonce, and transitions the escrow to `CREATED` (or `COMPLIANCE_HOLD`).

        After submission, the escrow follows the normal lifecycle: deposit → release → complete.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID (UUID)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expiryHours:
                  type: integer
                  minimum: 1
                  maximum: 2160
                  description: Escrow expiry in hours (default 72)
                  example: 72
      responses:
        '200':
          description: Draft submitted and escrow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Missing required fields or invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Compliance check failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/institution-escrow/{id}:
    get:
      tags:
        - Institution Escrow
      summary: Get escrow details
      description: Retrieve full details for a specific escrow.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID
      responses:
        '200':
          description: Escrow details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied - escrow belongs to another client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/institution-escrow/{id}/deposit:
    post:
      tags:
        - Institution Escrow
      summary: Record deposit
      description: |
        Record an on-chain USDC deposit for an escrow. The payer sends USDC to the escrow
        address independently, then calls this endpoint with the transaction signature.

        The API verifies the transaction on-chain and updates the escrow status to `FUNDED`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - txSignature
              properties:
                txSignature:
                  type: string
                  description: Solana transaction signature (base58)
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
      responses:
        '200':
          description: Deposit recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Escrow has expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/institution-escrow/{id}/fulfill:
    post:
      tags:
        - Institution Escrow
      summary: Submit proof of delivery
      description: |
        Transitions escrow from FUNDED → PENDING_RELEASE after proof of delivery is submitted.
        Optionally pass a `fileId` to link a specific uploaded file; otherwise the most
        recent file attached to this escrow is used. Requires at least one document attached.

        If the escrow's `releaseMode` is `ai`, an AI release check is triggered automatically
        (results recorded in the audit log). Release still requires an explicit `/release` call.

        **Rate Limited**: 30 requests per minute.
      security:
        - InstitutionBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Escrow ID (UUID) or escrow code (EE-XXX-XXX)
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fileId:
                  type: string
                  format: uuid
                  description: ID of an uploaded file to use as proof document. If omitted, the most recent file on this escrow is used.
                notes:
                  type: string
                  maxLength: 500
                  description: Optional notes about the proof submission
            example:
              fileId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              notes: "Bill of lading attached"
      responses:
        '200':
          description: Proof submitted, escrow moved to PENDING_RELEASE
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid state transition, no documents attached, or file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escrow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/institution-escrow/{id}/notify-recipient:
    post:
      tags:
        - Institution Escrow
      summary: Notify recipient to upload proof
      description: |
        Send a notification to the counterparty (recipient) asking them to upload
        proof of delivery for this escrow. The recipient must have a registered
        institution account linked to the escrow's recipient wallet.

        Only escrows in `FUNDED` status can trigger recipient notifications.

        **Rate Limited**: 30 requests per minute.
      security:
        - InstitutionBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Escrow ID (UUID) or escrow code (EE-XXX-XXX)
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 1000
                  description: Optional message to include in the notification
            example:
              message: "Please upload the signed bill of lading"
      responses:
        '200':
          description: Notification sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      sent:
                        type: boolean
                        example: true
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid state or recipient not registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Escrow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/institution-escrow/{id}/release:
    post:
      tags:
        - Institution Escrow
      summary: Release funds
      description: |
        Release escrowed USDC to the recipient wallet. This endpoint requires **both**
        a valid JWT token and a settlement authority API key (`X-Settlement-Authority-Key` header).

        When `cdp_policy_approval` is included in the escrow's release conditions, the release
        transaction is routed through the CDP (Coinbase Developer Platform) wallet and must pass
        the configured CDP policy validation before funds are transferred. This requires the
        `CDP_ENABLED=true` environment flag; if `cdp_policy_approval` is present on an escrow
        but CDP is disabled, the release request is rejected (there is no fallback to admin signing).

        **Rate Limited**: 10 requests per minute.
      security:
        - BearerAuth: []
          SettlementAuthority: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  maxLength: 500
                  description: Optional release notes
                forceRelease:
                  type: boolean
                  description: Override active payment timelock (logged in audit trail)
                  default: false
            example:
              notes: "Invoice verified, releasing payment"
      responses:
        '200':
          description: Funds released
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing or invalid settlement authority key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/institution-escrow/{id}/cancel:
    post:
      tags:
        - Institution Escrow
      summary: Cancel escrow
      description: |
        Cancel an escrow and initiate a refund of any deposited USDC back to the payer wallet.
        Only escrows in `CREATED` or `FUNDED` status can be cancelled.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Optional cancellation reason
            example:
              reason: "Trade terms changed"
      responses:
        '200':
          description: Escrow cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/institution-escrow/corridors/{code}/threshold-rules:
    get:
      tags:
        - Institution Escrow
      summary: Get corridor threshold rules
      description: |
        Returns active compliance threshold rules for a corridor. Each rule defines an amount-based
        trigger (e.g. Travel Rule at $1,000, EDD at $10,000) with a risk level and regulatory reference.
        The frontend evaluates the payment amount against these rules to display real-time compliance insights.

        **Risk levels:** low, medium, high. Overall amount risk = worst level among all triggered rules.

        **Threshold types:**
        - `gte` — amount >= threshold triggers the rule
        - `range` — amount between threshold_amount and threshold_max
        - `pattern` — special logic (e.g. round_number = multiples of $1,000)
      operationId: getCorridorThresholdRules
      security:
        - InstitutionBearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          description: Corridor code (e.g. "CH-SG", "US-MX")
          schema:
            type: string
            example: CH-SG
      responses:
        '200':
          description: Threshold rules for the corridor
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  corridorCode:
                    type: string
                    example: CH-SG
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        ruleId:
                          type: string
                          enum: [travel_rule, edd, reporting, round_number, structuring, large_transaction]
                        label:
                          type: string
                          example: Travel Rule Active
                        riskLevel:
                          type: string
                          enum: [low, medium, high]
                        thresholdType:
                          type: string
                          enum: [gte, range, pattern]
                        thresholdAmount:
                          type: number
                          nullable: true
                          example: 1000
                        thresholdMax:
                          type: number
                          nullable: true
                          example: null
                        currency:
                          type: string
                          example: USD
                        detailTemplate:
                          type: string
                          example: "FATF Recommendation 16 — originator and beneficiary data must accompany transfers ≥${threshold} on the {corridor} corridor."
                        regulationRef:
                          type: string
                          example: FATF R.16
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: Corridor not found
          content:
            application/json:
              schema:
                $ref: '#/components/responses/NotFound'
        '401':
          description: Not authenticated

