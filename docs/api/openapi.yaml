openapi: 3.0.3
info:
  title: EasyEscrow.ai Atomic Swap API
  version: 1.0.0
  description: |
    Backend API service for EasyEscrow.ai - Non-custodial atomic swap platform for NFTs and SOL on Solana.
    
    ## Supported Swap Types
    
    EasyEscrow.ai currently supports **three types of escrow swaps** on the **Solana blockchain**:
    
    ### 1. NFT <> SOL
    Direct exchange of an NFT for SOL payment.
    - **Seller provides:** NFT (Traditional NFT)
    - **Buyer provides:** SOL
    - **Platform fee:** 1% (100 basis points) - deducted from seller's proceeds
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ### 2. NFT <> NFT (with SOL fee)
    Exchange of two NFTs with a separate SOL fee payment.
    - **Seller provides:** NFT A (Traditional NFT) + 0.0025 SOL (50% of platform fee)
    - **Buyer provides:** NFT B (Traditional NFT) + 0.0025 SOL (50% of platform fee)
    - **Platform fee:** 0.005 SOL total - split 50/50 between seller and buyer
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ### 3. NFT + SOL <> NFT
    Exchange of an NFT plus SOL payment for another NFT.
    - **Seller provides:** NFT A (Traditional NFT) + SOL
    - **Buyer provides:** NFT B (Traditional NFT)
    - **Platform fee:** 1% (100 basis points) - deducted from SOL amount
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ## Blockchain Support
    - ✅ **Solana blockchain** (Devnet, Mainnet)
    - ✅ **Traditional NFTs** (Metaplex standard)
    - ✅ **Compressed NFTs (cNFTs)** (Metaplex Bubblegum)
    - ✅ **Metaplex Core NFTs**
    - 🔜 **Additional blockchains** - Coming soon
    
    ## Bulk Swap Support
    
    Bulk swaps of up to **10 assets per side** are supported. Any combination of NFT type (SPL NFT, Core NFT, cNFT) and SOL. Bulk swap atomicity provided by JITO Solana validator for swaps requiring multiple transactions (3+ total assets).
    
    ### cNFT-Specific Features
    
    - **Direct Bubblegum transfers** - cNFTs transfer directly without escrow custody
    - **Merkle proof handling** - Automatic proof fetching from DAS API
    - **Full canopy tree support** - Eliminates stale proof issues
    - **Rate-limited DAS API** - Built-in rate limiting, batching, and caching
    
    ## Additional Features
    - **Custom expiry times** - Offers can be set to expire between 5 minutes and 24 hours
    - **On-chain non-custodial functionality** - Assets secured by Smart Contract, never held in escrow
    - **Automatic atomic settlement** - Swaps execute atomically when both parties sign the transaction
    - **Automatic offer expiry** - Expired offers are automatically marked as expired
    - **Comprehensive webhook notifications** - Real-time updates for all swap lifecycle events
    - **Transaction logging and monitoring** - Complete audit trail of all swap transactions
    - **Rate Limiting** - Standard endpoints: 100 requests per 15 minutes per IP; Strict endpoints: 20 requests per 15 minutes per IP
    - **Idempotency** - Offer creation endpoints support idempotency keys to prevent duplicate offers
    
    EasyEscrow.ai uses **atomic swaps** - instant, non-custodial exchanges that execute in a single transaction.
    Your assets are NEVER held in escrow. The swap happens atomically or not at all.
    
    ### How It Works
    
    1. **Maker creates offer** - Specifies what they offer and what they want
    2. **Taker accepts offer** - Gets a pre-built transaction to sign
    3. **Taker signs & broadcasts** - The swap executes atomically on Solana
    4. **Taker confirms** - Submits the transaction signature for verification
    5. **Instant settlement** - NFTs/SOL/cNFTs transfer simultaneously
    
    ### Supported Asset Types
    
    - ✅ **SPL NFTs** (Metaplex standard) - Up to 10 per side
    - ✅ **Compressed NFTs (cNFTs)** (Metaplex Bubblegum) - Up to 10 per side
    - ✅ **SOL** (Native Solana currency)
    - ✅ **Mixed swaps** (NFT ↔ SOL, NFT ↔ NFT, cNFT ↔ SOL, cNFT ↔ cNFT, etc.)
    - ✅ **Bulk swaps** - Up to 10 assets on each side of the trade
    
    ### Key Features
    
    - **Non-custodial**: Assets never leave your wallet until the swap executes
    - **Atomic**: All transfers happen in one transaction or none at all
    - **Durable nonces**: Offers don't expire due to blockhash expiration
    - **Low fees**: 1% platform fee on SOL swaps, 0.005 SOL flat fee for NFT-only swaps
    - **Instant settlement**: No waiting for confirmations or multi-step processes
    - **Cancel anytime**: Cancel offers instantly by advancing the durable nonce
    
    ### Platform Fees
    
    - **NFT-only swaps**: 0.005 SOL flat fee (paid by taker)
    - **Swaps with SOL**: 1% of total SOL amount (paid by taker)
    - **Minimum fee**: 0.001 SOL
    - **Maximum fee**: 0.5 SOL (fee cap)
    
    ### Security
    
    - **Durable nonces** prevent transaction replay attacks
    - **Asset validation** ensures you own what you're trading
    - **Rate limiting** prevents API abuse
    - **Input validation** protects against malicious inputs
    - **Idempotency keys** prevent duplicate operations
    
  contact:
    name: EasyEscrow.ai Support
    email: support@easyescrow.ai
  license:
    name: ISC
    
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://staging-api.easyescrow.ai
    description: Staging environment (Devnet)
  - url: https://api.easyescrow.ai
    description: Production (Mainnet)

tags:
  - name: Health
    description: Service health and status
  - name: Quote
    description: Swap quote and fee estimation
  - name: Offers
    description: Atomic swap offer lifecycle management
  - name: Bundle Monitoring
    description: Bundle status and recovery for bulk swaps (all NFT types)

paths:
  /:
    get:
      tags:
        - Health
      summary: API root
      description: Returns API information and available endpoints
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: EasyEscrow.ai Backend API
                  version:
                    type: string
                    example: 1.0.0
                  endpoints:
                    type: object
                    properties:
                      health:
                        type: string
                        example: /health
                      offers:
                        type: string
                        example: /api/offers
                  documentation:
                    type: string
                    example: /docs

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API and all connected services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/quote:
    post:
      tags:
        - Quote
      summary: Get swap quote
      description: |
        Get a comprehensive quote for an atomic swap including:
        - **SOL price** in USD (cached from CoinGecko)
        - **Network fees** (based on actual Solana signature costs)
        - **Platform fees** (percentage, flat, or zero-fee for API key users)
        - **Transaction size** estimation with ALT support
        - **Time estimates** based on NFT count and types
        - **Warnings** about cNFT limitations or multi-asset restrictions
        - **Swap feasibility** check (`canSwap` boolean)
        
        This endpoint consolidates all information needed for the swap confirmation modal.
        
        **Note:** cNFT transaction size estimates use worst-case proof node counts (14 nodes)
        since actual proof size varies by tree canopy depth and cannot be determined without
        fetching the full proof data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL Quote
                description: Quote for trading an SPL NFT for SOL
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                      name: "Cool NFT #123"
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 100000000
              cnftForSol:
                summary: cNFT ↔ SOL Quote
                description: Quote for trading a compressed NFT for SOL (larger transaction)
                value:
                  makerAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                      name: "Compressed NFT"
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 200000000
              nftForNft:
                summary: NFT ↔ NFT Quote
                description: Quote for trading two NFTs
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  takerAssets:
                    - mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  makerSolLamports: 0
                  takerSolLamports: 0
              zeroFee:
                summary: Zero-Fee Quote (API Key)
                description: Quote with zero platform fee using API key
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 500000000
                  apiKey: "your-api-key-here"
      responses:
        '200':
          description: Quote generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers:
    get:
      tags:
        - Offers
      summary: List offers
      description: Retrieve swap offers with optional filters and pagination
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OfferStatus'
          description: Filter by offer status
        - in: query
          name: makerWallet
          schema:
            type: string
          description: Filter by maker wallet address
        - in: query
          name: takerWallet
          schema:
            type: string
          description: Filter by taker wallet address
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offers:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfferSummary'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Offers
      summary: Create offer
      description: |
        Create a new atomic swap offer.
        
        You can create:
        - **Direct offers** (specify takerWallet) - only that address can accept
        - **Open offers** (omit takerWallet) - anyone can accept
        
        **Rate Limited**: 10 requests per 15 minutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "1000000000"
              solForNft:
                summary: SOL ↔ NFT (Open Offer)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets: []
                  requestedAssets:
                    - mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  offeredSol: "500000000"
                  requestedSol: "0"
              nftForNft:
                summary: NFT ↔ NFT
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  requestedAssets:
                    - mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  offeredSol: "0"
                  requestedSol: "0"
              cnftForSol:
                summary: cNFT ↔ SOL
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "2000000000"
      responses:
        '201':
          description: Offer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "1"
                          status:
                            type: string
                            example: "PENDING"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                            nullable: true
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                          createdAt:
                            type: string
                            format: date-time
                      transaction:
                        type: object
                        properties:
                          nonceAccount:
                            type: string
                            description: Durable nonce account address
                          message:
                            type: string
                            example: "Transaction will be built when offer is accepted"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Validation error - asset ownership or on-chain validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}:
    get:
      tags:
        - Offers
      summary: Get offer details
      description: Retrieve full details for a specific offer
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/OfferDetail'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/counter:
    post:
      tags:
        - Offers
      summary: Create counter-offer
      description: Create a counter-offer to an existing offer with different terms
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            example:
              makerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              takerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              offeredAssets: []
              requestedAssets:
                - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  isCompressed: false
              offeredSol: "1500000000"
              requestedSol: "0"
      responses:
        '201':
          description: Counter-offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      parentOfferId:
                        type: integer
                      status:
                        type: string
                        example: "PENDING"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/cancel:
    post:
      tags:
        - Offers
      summary: Cancel offer
      description: |
        Cancel an active offer. This advances the durable nonce, invalidating any 
        serialized transactions that reference it.
        
        Only the maker can cancel their offer.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - walletAddress
              properties:
                walletAddress:
                  type: string
                  description: Must be the maker's wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
      responses:
        '200':
          description: Offer cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      status:
                        type: string
                        example: "CANCELLED"
                      cancelledAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Offer cancelled and nonce advanced"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Unauthorized - not the maker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/accept:
    post:
      tags:
        - Offers
      summary: Accept offer
      description: |
        Accept an active offer and receive the atomic swap transaction(s) to sign.
        
        **Single Transaction (Simple swaps):**
        The API returns a base64-encoded transaction that you must:
        1. Deserialize
        2. Sign with your wallet
        3. Broadcast to Solana
        4. Call /confirm with the signature
        
        **Multiple Transactions (Bulk swaps):**
        For swaps involving 3+ NFTs of any type, the API may return multiple transactions in a `bulkSwap` object:
        - Each transaction must be signed by the appropriate party (maker or taker)
        - Transactions should be sent sequentially or as a Jito bundle
        - The `requiredSigners` array indicates which wallet(s) must sign each transaction
        - On mainnet, transactions are bundled atomically via Jito
        
        **Requires idempotency key** to prevent duplicate nonce consumption.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - takerWallet
              properties:
                takerWallet:
                  type: string
                  description: Your wallet address (must match offer if it's a direct offer)
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
      responses:
        '200':
          description: Transaction ready for signing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                            example: "ACCEPTED"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                      transaction:
                        type: object
                        description: Single transaction (for simple swaps without cNFTs)
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded transaction to sign and broadcast
                            example: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDz..."
                          nonceAccount:
                            type: string
                            description: Durable nonce account used in the transaction
                      bulkSwap:
                        type: object
                        description: Multiple transactions (for bulk swaps with 3+ NFTs of any type)
                        properties:
                          isBulkSwap:
                            type: boolean
                            description: Indicates this is a bulk swap with multiple transactions
                            example: true
                          strategy:
                            type: string
                            description: |
                              Swap strategy:
                              - SINGLE_TRANSACTION: Simple swap via escrow program
                              - DIRECT_BUBBLEGUM_BUNDLE: cNFT bulk swap
                              - DIRECT_NFT_BUNDLE: SPL/Core NFT bulk swap
                              - MIXED_NFT_BUNDLE: Mixed NFT types bulk swap
                            enum:
                              - SINGLE_TRANSACTION
                              - DIRECT_BUBBLEGUM_BUNDLE
                              - DIRECT_NFT_BUNDLE
                              - MIXED_NFT_BUNDLE
                            description: Transaction strategy used
                            enum: [SINGLE_TRANSACTION, DIRECT_BUBBLEGUM_BUNDLE]
                            example: "DIRECT_BUBBLEGUM_BUNDLE"
                          transactionCount:
                            type: integer
                            description: Number of transactions in the bundle
                            example: 2
                          requiresJitoBundle:
                            type: boolean
                            description: Whether Jito bundle is required (mainnet only)
                            example: true
                          transactions:
                            type: array
                            description: Array of transactions to sign and send
                            items:
                              type: object
                              properties:
                                index:
                                  type: integer
                                  description: Transaction index in the bundle
                                  example: 0
                                purpose:
                                  type: string
                                  description: Purpose of this transaction
                                  example: "SOL transfers and platform fee"
                                serializedTransaction:
                                  type: string
                                  description: Base64-encoded transaction
                                requiredSigners:
                                  type: array
                                  description: Wallet addresses that must sign this transaction
                                  items:
                                    type: string
                                  example: ["8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"]
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not authorized to accept this offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error - asset ownership validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/confirm:
    post:
      tags:
        - Offers
      summary: Confirm swap execution
      description: |
        Confirm that you've broadcast the swap transaction and provide its signature.
        
        The API will verify the transaction on-chain and mark the offer as filled.
        
        **Requires idempotency key** to prevent duplicate confirmations.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Transaction signature from Solana
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
      responses:
        '200':
          description: Swap confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Swap confirmed successfully"
                      signature:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid signature or transaction failed on-chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/bundle-status:
    get:
      tags:
        - Bundle Monitoring
      summary: Get bundle execution status
      description: |
        Get the current status of a bulk swap bundle execution (for swaps with 3+ NFTs).
        
        Bundle statuses:
        - **PENDING**: Bundle created, not yet submitted
        - **SUBMITTED**: Bundle submitted to Jito/RPC
        - **LANDED**: All transactions confirmed on-chain
        - **FAILED**: Bundle execution failed
        - **PARTIAL**: Some transactions succeeded, some failed
        - **TIMEOUT**: Bundle submission timed out
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Bundle status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: string
                      bundleStatus:
                        type: string
                        enum: [PENDING, SUBMITTED, LANDED, FAILED, PARTIAL, TIMEOUT]
                      transactionCount:
                        type: integer
                      confirmedCount:
                        type: integer
                      failedCount:
                        type: integer
                      signatures:
                        type: array
                        items:
                          type: string
                      error:
                        type: string
                        nullable: true
                      updatedAt:
                        type: string
                        format: date-time
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/retry-bundle:
    post:
      tags:
        - Bundle Monitoring
      summary: Retry failed bundle
      description: |
        Retry a failed or timed-out bulk swap bundle (for swaps with 3+ NFTs).
        
        This endpoint will:
        1. Fetch fresh Merkle proofs for all cNFTs
        2. Rebuild the transaction bundle
        3. Resubmit to Jito/RPC
        
        Only available for bundles in FAILED or TIMEOUT status.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Bundle retry initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: string
                      message:
                        type: string
                        example: "Bundle retry initiated"
                      newBundleStatus:
                        type: string
                        example: "SUBMITTED"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Bundle not eligible for retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/metrics/bundles:
    get:
      tags:
        - Bundle Monitoring
      summary: Get bundle metrics
      description: |
        Get aggregated metrics for cNFT bundle execution over the last 24 hours.
        
        Useful for monitoring bundle success rates and identifying issues.
      responses:
        '200':
          description: Bundle metrics retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      period:
                        type: string
                        example: "24h"
                      totals:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 150
                          landed:
                            type: integer
                            example: 142
                          failed:
                            type: integer
                            example: 5
                          timeout:
                            type: integer
                            example: 2
                          pending:
                            type: integer
                            example: 1
                      rates:
                        type: object
                        properties:
                          successRate:
                            type: string
                            example: "94.67%"
                          failureRate:
                            type: string
                            example: "3.33%"
                      recentFailures:
                        type: array
                        description: Last 10 failed bundles for debugging
                        items:
                          type: object
                          properties:
                            offerId:
                              type: string
                            status:
                              type: string
                            createdAt:
                              type: string
                            maker:
                              type: string
                            taker:
                              type: string
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    OfferId:
      in: path
      name: offerId
      required: true
      schema:
        type: string
      description: Agreement ID
      
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 255
      description: Idempotency key to prevent duplicate requests (required for agreement creation)
      
    TransactionQueryParams:
      in: query
      name: query
      schema:
        type: object
        properties:
          agreementId:
            type: string
            description: Filter by agreement ID
          operationType:
            type: string
            enum: [INIT_ESCROW, DEPOSIT_SOL, DEPOSIT_NFT_A, DEPOSIT_NFT_B, SETTLE, CANCEL, REFUND]
            description: Filter by operation type
          status:
            type: string
            enum: [PENDING, CONFIRMED, FAILED, FINALIZED]
            description: Filter by status
          txId:
            type: string
            description: Filter by transaction ID (partial match)
          dateFrom:
            type: string
            format: date-time
            description: Filter by date range start (ISO 8601)
          dateTo:
            type: string
            format: date-time
            description: Filter by date range end (ISO 8601)
          limit:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            description: Number of results
          offset:
            type: integer
            minimum: 0
            default: 0
            description: Pagination offset
          sortBy:
            type: string
            enum: [timestamp, blockHeight]
            default: timestamp
            description: Sort field
          sortOrder:
            type: string
            enum: [asc, desc]
            default: desc
            description: Sort order

  schemas:
    QuoteRequest:
      type: object
      properties:
        makerAssets:
          type: array
          description: NFTs offered by the maker
          items:
            $ref: '#/components/schemas/QuoteAsset'
        takerAssets:
          type: array
          description: NFTs offered by the taker (requested by maker)
          items:
            $ref: '#/components/schemas/QuoteAsset'
        makerSolLamports:
          type: integer
          description: SOL amount offered by maker (in lamports)
          default: 0
          example: 0
        takerSolLamports:
          type: integer
          description: SOL amount offered by taker (in lamports)
          default: 0
          example: 100000000
        apiKey:
          type: string
          description: Optional API key for zero-fee swaps
          example: "your-api-key-here"

    QuoteAsset:
      type: object
      required:
        - mint
      properties:
        mint:
          type: string
          description: NFT mint address
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        isCompressed:
          type: boolean
          description: Whether the NFT is a compressed NFT (cNFT)
          default: false
        isCoreNft:
          type: boolean
          description: Whether the NFT is a Metaplex Core NFT
          default: false
        name:
          type: string
          description: NFT name (optional, for display)
          example: "Cool NFT #123"
        image:
          type: string
          description: NFT image URL (optional)
        symbol:
          type: string
          description: NFT symbol (optional)
        proofNodes:
          type: integer
          description: |
            Number of Merkle proof nodes for cNFT (optional).
            If not provided, worst-case estimate (14 nodes) is used.
          example: 3

    QuoteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/QuoteData'
        timestamp:
          type: string
          format: date-time

    QuoteData:
      type: object
      properties:
        solPriceUSD:
          type: number
          description: Current SOL price in USD (from CoinGecko, cached 1 minute)
          example: 138.30
        maker:
          $ref: '#/components/schemas/QuoteSide'
        taker:
          $ref: '#/components/schemas/QuoteSide'
        estimatedTime:
          type: object
          properties:
            seconds:
              type: integer
              description: Estimated swap time in seconds
              example: 5
            display:
              type: string
              description: Human-readable time estimate
              example: "~5 seconds"
        networkFee:
          $ref: '#/components/schemas/QuoteFee'
        platformFee:
          type: object
          allOf:
            - $ref: '#/components/schemas/QuoteFee'
            - type: object
              properties:
                type:
                  type: string
                  enum: [percentage, flat, zero]
                  description: |
                    Fee type:
                    - percentage: 1% of SOL amount (for swaps involving SOL)
                    - flat: 0.005 SOL (for NFT-only swaps)
                    - zero: No fee (for API key users)
                  example: "percentage"
                rate:
                  type: number
                  description: Fee rate (0.01 for 1%, 0.005 for flat fee, 0 for zero)
                  example: 0.01
                label:
                  type: string
                  description: Display label for the fee
                  example: "Platform Fee (1%):"
        transactionSize:
          $ref: '#/components/schemas/QuoteTransactionSize'
        warnings:
          type: array
          description: Warning messages about potential issues
          items:
            type: string
          example: ["cNFT proof size varies by tree. Estimate uses worst case (14 nodes)."]
        canSwap:
          type: boolean
          description: Whether the swap can proceed (false if transaction too large or other issues)
          example: true

    QuoteSide:
      type: object
      description: Quote information for one side of the swap (maker or taker)
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/QuoteAsset'
        assetCount:
          type: integer
          description: Total number of NFTs on this side
          example: 1
        sol:
          type: object
          nullable: true
          description: SOL amount if any (null if no SOL on this side)
          properties:
            sol:
              type: number
              example: 0.1
            lamports:
              type: integer
              example: 100000000
            usd:
              type: number
              nullable: true
              example: 13.83
            display:
              type: string
              example: "0.1000 SOL (~$13.83 USD)"
        breakdown:
          type: object
          properties:
            splNfts:
              type: integer
              description: Count of SPL NFTs
              example: 0
            cNfts:
              type: integer
              description: Count of compressed NFTs
              example: 1
            coreNfts:
              type: integer
              description: Count of Metaplex Core NFTs
              example: 0

    QuoteFee:
      type: object
      description: Fee amount with USD conversion
      properties:
        sol:
          type: number
          description: Fee amount in SOL
          example: 0.001
        lamports:
          type: integer
          description: Fee amount in lamports
          example: 1000000
        usd:
          type: number
          nullable: true
          description: Fee amount in USD (null if SOL price unavailable)
          example: 0.14
        display:
          type: string
          description: Formatted display string
          example: "0.0010 SOL (~$0.14 USD)"

    QuoteTransactionSize:
      type: object
      description: Transaction size estimation
      properties:
        estimated:
          type: integer
          description: Estimated transaction size in bytes (without ALT)
          example: 1271
        estimatedWithALT:
          type: integer
          nullable: true
          description: Estimated size with Address Lookup Table (null if still too large)
          example: 745
        maxSize:
          type: integer
          description: Maximum allowed transaction size (1232 bytes)
          example: 1232
        willFit:
          type: boolean
          description: Whether transaction fits without ALT
          example: false
        willFitWithALT:
          type: boolean
          description: Whether transaction fits with ALT
          example: true
        altAvailable:
          type: boolean
          description: Whether an Address Lookup Table is configured
          example: true
        useALT:
          type: boolean
          description: Whether ALT will be used for this transaction
          example: true
        altSavings:
          type: integer
          nullable: true
          description: Bytes saved by using ALT (null if not using ALT)
          example: 526
        status:
          type: string
          enum: [ok, alt_required, near_limit, too_large]
          description: |
            Transaction size status:
            - ok: Fits without ALT
            - alt_required: Requires ALT to fit
            - near_limit: Fits but close to limit (>80%)
            - too_large: Exceeds limit even with ALT
          example: "alt_required"
        breakdown:
          type: object
          description: Size breakdown by component
          properties:
            signatures:
              type: integer
              description: Signature data size (64 bytes × signers)
              example: 192
            accounts:
              type: integer
              description: Account keys size (32 bytes × accounts)
              example: 672
            instructions:
              type: integer
              description: Instruction data size
              example: 154
            cnftProofs:
              type: integer
              description: cNFT Merkle proof data size
              example: 556
        details:
          type: object
          description: Detailed count information
          properties:
            numSigners:
              type: integer
              example: 3
            numAccounts:
              type: integer
              example: 24
            makerProofNodes:
              type: integer
              description: Proof nodes for maker's cNFT(s)
              example: 14
            takerProofNodes:
              type: integer
              description: Proof nodes for taker's cNFT(s)
              example: 0

    OfferStatus:
      type: string
      enum:
        - PENDING_INIT
        - PENDING_DEPOSITS
        - SOL_LOCKED
        - NFT_A_LOCKED
        - NFT_B_LOCKED
        - BOTH_LOCKED
        - ALL_LOCKED
        - SETTLED
        - EXPIRED
        - CANCELLED
        - EXPIRED
      description: |
        Agreement status:
        - PENDING_INIT: Agreement is being initialized on-chain
        - PENDING_DEPOSITS: Waiting for required deposits
        - SOL_LOCKED: SOL has been deposited (for NFT<>SOL or NFT+SOL<>NFT swaps)
        - NFT_A_LOCKED: Seller's NFT has been deposited
        - NFT_B_LOCKED: Buyer's NFT has been deposited (for NFT<>NFT swaps)
        - BOTH_LOCKED: Two required assets are locked
        - ALL_LOCKED: All required assets are locked, ready for settlement
        - SETTLED: Agreement has been successfully settled
        - EXPIRED: Agreement has expired without settlement
        - CANCELLED: Agreement has been cancelled

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          example: healthy
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: easy-escrow-ai-backend
        mode:
          type: string
          example: atomic-swap
        database:
          type: string
          enum: [connected, disconnected]
          example: connected
        redis:
          type: string
          enum: [connected, disconnected]
          example: connected
        idempotency:
          type: object
          properties:
            isRunning:
              type: boolean
            status:
              type: string
              enum: [running, stopped]
            expirationHours:
              type: integer
            cleanupIntervalMinutes:
              type: integer

    CreateAgreementRequest:
      type: object
      required:
        - nftMint
        - seller
        - expiry
        - feeBps
        - honorRoyalties
        - swapType
      properties:
        nftMint:
          type: string
          description: |
            The seller's NFT mint address (NFT A - unique identifier).
            
            Important: This is NOT "minting" (creating) an NFT.
            The NFT must ALREADY EXIST in the seller's wallet.
            Provide the mint address of the specific NFT to be traded in this escrow agreement.
            
            In Solana, a "mint" is the account that defines a token type. For NFTs,
            the mint address serves as the unique identifier (like a serial number or contract address).
            
            **Supported:** Traditional NFTs, Compressed NFTs (cNFTs), Metaplex Core NFTs
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        nftBMint:
          type: string
          description: |
            The buyer's NFT mint address (NFT B - unique identifier).
            Required for NFT_FOR_NFT_WITH_FEE and NFT_FOR_NFT_PLUS_SOL swap types.
            
            The NFT must ALREADY EXIST in the buyer's wallet.
            
            **Supported:** Traditional NFTs, Compressed NFTs (cNFTs), Metaplex Core NFTs
          example: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        swapType:
          type: string
          enum: ['NFT_FOR_SOL', 'NFT_FOR_NFT_WITH_FEE', 'NFT_FOR_NFT_PLUS_SOL']
          default: 'NFT_FOR_SOL'
          description: |
            Type of swap to execute:
            - **NFT_FOR_SOL**: Direct exchange of NFT for SOL (1% platform fee, blockchain fees covered)
            - **NFT_FOR_NFT_WITH_FEE**: Exchange two NFTs (0.005 SOL fee split 50/50, blockchain fees covered)
            - **NFT_FOR_NFT_PLUS_SOL**: Exchange NFT + SOL for another NFT (1% platform fee, blockchain fees covered)
            
            **Limits for all types:** Min 0.1 SOL, Max 15 SOL (up to $5,000 AUD)
          example: "NFT_FOR_SOL"
        solAmount:
          type: string
          description: |
            Amount of SOL in lamports (as string to preserve precision).
            Required for NFT_FOR_SOL and NFT_FOR_NFT_PLUS_SOL swap types.
            1 SOL = 1,000,000,000 lamports.
            
            For NFT_FOR_NFT_WITH_FEE, this represents the platform fee (0.005 SOL = 5,000,000 lamports).
            
            **Limits:** Min 100,000,000 lamports (0.1 SOL), Max 15,000,000,000 lamports (15 SOL)
          example: "1000000000"
        seller:
          type: string
          description: Seller wallet public key
          example: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        buyer:
          type: string
          description: Buyer wallet public key (optional, can be set later)
          example: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        expiry:
          oneOf:
            - type: string
              format: date-time
            - type: number
            - type: string
              enum: ["5m", "1h", "6h", "12h", "24h"]
          description: |
            Agreement expiry time. Supports multiple formats for flexibility:
            
            **Format Options:**
            - **ISO 8601 timestamp** (absolute time): "2025-11-04T12:00:00Z"
            - **Duration in hours** (number 0.0833-24, where 0.0833 = 5 minutes): 12
            - **Preset string**: "5m", "1h", "6h", "12h", "24h"
            - **Optional**: If not provided, defaults to 5 minutes from creation
            
            **Constraints:**
            - Minimum duration: 5 minutes from creation
            - Maximum duration: 24 hours from creation
            - Default: 5 minutes (when not specified)
            - Expiry must be in the future
            
            **Examples:**
            - Absolute: "2025-11-04T12:00:00Z" (expires at specific time)
            - Duration: 12 (expires 12 hours from now)
            - Preset: "5m" (expires 5 minutes from now - default)
            - Preset: "6h" (expires 6 hours from now)
            - Omitted: Uses default of 5 minutes from now
            
            **Note:** A 60-second buffer is added on-chain to prevent clock skew issues.
          example: "5m"
        expiryDurationHours:
          type: number
          minimum: 0.0833
          maximum: 24
          description: |
            Optional: Explicit duration in hours (alternative to expiry field).
            Minimum is 0.0833 hours (5 minutes). Default is 0.0833 hours (5 minutes) if not provided.
            If both expiry and expiryDurationHours are provided, expiry takes precedence.
          example: 6
        feeBps:
          type: integer
          description: |
            Platform fee in basis points (100 = 1%).
            - For NFT_FOR_SOL: 1% (100 bps) of SOL amount
            - For NFT_FOR_NFT_WITH_FEE: Fixed 0.005 SOL total (split 50/50)
            - For NFT_FOR_NFT_PLUS_SOL: 1% (100 bps) of SOL amount
          minimum: 0
          maximum: 10000
          example: 100
        honorRoyalties:
          type: boolean
          description: Whether to honor NFT creator royalties
          example: true

    CreateAgreementResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            agreementId:
              type: string
              example: "AGR-1234567890"
            escrowPda:
              type: string
              example: "EscrowPdaAddress..."
            depositAddresses:
              type: object
              properties:
                nftA:
                  type: string
                  description: Deposit address for seller's NFT
                  example: "NftADepositAddress..."
                sol:
                  type: string
                  description: Deposit address for SOL (if required by swap type)
                  example: "SolDepositAddress..."
                nftB:
                  type: string
                  description: Deposit address for buyer's NFT (if required by swap type)
                  example: "NftBDepositAddress..."
            expiry:
              type: string
              format: date-time
            transactionId:
              type: string
              example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        timestamp:
          type: string
          format: date-time

    AgreementListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Agreement'
        pagination:
          type: object
          properties:
            page:
              type: integer
            availableNonces:
              type: integer
            consumedNonces:
              type: integer
            pages:
              type: integer
        timestamp:
          type: string
          format: date-time

    AgreementDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AgreementDetail'
        timestamp:
          type: string
          format: date-time

    Agreement:
      type: object
      properties:
        agreementId:
          type: string
        swapType:
          type: string
          enum: ['NFT_FOR_SOL', 'NFT_FOR_NFT_WITH_FEE', 'NFT_FOR_NFT_PLUS_SOL']
        nftMint:
          type: string
          description: The seller's NFT mint address (NFT A)
        nftBMint:
          type: string
          description: The buyer's NFT mint address (NFT B) - only for NFT<>NFT swaps
        solAmount:
          type: string
          description: Amount of SOL in lamports
        seller:
          type: string
        buyer:
          type: string
        status:
          $ref: '#/components/schemas/AgreementStatus'
        expiry:
          type: string
          format: date-time
        feeBps:
          type: integer
        honorRoyalties:
          type: boolean
        escrowPda:
          type: string
        nftADepositAddr:
          type: string
          description: Deposit address for seller's NFT
        solDepositAddr:
          type: string
          description: Deposit address for SOL
        nftBDepositAddr:
          type: string
          description: Deposit address for buyer's NFT (NFT<>NFT swaps only)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AgreementDetail:
      allOf:
        - $ref: '#/components/schemas/Agreement'
        - type: object
          properties:
            deposits:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
                    enum: [SOL, NFT_A, NFT_B]
                  depositor:
                    type: string
                  amount:
                    type: string
                  status:
                    type: string
                    enum: [PENDING, CONFIRMED, FAILED]
                  txId:
                    type: string
                  detectedAt:
                    type: string
                    format: date-time
                  confirmedAt:
                    type: string
                    format: date-time
            balances:
              type: object
              properties:
                solLocked:
                  type: boolean
                nftALocked:
                  type: boolean
                nftBLocked:
                  type: boolean
                actualSolAmount:
                  type: string
            isExpired:
              type: boolean
            canBeCancelled:
              type: boolean
            cancelledAt:
              type: string
              format: date-time
            settledAt:
              type: string
              format: date-time

    CancelAgreementResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            agreementId:
              type: string
            status:
              $ref: '#/components/schemas/AgreementStatus'
            cancelledAt:
              type: string
              format: date-time
            transactionId:
              type: string
            message:
              type: string
        timestamp:
          type: string
          format: date-time

    Receipt:
      type: object
      properties:
        id:
          type: string
        agreementId:
          type: string
        swapType:
          type: string
          enum: ['NFT_FOR_SOL', 'NFT_FOR_NFT_WITH_FEE', 'NFT_FOR_NFT_PLUS_SOL']
        nftMint:
          type: string
          description: The seller's NFT mint address (NFT A)
        nftBMint:
          type: string
          description: The buyer's NFT mint address (NFT B) - for NFT<>NFT swaps
        solAmount:
          type: string
          description: Amount of SOL exchanged (in lamports)
        platformFee:
          type: string
          description: Platform fee amount (in SOL lamports)
        creatorRoyalty:
          type: string
          description: Creator royalty amount (in SOL lamports)
        buyer:
          type: string
        seller:
          type: string
        escrowTxId:
          type: string
        settlementTxId:
          type: string
        receiptHash:
          type: string
        signature:
          type: string
        createdAt:
          type: string
          format: date-time
        settledAt:
          type: string
          format: date-time
        generatedAt:
          type: string
          format: date-time

    ReceiptResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Receipt'
        timestamp:
          type: string
          format: date-time

    ReceiptListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Receipt'
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            pages:
              type: integer
        timestamp:
          type: string
          format: date-time

    ReceiptVerificationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            receiptHash:
              type: string
            signature:
              type: string
            isValid:
              type: boolean
        timestamp:
          type: string
          format: date-time

    TransactionLog:
      type: object
      properties:
        id:
          type: string
        txId:
          type: string
        operationType:
          type: string
          enum: [INIT_ESCROW, DEPOSIT_SOL, DEPOSIT_NFT_A, DEPOSIT_NFT_B, SETTLE, CANCEL, REFUND]
        agreementId:
          type: string
        status:
          type: string
          enum: [PENDING, CONFIRMED, FAILED, FINALIZED]
        blockHeight:
          type: string
        slot:
          type: string
        errorMessage:
          type: string
        timestamp:
          type: string
          format: date-time
        explorerUrl:
          type: string

    TransactionLogResponse:
      allOf:
        - $ref: '#/components/schemas/TransactionLog'

    TransactionLogListResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    TransactionStatsResponse:
      type: object
      properties:
        agreementId:
          type: string
        totalTransactions:
          type: integer
        byOperationType:
          type: object
          additionalProperties:
            type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        firstTransaction:
          type: string
          format: date-time
        lastTransaction:
          type: string
          format: date-time

    AgreementTransactionsResponse:
      type: object
      properties:
        agreementId:
          type: string
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
        stats:
          type: object
          properties:
            totalTransactions:
              type: integer
            byOperationType:
              type: object
              additionalProperties:
                type: integer
            byStatus:
              type: object
              additionalProperties:
                type: integer
            firstTransaction:
              type: string
              format: date-time
            lastTransaction:
              type: string
              format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [ESCROW_FUNDED, ESCROW_ASSET_LOCKED, ESCROW_SETTLED, ESCROW_EXPIRED, ESCROW_REFUNDED]
        targetUrl:
          type: string
        status:
          type: string
          enum: [PENDING, DELIVERED, FAILED]
        attempts:
          type: integer
        maxAttempts:
          type: integer
        lastAttemptAt:
          type: string
          format: date-time
        lastResponseCode:
          type: integer
        deliveredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        scheduledFor:
          type: string
          format: date-time

    WebhookListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        agreementId:
          type: string
        count:
          type: integer
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'

    WebhookStatusResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        webhook:
          allOf:
            - $ref: '#/components/schemas/Webhook'
            - type: object
              properties:
                agreementId:
                  type: string
                lastResponseBody:
                  type: string
                payload:
                  type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid wallet address format"
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication (coming soon)

# No security required yet (public MVP)
