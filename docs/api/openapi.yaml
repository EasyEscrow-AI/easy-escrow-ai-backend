openapi: 3.0.3
info:
  title: EasyEscrow.ai Atomic Swap API
  version: 1.0.0
  description: |
    Backend API service for EasyEscrow.ai - Non-custodial atomic swap platform for NFTs and SOL on Solana.
    
    ## Supported Swap Types
    
    EasyEscrow.ai currently supports **three types of escrow swaps** on the **Solana blockchain**:
    
    ### 1. NFT <> SOL
    Direct exchange of an NFT for SOL payment.
    - **Seller provides:** NFT (Traditional NFT)
    - **Buyer provides:** SOL
    - **Platform fee:** 1% (100 basis points) - deducted from seller's proceeds
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ### 2. NFT <> NFT (with SOL fee)
    Exchange of two NFTs with a separate SOL fee payment.
    - **Seller provides:** NFT A (Traditional NFT) + 0.0025 SOL (50% of platform fee)
    - **Buyer provides:** NFT B (Traditional NFT) + 0.0025 SOL (50% of platform fee)
    - **Platform fee:** 0.005 SOL total - split 50/50 between seller and buyer
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ### 3. NFT + SOL <> NFT
    Exchange of an NFT plus SOL payment for another NFT.
    - **Seller provides:** NFT A (Traditional NFT) + SOL
    - **Buyer provides:** NFT B (Traditional NFT)
    - **Platform fee:** 1% (100 basis points) - deducted from SOL amount
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ## Blockchain Support
    - ✅ **Solana blockchain** (Devnet, Mainnet)
    - ✅ **Traditional NFTs** (Metaplex standard)
    - 🔜 **Compressed NFTs (cNFTs)** - Coming soon
    - 🔜 **Additional blockchains** - Coming soon
    
    ## Additional Features
    - **Custom expiry times (5 minutes - 24 hours)** with flexible input formats (presets, duration, timestamps)
    - On-chain non-custodial functionality (assets secured by Smart Contract)
    - Automatic atomic settlement when both assets are verified on-chain
    - Automatic agreement expiry and refund handling (auto return to sender)
    - Comprehensive webhook notifications (real-time updates)
    - Receipt generation and on-chain verification of assets
    - Transaction logging and monitoring to ensure a smooth escrow
    - Rate Limiting: 10 agreement requests per 15 minutes
    - Idempotency: Agreement creation endpoints support idempotency keys to prevent duplicates
    
    EasyEscrow.ai uses **atomic swaps** - instant, non-custodial exchanges that execute in a single transaction.
    Your assets are NEVER held in escrow. The swap happens atomically or not at all.
    
    ### How It Works
    
    1. **Maker creates offer** - Specifies what they offer and what they want
    2. **Taker accepts offer** - Gets a pre-built transaction to sign
    3. **Taker signs & broadcasts** - The swap executes atomically on Solana
    4. **Taker confirms** - Submits the transaction signature for verification
    5. **Instant settlement** - NFTs/SOL/cNFTs transfer simultaneously
    
    ### Supported Asset Types
    
    - ✅ **SPL NFTs** (Metaplex standard)
    - ✅ **Compressed NFTs (cNFTs)** (Metaplex Bubblegum)
    - ✅ **SOL** (Native Solana currency)
    - ✅ **Mixed swaps** (NFT ↔ SOL, NFT ↔ NFT, cNFT ↔ SOL, etc.)
    
    ### Key Features
    
    - **Non-custodial**: Assets never leave your wallet until the swap executes
    - **Atomic**: All transfers happen in one transaction or none at all
    - **Durable nonces**: Offers don't expire due to blockhash expiration
    - **Low fees**: 1% platform fee on SOL swaps, 0.005 SOL flat fee for NFT-only swaps
    - **Instant settlement**: No waiting for confirmations or multi-step processes
    - **Cancel anytime**: Cancel offers instantly by advancing the durable nonce
    
    ### Platform Fees
    
    - **NFT-only swaps**: 0.005 SOL flat fee (paid by taker)
    - **Swaps with SOL**: 1% of total SOL amount (paid by taker)
    - **Minimum fee**: 0.001 SOL
    - **Maximum fee**: 0.5 SOL (fee cap)
    
    ### Security
    
    - **Durable nonces** prevent transaction replay attacks
    - **Asset validation** ensures you own what you're trading
    - **Rate limiting** prevents API abuse
    - **Input validation** protects against malicious inputs
    - **Idempotency keys** prevent duplicate operations
    
  contact:
    name: EasyEscrow.ai Support
    email: support@easyescrow.ai
  license:
    name: ISC
    
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://staging-api.easyescrow.ai
    description: Staging environment (Devnet)
  - url: https://api.easyescrow.ai
    description: Production (Mainnet)

tags:
  - name: Health
    description: Service health and status
  - name: Offers
    description: Atomic swap offer lifecycle management

paths:
  /:
    get:
      tags:
        - Health
      summary: API root
      description: Returns API information and available endpoints
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: EasyEscrow.ai Backend API
                  version:
                    type: string
                    example: 1.0.0
                  endpoints:
                    type: object
                    properties:
                      health:
                        type: string
                        example: /health
                      offers:
                        type: string
                        example: /api/offers
                  documentation:
                    type: string
                    example: /docs

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API and all connected services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/agreements:
    post:
      tags:
        - Agreements
      summary: Create a new escrow agreement
      description: |
        Creates a new escrow agreement for NFT swaps. This initializes the escrow on the Solana blockchain
        and generates deposit addresses for the required assets (NFT, SOL, and/or second NFT depending on swap type).
        
        **Supported Swap Types:**
        - NFT <> SOL (NFT_FOR_SOL)
        - NFT <> NFT with fee (NFT_FOR_NFT_WITH_FEE)
        - NFT + SOL <> NFT (NFT_FOR_NFT_PLUS_SOL)
        
        **Rate Limited**: 10 requests per 15 minutes
        **Idempotency**: Supports X-Idempotency-Key header
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgreementRequest'
            examples:
              nftForSol:
                summary: NFT <> SOL Swap
                description: |
                  Direct exchange of NFT for SOL payment.
                  Platform fee: 1% (100 bps). Blockchain fees covered by EasyEscrow.
                  Min: 0.1 SOL, Max: 15 SOL (up to $5,000 AUD)
                value:
                  swapType: "NFT_FOR_SOL"
                  nftMint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  solAmount: "1000000000"
                  seller: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  buyer: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  expiry: "12h"
                  feeBps: 100
                  honorRoyalties: true
              nftForNftWithFee:
                summary: NFT <> NFT (with SOL fee)
                description: |
                  Exchange two NFTs with 0.005 SOL platform fee split 50/50.
                  Each party pays 0.0025 SOL. Blockchain fees covered by EasyEscrow.
                  Min: 0.1 SOL, Max: 15 SOL (up to $5,000 AUD)
                value:
                  swapType: "NFT_FOR_NFT_WITH_FEE"
                  nftMint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  nftBMint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  solAmount: "5000000"
                  seller: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  buyer: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  expiry: "6h"
                  feeBps: 100
                  honorRoyalties: true
              nftPlusSolForNft:
                summary: NFT + SOL <> NFT
                description: |
                  Exchange NFT plus SOL for another NFT.
                  Platform fee: 1% (100 bps). Blockchain fees covered by EasyEscrow.
                  Min: 0.1 SOL, Max: 15 SOL (up to $5,000 AUD)
                value:
                  swapType: "NFT_FOR_NFT_PLUS_SOL"
                  nftMint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  nftBMint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  solAmount: "500000000"
                  seller: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  buyer: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  expiry: "24h"
                  feeBps: 100
                  honorRoyalties: true
      responses:
        '201':
          description: Agreement created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    get:
      tags:
        - Offers
      summary: List offers
      description: Retrieve swap offers with optional filters and pagination
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OfferStatus'
          description: Filter by offer status
        - in: query
          name: makerWallet
          schema:
            type: string
          description: Filter by maker wallet address
        - in: query
          name: takerWallet
          schema:
            type: string
          description: Filter by taker wallet address
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offers:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfferSummary'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Offers
      summary: Create offer
      description: |
        Create a new atomic swap offer.
        
        You can create:
        - **Direct offers** (specify takerWallet) - only that address can accept
        - **Open offers** (omit takerWallet) - anyone can accept
        
        **Rate Limited**: 10 requests per 15 minutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "1000000000"
              solForNft:
                summary: SOL ↔ NFT (Open Offer)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets: []
                  requestedAssets:
                    - mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  offeredSol: "500000000"
                  requestedSol: "0"
              nftForNft:
                summary: NFT ↔ NFT
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  requestedAssets:
                    - mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  offeredSol: "0"
                  requestedSol: "0"
              cnftForSol:
                summary: cNFT ↔ SOL
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "2000000000"
      responses:
        '201':
          description: Offer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "1"
                          status:
                            type: string
                            example: "PENDING"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                            nullable: true
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                          createdAt:
                            type: string
                            format: date-time
                      transaction:
                        type: object
                        properties:
                          nonceAccount:
                            type: string
                            description: Durable nonce account address
                          message:
                            type: string
                            example: "Transaction will be built when offer is accepted"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Validation error - asset ownership or on-chain validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}:
    get:
      tags:
        - Offers
      summary: Get offer details
      description: Retrieve full details for a specific offer
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/OfferDetail'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/counter:
    post:
      tags:
        - Offers
      summary: Create counter-offer
      description: Create a counter-offer to an existing offer with different terms
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            example:
              makerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              takerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              offeredAssets: []
              requestedAssets:
                - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  isCompressed: false
              offeredSol: "1500000000"
              requestedSol: "0"
      responses:
        '201':
          description: Counter-offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      parentOfferId:
                        type: integer
                      status:
                        type: string
                        example: "PENDING"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/cancel:
    post:
      tags:
        - Offers
      summary: Cancel offer
      description: |
        Cancel an active offer. This advances the durable nonce, invalidating any 
        serialized transactions that reference it.
        
        Only the maker can cancel their offer.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - walletAddress
              properties:
                walletAddress:
                  type: string
                  description: Must be the maker's wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
      responses:
        '200':
          description: Offer cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      status:
                        type: string
                        example: "CANCELLED"
                      cancelledAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Offer cancelled and nonce advanced"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Unauthorized - not the maker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/accept:
    post:
      tags:
        - Offers
      summary: Accept offer
      description: |
        Accept an active offer and receive the atomic swap transaction to sign.
        
        The API returns a base64-encoded transaction that you must:
        1. Deserialize
        2. Sign with your wallet
        3. Broadcast to Solana
        4. Call /confirm with the signature
        
        **Requires idempotency key** to prevent duplicate nonce consumption.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - takerWallet
              properties:
                takerWallet:
                  type: string
                  description: Your wallet address (must match offer if it's a direct offer)
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
      responses:
        '200':
          description: Transaction ready for signing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                            example: "ACCEPTED"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                      transaction:
                        type: object
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded transaction to sign and broadcast
                            example: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDz..."
                          nonceAccount:
                            type: string
                            description: Durable nonce account used in the transaction
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not authorized to accept this offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error - asset ownership validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/confirm:
    post:
      tags:
        - Offers
      summary: Confirm swap execution
      description: |
        Confirm that you've broadcast the swap transaction and provide its signature.
        
        The API will verify the transaction on-chain and mark the offer as filled.
        
        **Requires idempotency key** to prevent duplicate confirmations.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Transaction signature from Solana
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
      responses:
        '200':
          description: Swap confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Swap confirmed successfully"
                      signature:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid signature or transaction failed on-chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    OfferId:
      in: path
      name: offerId
      required: true
      schema:
        type: string
      description: Agreement ID
      
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 255
      description: Idempotency key to prevent duplicate requests (required for agreement creation)
      
    TransactionQueryParams:
      in: query
      name: query
      schema:
        type: object
        properties:
          agreementId:
            type: string
            description: Filter by agreement ID
          operationType:
            type: string
            enum: [INIT_ESCROW, DEPOSIT_SOL, DEPOSIT_NFT_A, DEPOSIT_NFT_B, SETTLE, CANCEL, REFUND]
            description: Filter by operation type
          status:
            type: string
            enum: [PENDING, CONFIRMED, FAILED, FINALIZED]
            description: Filter by status
          txId:
            type: string
            description: Filter by transaction ID (partial match)
          dateFrom:
            type: string
            format: date-time
            description: Filter by date range start (ISO 8601)
          dateTo:
            type: string
            format: date-time
            description: Filter by date range end (ISO 8601)
          limit:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            description: Number of results
          offset:
            type: integer
            minimum: 0
            default: 0
            description: Pagination offset
          sortBy:
            type: string
            enum: [timestamp, blockHeight]
            default: timestamp
            description: Sort field
          sortOrder:
            type: string
            enum: [asc, desc]
            default: desc
            description: Sort order

  schemas:
    OfferStatus:
      type: string
      enum:
        - PENDING_INIT
        - PENDING_DEPOSITS
        - SOL_LOCKED
        - NFT_A_LOCKED
        - NFT_B_LOCKED
        - BOTH_LOCKED
        - ALL_LOCKED
        - SETTLED
        - EXPIRED
        - CANCELLED
        - EXPIRED
      description: |
        Agreement status:
        - PENDING_INIT: Agreement is being initialized on-chain
        - PENDING_DEPOSITS: Waiting for required deposits
        - SOL_LOCKED: SOL has been deposited (for NFT<>SOL or NFT+SOL<>NFT swaps)
        - NFT_A_LOCKED: Seller's NFT has been deposited
        - NFT_B_LOCKED: Buyer's NFT has been deposited (for NFT<>NFT swaps)
        - BOTH_LOCKED: Two required assets are locked
        - ALL_LOCKED: All required assets are locked, ready for settlement
        - SETTLED: Agreement has been successfully settled
        - EXPIRED: Agreement has expired without settlement
        - CANCELLED: Agreement has been cancelled

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          example: healthy
        timestamp:
          type: string
          format: date-time
