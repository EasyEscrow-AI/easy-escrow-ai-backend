    # ── Institution Escrow Schemas ──────────────────────────────────────

    InstitutionEscrowCreateRequest:
      type: object
      required:
        - payerWallet
        - recipientWallet
        - amount
        - corridor
        - conditionType
      properties:
        payerWallet:
          type: string
          description: Solana wallet address of the payer (base58, 32-44 chars)
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        recipientWallet:
          type: string
          description: Solana wallet address of the recipient
          example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
        amount:
          type: number
          minimum: 1
          maximum: 10000000
          description: Stablecoin amount (1 to 10,000,000)
          example: 50000
        corridor:
          type: string
          pattern: '^[A-Z]{2}-[A-Z]{2}$'
          description: Payment corridor in ISO country code format (e.g., SG-CH)
          example: "SG-CH"
        conditionType:
          type: string
          enum: [ADMIN_RELEASE, TIME_LOCK, COMPLIANCE_CHECK]
          description: |
            Release condition type:
            - **ADMIN_RELEASE**: Manual release by settlement authority
            - **TIME_LOCK**: Automatic release after time period
            - **COMPLIANCE_CHECK**: Release after compliance verification
          example: "ADMIN_RELEASE"
        expiryHours:
          type: integer
          minimum: 1
          maximum: 2160
          description: Escrow expiry in hours (1 to 2160 / 90 days). Default varies by corridor.
          example: 72
        settlementAuthority:
          type: string
          description: Optional Solana wallet address of the settlement authority
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        tokenMint:
          type: string
          description: |
            Optional SPL token mint address. Must be on the AMINA-approved whitelist.
            Defaults to USDC if omitted. Use `GET /api/v1/institution/tokens` to list available tokens.
          example: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
        timelockHours:
          type: integer
          minimum: 0
          maximum: 2160
          description: |
            Payment timelock in hours (cooling-off period between funding and release).
            0 = disabled. Falls back to client `defaultTimelockHours` setting, then global config (default 24h).
            Must be less than `expiryHours` to prevent un-releasable escrows.
          example: 24
        settlementMode:
          type: string
          enum: [escrow, direct]
          description: "Settlement mode: 'escrow' for PDA vault, 'direct' for direct transfer"
          example: "escrow"
        releaseMode:
          type: string
          enum: [manual, ai]
          description: "Release mode: 'manual' for human approval, 'ai' for AI-driven condition checks"
          example: "manual"
        releaseConditions:
          type: array
          items:
            type: string
            enum: [legal_compliance, invoice_amount_match, client_info_match, document_signature_verified, cdp_policy_approval]
          description: |
            AI release conditions to evaluate when releaseMode is 'ai'.
            `legal_compliance` is always auto-included for AI mode.
            - **legal_compliance**: All legal compliance checks pass (always required for AI mode)
            - **invoice_amount_match**: Invoice amount matches escrow amount exactly
            - **client_info_match**: Client information matches exactly
            - **document_signature_verified**: Document signature is verified (via DocuSign)
            - **cdp_policy_approval**: Release requires CDP (Coinbase Developer Platform) wallet policy approval
          example: ["legal_compliance", "invoice_amount_match"]
        conditions:
          type: array
          items:
            type: string
            enum: [legal_compliance, invoice_amount_match, client_info_match, document_signature_verified, cdp_policy_approval]
          description: Alias for `releaseConditions` — either field is accepted.
        approvalParties:
          type: array
          items:
            type: string
          description: Party identifiers who must approve release (for manual mode)
        approvalInstructions:
          type: string
          description: Free-text instructions for manual reviewers (max 2000 chars)
        payerName:
          type: string
          maxLength: 200
          description: Display name of the payer (e.g., company name)
          example: "Optimus Exchange AG"
        payerAccountLabel:
          type: string
          maxLength: 200
          description: Label for the payer's account
          example: "Operating Account"
        payerBranchName:
          type: string
          maxLength: 200
          description: Payer's branch or office name
          example: "Zürich HQ"
        recipientName:
          type: string
          maxLength: 200
          description: Display name of the recipient (e.g., company name)
          example: "Satoshi Bridge Labs Inc"
        recipientAccountLabel:
          type: string
          maxLength: 200
          description: Label for the recipient's account
          example: "Primary Receiving"
        recipientBranchName:
          type: string
          maxLength: 200
          description: Recipient's branch or office name
          example: "Singapore Office"

    InstitutionEscrowDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        payerWallet:
          type: string
        recipientWallet:
          type: string
          nullable: true
          description: Null when escrow is in DRAFT status
        amount:
          type: number
          description: USDC amount
          example: 50000
        tokenMint:
          type: string
          nullable: true
          description: SPL token mint address used for this escrow. Null defaults to USDC.
          example: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
        corridor:
          type: string
          nullable: true
          example: "SG-CH"
          description: Null when escrow is in DRAFT status
        conditionType:
          type: string
          nullable: true
          enum: [ADMIN_RELEASE, TIME_LOCK, COMPLIANCE_CHECK]
        status:
          type: string
          enum: [DRAFT, CREATED, FUNDED, COMPLIANCE_HOLD, RELEASING, RELEASED, INSUFFICIENT_FUNDS, COMPLETE, CANCELLING, CANCELLED, EXPIRED, FAILED]
          description: |
            Escrow lifecycle status:
            - **DRAFT**: Saved as draft, not yet submitted
            - **CREATED**: Escrow created, awaiting deposit
            - **FUNDED**: USDC deposited and verified
            - **COMPLIANCE_HOLD**: Held for compliance review
            - **RELEASING**: Release in progress
            - **RELEASED**: Funds released to recipient
            - **INSUFFICIENT_FUNDS**: Payer balance too low, can retry after funding
            - **COMPLETE**: Settlement complete, notification sent
            - **CANCELLING**: Cancellation in progress
            - **CANCELLED**: Escrow cancelled, funds refunded
            - **EXPIRED**: Escrow expired without completion
            - **FAILED**: Escrow failed due to an error
        escrowAddress:
          type: string
          nullable: true
          description: On-chain escrow USDC address. Only populated after submission/deposit.
        initTxSignature:
          type: string
          nullable: true
          description: Initialization transaction signature (on-chain escrow creation)
        depositTxSignature:
          type: string
          nullable: true
          description: Deposit transaction signature
        releaseTxSignature:
          type: string
          nullable: true
          description: Release transaction signature
        settlement:
          type: object
          description: Settlement infrastructure details (on-chain accounts and authority)
          properties:
            mode:
              type: string
              enum: [escrow, direct]
              description: "Settlement mode: 'escrow' for PDA vault, 'direct' for direct transfer"
            tokenMint:
              type: string
              description: USDC token mint address used for this escrow
            escrowPda:
              type: string
              nullable: true
              description: On-chain escrow PDA address
            vaultPda:
              type: string
              nullable: true
              description: On-chain token vault PDA address
            nonceAccount:
              type: string
              nullable: true
              description: Durable nonce account for atomic settlement
            authority:
              type: string
              nullable: true
              description: Settlement authority wallet address (admin or CDP wallet)
            isCdpAuthority:
              type: boolean
              description: Whether the settlement authority is a CDP (Coinbase Developer Platform) wallet
        timelockHours:
          type: integer
          nullable: true
          description: Payment timelock in hours (null if not configured)
        unlockAt:
          type: string
          format: date-time
          nullable: true
          description: When the payment timelock expires (null if no timelock or not yet funded)
        releaseMode:
          type: string
          enum: [manual, ai]
          description: "Release mode: 'manual' for human approval, 'ai' for AI-driven condition checks"
        releaseConditions:
          type: array
          items:
            type: string
            enum: [legal_compliance, invoice_amount_match, client_info_match, document_signature_verified, cdp_policy_approval]
          description: AI release conditions to evaluate (only used when releaseMode is 'ai')
        releaseConditionLabels:
          type: array
          items:
            type: string
          description: Human-readable labels for the selected release conditions
        approvalParties:
          type: array
          items:
            type: string
          description: Party identifiers who must approve (for manual release mode)
        approvalInstructions:
          type: string
          nullable: true
          description: Free-text instructions for manual reviewers
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Null when escrow is in DRAFT status (set on submit)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        activityLog:
          type: array
          description: |
            KYT-enriched audit trail of escrow lifecycle events.
            Returned on single-escrow GET for owners only.
            Each entry includes originator/beneficiary data for Travel Rule compliance.
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              action:
                type: string
                enum:
                  - DRAFT_SAVED
                  - DRAFT_UPDATED
                  - DRAFT_SUBMITTED
                  - ESCROW_CREATED
                  - COMPLIANCE_SCREENING
                  - COMPLIANCE_HOLD
                  - DEPOSIT_CONFIRMED
                  - AI_RELEASE_CHECK
                  - FUNDS_RELEASED
                  - ESCROW_COMPLETED
                  - ESCROW_CANCELLED
                  - ESCROW_EXPIRED
                  - INSUFFICIENT_FUNDS
                  - ON_CHAIN_INIT_FAILED
                  - ON_CHAIN_RELEASE_FAILED
                  - ON_CHAIN_CANCEL_FAILED
              title:
                type: string
                description: Human-readable label for the action
                example: "Escrow Created"
              actor:
                type: string
                description: Wallet address, email, or system identifier (e.g. "AI Orchestrator")
              message:
                type: string
                nullable: true
                description: Human-readable summary of the event
                example: "Payment initiated for 50000 USDC on corridor SG-CH"
              txSignature:
                type: string
                nullable: true
                description: On-chain transaction signature (if applicable)
              amount:
                type: number
                nullable: true
                description: Transaction amount in USDC
              currency:
                type: string
                description: Token currency (always "USDC")
              corridor:
                type: string
                nullable: true
                description: Payment corridor (e.g. "SG-CH")
              originator:
                type: object
                nullable: true
                description: KYT originator (payer) data resolved from client records
                properties:
                  name:
                    type: string
                    nullable: true
                  legalName:
                    type: string
                    nullable: true
                  wallet:
                    type: string
                  country:
                    type: string
                    nullable: true
                  registrationCountry:
                    type: string
                    nullable: true
                  lei:
                    type: string
                    nullable: true
                    description: Legal Entity Identifier
              beneficiary:
                type: object
                nullable: true
                description: KYT beneficiary (recipient) data resolved from client records
                properties:
                  name:
                    type: string
                    nullable: true
                  legalName:
                    type: string
                    nullable: true
                  wallet:
                    type: string
                    nullable: true
                  country:
                    type: string
                    nullable: true
                  registrationCountry:
                    type: string
                    nullable: true
                  lei:
                    type: string
                    nullable: true
              riskScore:
                type: number
                nullable: true
                description: AI risk score (0-100) if applicable
              conditions:
                type: array
                nullable: true
                description: AI release condition results (for AI_RELEASE_CHECK action)
                items:
                  type: object
                  properties:
                    condition:
                      type: string
                    label:
                      type: string
                    passed:
                      type: boolean
                    detail:
                      type: string
              details:
                type: object
                description: Full event details including KYT context
              createdAt:
                type: string
                format: date-time

