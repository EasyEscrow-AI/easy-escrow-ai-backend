  # ── AI Chat ─────────────────────────────────────────────────────────

  /api/v1/ai/chat:
    post:
      tags:
        - AI Chat
      summary: Chat with AI assistant
      description: |
        Send a message to the EasyEscrow AI assistant. Supports multi-turn conversations
        via the `history` parameter.

        Optionally pass `escrowId` to pre-load escrow context into the conversation,
        enabling faster and more specific answers about a particular escrow without
        requiring tool call round-trips.

        All messages are processed through a PII anonymization pipeline before reaching
        the AI model. Responses are de-anonymized before returning.

        **Rate limit:** 30 requests per minute per client.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  minLength: 1
                  maxLength: 4000
                  description: The message to send to the AI assistant
                  example: "What are the compliance requirements for a cross-border escrow between Singapore and the EU?"
                escrowId:
                  type: string
                  description: |
                    Optional escrow code (EE-XXX-XXX) or UUID. When provided, the backend
                    pre-fetches escrow details and injects them as context, enabling faster
                    and more specific answers about that escrow.
                  oneOf:
                    - pattern: '^EE-[A-Z0-9]{3,4}-[A-Z0-9]{3,4}$'
                      description: Escrow code format
                    - format: uuid
                      description: Escrow UUID
                  example: "EE-A1B-C2D"
                history:
                  type: array
                  maxItems: 50
                  description: Previous conversation messages for multi-turn context
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                        description: Who sent the message
                      content:
                        type: string
                        minLength: 1
                        maxLength: 4000
                        description: Message content
                  example:
                    - role: "user"
                      content: "What tokens are supported?"
                    - role: "assistant"
                      content: "EasyEscrow supports USDC as the primary stablecoin..."
      responses:
        '200':
          description: AI response generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - reply
                    properties:
                      reply:
                        type: string
                        description: AI assistant's response text
                        example: "For cross-border escrow between Singapore and the EU, the key compliance requirements include..."
                      toolsUsed:
                        type: array
                        items:
                          type: string
                        description: Database tools invoked to answer the question (e.g. search_escrows, get_escrow_details)
                        example: ["get_escrow_details"]
                      faqId:
                        type: string
                        description: FAQ entry ID if the response was served from the FAQ fast-path
                        example: "platform-fees"
                      usage:
                        type: object
                        description: Token usage for the AI API call (0/0 for FAQ fast-path responses)
                        properties:
                          inputTokens:
                            type: integer
                            example: 1250
                          outputTokens:
                            type: integer
                            example: 180
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Validation error (message too long, invalid history format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded or AI service rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: AI service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

