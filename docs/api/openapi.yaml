        byOperationType:
          type: object
          additionalProperties:
            type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        firstTransaction:
          type: string
          format: date-time
        lastTransaction:
          type: string
          format: date-time

    AgreementTransactionsResponse:
      type: object
      properties:
        agreementId:
          type: string
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
        stats:
          type: object
          properties:
            totalTransactions:
              type: integer
            byOperationType:
              type: object
              additionalProperties:
                type: integer
            byStatus:
              type: object
              additionalProperties:
                type: integer
            firstTransaction:
              type: string
              format: date-time
            lastTransaction:
              type: string
              format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [ESCROW_FUNDED, ESCROW_ASSET_LOCKED, ESCROW_SETTLED, ESCROW_EXPIRED, ESCROW_REFUNDED]
        targetUrl:
          type: string
        status:
          type: string
          enum: [PENDING, DELIVERED, FAILED]
        attempts:
          type: integer
        maxAttempts:
          type: integer
        lastAttemptAt:
          type: string
          format: date-time
        lastResponseCode:
          type: integer
        deliveredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        scheduledFor:
          type: string
          format: date-time

    WebhookListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        agreementId:
          type: string
        count:
          type: integer
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'

    WebhookStatusResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        webhook:
          allOf:
            - $ref: '#/components/schemas/Webhook'
            - type: object
              properties:
                agreementId:
                  type: string
                lastResponseBody:
                  type: string
                payload:
                  type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid wallet address format"
        timestamp:
          type: string
          format: date-time

    # ==========================================================================
    # DATASALES SCHEMAS
    # ==========================================================================

    DataSalesStatus:
      type: string
      enum:
        - PENDING_DEPOSITS
        - DATA_LOCKED
        - SOL_LOCKED
        - BOTH_LOCKED
        - APPROVED
        - SETTLED
        - EXPIRED
        - CANCELLED
        - ARCHIVED

    CreateDataSalesAgreementRequest:
      type: object
      required:
        - sellerWallet
        - priceLamports
      properties:
        sellerWallet:
          type: string
        buyerWallet:
          type: string
        priceLamports:
          type: string
        platformFeeBps:
          type: integer
          default: 250
        depositWindowHours:
          type: integer
          default: 72
        accessDurationHours:
          type: integer
          default: 168
        files:
          type: array
          items:
            type: object

    CreateDataSalesAgreementResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            agreementId:
              type: string
            s3BucketName:
              type: string
            escrowPda:
              type: string
            vaultPda:
              type: string
            depositWindowEndsAt:
              type: string
              format: date-time
            uploadUrls:
              type: array
              items:
                $ref: '#/components/schemas/PresignedUrl'
        timestamp:
          type: string
          format: date-time

    DataSalesAgreementResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/DataSalesAgreement'
        timestamp:
          type: string
          format: date-time

    DataSalesAgreementListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            agreements:
              type: array
              items:
                $ref: '#/components/schemas/DataSalesAgreement'
        timestamp:
          type: string
          format: date-time

    DataSalesAgreement:
      type: object
      properties:
        id:
          type: string
        agreementId:
          type: string
        sellerWallet:
          type: string
        buyerWallet:
          type: string
        priceLamports:
          type: string
        platformFeeLamports:
          type: string
        platformFeeBps:
          type: integer
        depositWindowEndsAt:
          type: string
          format: date-time
        accessDurationHours:
          type: integer
        accessExpiresAt:
          type: string
          format: date-time
        s3BucketName:
          type: string
        s3Region:
          type: string
        files:
          type: array
          items:
            type: object
        totalSizeBytes:
          type: string
        escrowPda:
          type: string
        solVaultPda:
          type: string
        sellerDepositedAt:
          type: string
          format: date-time
        buyerDepositedAt:
          type: string
          format: date-time
        buyerDepositTxId:
          type: string
        verifiedAt:
          type: string
          format: date-time
        verifiedBy:
          type: string
        rejectionReason:
          type: string
        rejectionCount:
          type: integer
        status:
          $ref: '#/components/schemas/DataSalesStatus'
        settleTxSignature:
          type: string
        settledAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time

    PresignedUrl:
      type: object
      properties:
        name:
          type: string
        s3Key:
          type: string
        url:
          type: string
        expiresAt:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication

    DataSalesApiKey:
      type: apiKey
      in: header
      name: X-DataSales-API-Key
      description: API key for DataSales backend authentication
