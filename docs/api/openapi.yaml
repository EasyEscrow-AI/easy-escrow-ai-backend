  # ── AI Analysis — Escrow Analysis ───────────────────────────────────

  /api/v1/ai/analyze-escrow/{escrow_id}:
    post:
      tags:
        - AI Analysis
      summary: Analyze escrow
      description: |
        Run a step-by-step AI compliance analysis on an escrow at **any status** (DRAFT, CREATED, FUNDED, etc.).
        Provides analysis for each stage of the escrow creation process:

        | Section | Analyzes |
        |---------|----------|
        | `from_account` | Payer wallet, client KYC/KYB, entity type, risk rating |
        | `to_account` | Recipient wallet presence and risk indicators |
        | `corridor` | From→To jurisdiction, regulatory risk |
        | `amount` | Amount vs corridor limits, large transaction flags |
        | `settlement` | Token mint, escrow PDA, deposit status, on-chain state |
        | `release` | Condition type (ADMIN_RELEASE, TIME_LOCK, COMPLIANCE_CHECK), settlement authority |
        | `advanced` | Expiry timeout, nonce account, documents, 3rd party release |
        | `overview` | Combined compliance conclusion with risk score |

        Each section returns a `status` (pass/warning/fail/pending) and `findings`.
        Sections are marked `pending` when the escrow data for that step is not yet available (e.g., DRAFT without recipient).

        **Data Anonymization**: Sensitive fields are tokenized before AI and de-anonymized in the response.

        **Rate Limited**: 10 requests per minute.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: escrow_id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID to analyze
        - in: query
          name: anonymize
          required: false
          schema:
            type: boolean
            default: true
          description: Tokenize sensitive data before AI analysis (default true)
      responses:
        '200':
          description: Escrow analysis completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AiAnalysisResultWithSummary'
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '503':
          description: AI analysis service not configured (ANTHROPIC_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

