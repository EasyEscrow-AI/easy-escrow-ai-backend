info:
  title: EasyEscrow.ai API
  version: 1.2.0
  description: |
    Full OpenAPI spec (JSON): [/openapi.json](/openapi.json)
  contact:
    name: EasyEscrow.ai Support
    email: support@easyescrow.ai

servers:
  - url: http://localhost:3000
