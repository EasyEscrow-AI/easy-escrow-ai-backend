    # ── AI Analysis Schemas ─────────────────────────────────────────────

    AiAnalyzeRequest:
      type: object
      required:
        - fileId
      properties:
        fileId:
          type: string
          format: uuid
          description: ID of the uploaded file to analyze
        context:
          type: object
          description: Optional context to improve analysis accuracy
          properties:
            expectedAmount:
              type: number
              minimum: 0
              description: Expected payment amount for cross-referencing
              example: 50000
            poNumber:
              type: string
              maxLength: 100
              description: Purchase order number for verification
              example: "PO-2025-0042"

    AiAnalysisResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        escrowId:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
        riskScore:
          type: number
          minimum: 0
          maximum: 100
          description: Risk score from 0 (low risk) to 100 (high risk)
          example: 15
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          description: Categorized risk level
          example: "LOW"
        findings:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
                example: "DOCUMENT_AUTHENTICITY"
              severity:
                type: string
                enum: [INFO, WARNING, CRITICAL]
              message:
                type: string
                example: "Document appears authentic with consistent formatting"
          description: Individual analysis findings
        summary:
          type: string
          description: Human-readable summary of the analysis
          example: "Document passes all checks with low risk indicators"
        analyzedAt:
          type: string
          format: date-time

    AiAnalysisResultWithSummary:
      type: object
      properties:
        riskScore:
          type: number
          minimum: 0
          maximum: 100
          description: Risk score from 0 (low risk) to 100 (high risk)
          example: 15
        recommendation:
          type: string
          enum: [APPROVE, REVIEW, REJECT]
          description: AI recommendation based on analysis
          example: "APPROVE"
        summary:
          type: string
          description: One-line AI compliance conclusion
          example: "Low-risk escrow with verified KYC on a standard SG-CH corridor — no compliance concerns."
        sections:
          type: object
          description: Step-by-step analysis for each stage of escrow creation. Each section has status (pass/warning/fail/pending), title, and findings.
          properties:
            from_account:
              $ref: '#/components/schemas/AiAnalysisSection'
            to_account:
              $ref: '#/components/schemas/AiAnalysisSection'
            corridor:
              $ref: '#/components/schemas/AiAnalysisSection'
            amount:
              $ref: '#/components/schemas/AiAnalysisSection'
            settlement:
              $ref: '#/components/schemas/AiAnalysisSection'
            release:
              $ref: '#/components/schemas/AiAnalysisSection'
            advanced:
              $ref: '#/components/schemas/AiAnalysisSection'
            overview:
              $ref: '#/components/schemas/AiAnalysisSection'
        extractedFields:
          type: object
          description: Key fields extracted and evaluated by the AI
          example:
            escrow_status: "CREATED"
            amount_usd: 1000
            corridor: "SG-CH"
            kyc_verified: true
        factors:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: "corridor_risk"
              weight:
                type: number
                minimum: 0
                maximum: 1
                example: 0.3
              value:
                type: number
                minimum: 0
                maximum: 100
                example: 10
          description: Individual risk factors with weights
        details:
          type: string
          description: Brief explanation of risk factors
          example: "SG-CH corridor is low risk with standard documentation requirements."

    AiAnalysisSection:
      type: object
      properties:
        status:
          type: string
          enum: [pass, warning, fail, pending]
          description: |
            - `pass` — No issues, compliant
            - `warning` — Minor concerns, not blocking
            - `fail` — Compliance risk, requires attention
            - `pending` — Required data not yet provided (e.g. DRAFT escrow)
        title:
          type: string
          example: "From Account (Payer)"
        findings:
          type: string
          description: 1-2 concise sentence analysis for this step
          example: "Payer wallet belongs to a verified PREMIUM-tier institution with low risk rating."
        checked_fields:
          type: array
          items:
            type: string
          description: Field names the AI evaluated for this section
          example: ["payerWallet", "client.kycStatus", "client.riskRating"]
        recommended_corridor:
          type: string
          nullable: true
          description: Only present on the corridor section. Best corridor code from available corridors, or null if none available.
          example: "SG-CH"

    InstitutionAccount:
      type: object
      description: A Solana wallet account linked to an institution
      properties:
        id:
          type: string
          format: uuid
          description: Unique account identifier
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        clientId:
          type: string
          format: uuid
          description: Owning institution client ID
        walletAddress:
          type: string
          description: Solana wallet public key
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        accountType:
          type: string
          enum: [TREASURY, OPERATIONS, SETTLEMENT, COLLATERAL, GENERAL]
          description: Purpose classification
          example: "TREASURY"
        label:
          type: string
          description: Human-readable label
          example: "Main Treasury"
        isDefault:
          type: boolean
          description: Whether this is the default account for new escrows
          example: true
        branchId:
          type: string
          format: uuid
          nullable: true
          description: Linked branch UUID (use `GET /branches` to resolve metadata)
          example: "b861b2a8-42de-451b-9f8c-995d9bf5f47c"
        isActive:
          type: boolean
          description: Whether the account is active
          example: true
        verificationStatus:
          type: string
          enum: [PENDING, VERIFIED, SUSPENDED, REJECTED]
          description: Account verification status
          example: "VERIFIED"
        balance:
          type: object
          description: Current balance information (included when fetched)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Institution Branch Schemas ─────────────────────────────────────

    InstitutionBranch:
      type: object
      description: A geographic branch of an institution
      properties:
        id:
          type: string
          format: uuid
          example: "b861b2a8-42de-451b-9f8c-995d9bf5f47c"
        name:
          type: string
          example: "Zurich HQ"
        city:
          type: string
          example: "Zurich"
        country:
          type: string
          example: "Switzerland"
        countryCode:
          type: string
          description: ISO 3166-1 alpha-2
          example: "CH"
        address:
          type: string
          nullable: true
          example: "Bahnhofstrasse 42, 8001 Zurich"
        timezone:
          type: string
          example: "Europe/Zurich"
        regulatoryBody:
          type: string
          nullable: true
          example: "FINMA"
        riskScore:
          type: integer
          description: Numeric risk score (0-100)
          example: 5
        riskLevel:
          type: string
          enum: [low, medium, high]
          description: "Computed: 0-20 = low, 21-50 = medium, 51+ = high"
          example: "low"
        complianceStatus:
          type: string
          enum: [ACTIVE, SUSPENDED, UNDER_REVIEW, BLOCKED]
          example: "ACTIVE"
        isSanctioned:
          type: boolean
          example: false
        isHeadquarters:
          type: boolean
          description: "`true` for the first (oldest) branch"
          example: true
        isActive:
          type: boolean
          example: true
        accounts:
          type: array
          description: Active accounts linked to this branch
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
              label: { type: string }
              accountType: { type: string, enum: [TREASURY, OPERATIONS, SETTLEMENT, COLLATERAL, GENERAL] }
              walletAddress: { type: string }
              chain: { type: string, example: "solana" }
              verificationStatus: { type: string, enum: [PENDING, VERIFIED, SUSPENDED, REJECTED] }
              isDefault: { type: boolean }
        createdAt:
          type: string
          format: date-time

    # ── Institution Notification Schemas ────────────────────────────────

    InstitutionNotification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        escrowId:
          type: string
          nullable: true
          description: Related escrow ID (if applicable)
        type:
          type: string
          enum:
            - ESCROW_CREATED
            - ESCROW_FUNDED
            - ESCROW_INSUFFICIENT_FUNDS
            - ESCROW_RELEASED
            - ESCROW_CANCELLED
            - ESCROW_EXPIRED
            - ESCROW_COMPLIANCE_HOLD
            - DEPOSIT_CONFIRMED
            - SETTLEMENT_COMPLETE
            - COMPLIANCE_CHECK_FAILED
            - COMPLIANCE_REVIEW_REQUIRED
            - SECURITY_ALERT
            - SYSTEM_MAINTENANCE
          description: Notification event type
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        title:
          type: string
          example: "Escrow Created"
        message:
          type: string
          example: "Escrow EE-ABC-123 created for 5000 USDC on corridor SG-CH."
        metadata:
          type: object
          description: Additional context (amount, corridor, txSignature, etc.)
        isRead:
          type: boolean
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Institution Admin Schemas ───────────────────────────────────────

    AdminAllowlistAdd:
      type: object
      required:
        - wallet
        - clientId
      properties:
        wallet:
          type: string
          description: Solana wallet address to add (base58)
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        clientId:
          type: string
          format: uuid
          description: Institution client ID to associate with the wallet

    AdminAllowlistEntry:
      type: object
      properties:
        wallet:
          type: string
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        clientId:
          type: string
          format: uuid
        addedAt:
          type: string
          format: date-time

    AdminCorridorConfig:
      type: object
      required:
        - sourceCountry
        - destCountry
        - minAmount
        - maxAmount
        - dailyLimit
        - monthlyLimit
        - riskLevel
      properties:
        sourceCountry:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 source country code
          example: "SG"
        destCountry:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 destination country code
          example: "CH"
        minAmount:
          type: number
          minimum: 0
          description: Minimum transaction amount (USDC)
          example: 100
        maxAmount:
          type: number
          minimum: 1
          description: Maximum transaction amount (USDC)
          example: 1000000
        dailyLimit:
          type: number
          minimum: 1
          description: Daily transaction limit per client (USDC)
          example: 500000
        monthlyLimit:
          type: number
          minimum: 1
          description: Monthly transaction limit per client (USDC)
          example: 5000000
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          description: Risk classification for the corridor
          example: "LOW"
        requiredDocuments:
          type: array
          items:
            type: string
          description: Document types required for this corridor
          example: ["INVOICE", "PURCHASE_ORDER"]

    AdminCorridor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: Corridor code (source-dest)
          example: "SG-CH"
        sourceCountry:
          type: string
          example: "SG"
        destCountry:
          type: string
          example: "CH"
        minAmount:
          type: number
          example: 100
        maxAmount:
          type: number
          example: 1000000
        dailyLimit:
          type: number
          example: 500000
        monthlyLimit:
          type: number
          example: 5000000
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        requiredDocuments:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid wallet address format"
        timestamp:
          type: string
          format: date-time

    PresignedUrl:
      type: object
      properties:
        name:
          type: string
        s3Key:
          type: string
        url:
          type: string
        expiresAt:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for admin authentication
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from /api/v1/institution/auth/login
    SettlementAuthority:
      type: apiKey
      in: header
      name: X-Settlement-Authority-Key
      description: Settlement authority API key for release operations
