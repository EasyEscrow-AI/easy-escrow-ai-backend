  # =============================================================================
  # BULK SWAPS API - Two-Phase Lock/Settle for Complex Swaps
  # =============================================================================

  /api/offers/bulk:
    post:
      tags:
        - Bulk Swaps
      summary: Create a bulk swap offer
      description: |
        Create a bulk/complex swap offer using two-phase lock/settle.

        Use this for:
        - Swaps with 3+ cNFTs on either side
        - Complex multi-asset swaps
        - Any swap that requires chunked settlement

        For simpler swaps, use `POST /api/offers` which auto-detects the strategy.

        **Rate Limited**: Strict rate limiting applies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - partyA
                - assetsA
              properties:
                partyA:
                  type: string
                  description: Initiator wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                partyB:
                  type: string
                  description: Counterparty wallet (optional for open offers)
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                assetsA:
                  type: array
                  description: Party A's assets to trade
                  items:
                    type: object
                    properties:
                      mint:
                        type: string
                      isCompressed:
                        type: boolean
                      isCoreNft:
                        type: boolean
                assetsB:
                  type: array
                  description: Party B's assets to trade
                  items:
                    type: object
                    properties:
                      mint:
                        type: string
                      isCompressed:
                        type: boolean
                      isCoreNft:
                        type: boolean
                solAmountA:
                  type: string
                  description: SOL from Party A in lamports
                solAmountB:
                  type: string
                  description: SOL from Party B in lamports
                lockTimeoutSeconds:
                  type: integer
                  description: Lock phase timeout (default 30 minutes)
                platformFeeLamports:
                  type: string
                  description: Custom platform fee in lamports
      responses:
        '201':
          description: Bulk offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        $ref: '#/components/schemas/TwoPhaseSwap'
                      offerId:
                        type: string
                      executionStrategy:
                        type: string
                        example: "two-phase"
                      requiresLockPhase:
                        type: boolean
                        example: true
                      message:
                        type: string
                      nextAction:
                        type: string
                        example: "Counterparty should call POST /api/offers/bulk/:id/accept"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/bulk/{id}:
    get:
      tags:
        - Bulk Swaps
      summary: Get bulk swap details
      description: Retrieve full details for a bulk swap offer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Bulk swap ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        $ref: '#/components/schemas/TwoPhaseSwap'
                      executionStrategy:
                        type: string
                        example: "two-phase"
                      pdas:
                        type: object
                        properties:
                          delegatePDA:
                            type: string
                          solVaultA:
                            type: string
                          solVaultB:
                            type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/bulk/{id}/accept:
    post:
      tags:
        - Bulk Swaps
      summary: Accept bulk swap
      description: |
        Accept a bulk swap offer as Party B.

        Returns the lock transaction for Party A to sign and submit.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - partyB
              properties:
                partyB:
                  type: string
                  description: Party B wallet address
      responses:
        '200':
          description: Offer accepted, lock transaction ready for Party A
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        $ref: '#/components/schemas/TwoPhaseSwap'
                      lockTransaction:
                        $ref: '#/components/schemas/LockTransaction'
                      message:
                        type: string
                      nextAction:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/bulk/{id}/lock:
    post:
      tags:
        - Bulk Swaps
      summary: Build lock transaction
      description: Build the lock transaction for a party to lock their assets
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - walletAddress
              properties:
                walletAddress:
                  type: string
                  description: Wallet address of the party locking assets
      responses:
        '200':
          description: Lock transaction ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      party:
                        type: string
                        enum: [A, B]
                      lockTransaction:
                        $ref: '#/components/schemas/LockTransaction'
                      message:
                        type: string
                      nextAction:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not a party to this swap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/bulk/{id}/confirm-lock:
    post:
      tags:
        - Bulk Swaps
      summary: Confirm lock transaction
      description: Confirm that the lock transaction was executed on-chain
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
