  # ── Institution Account Transfers ──────────────────────────────────

  /api/v1/institution/accounts/transfer/prepare:
    post:
      tags:
        - Institution Account Transfers
      summary: Prepare internal account transfer
      description: |
        Validate the transfer, build a Solana transaction with admin as fee payer,
        and return the partially-signed transaction for the account owner to sign.
        The frontend must sign with the account owner's wallet, submit to Solana,
        then call /submit with the resulting txSignature.
      security:
        - InstitutionBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fromAccountId
                - toAccountId
                - tokenSymbol
                - amount
                - walletSignature
                - signerPublicKey
                - timestamp
              properties:
                fromAccountId:
                  type: string
                  description: Source account UUID
                toAccountId:
                  type: string
                  description: Destination account UUID
                tokenSymbol:
                  type: string
                  enum: [USDC, EURC, USDT, PYUSD]
                  description: SPL token symbol
                amount:
                  type: number
                  description: Amount in token units
                walletSignature:
                  type: string
                  description: Base64-encoded wallet signature
                signerPublicKey:
                  type: string
                  description: Signer's Solana public key (base58)
                timestamp:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp used in the signed message (must be within 5 minutes)
                note:
                  type: string
                  description: Optional memo
      responses:
        '200':
          description: Transfer prepared — partially-signed transaction returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TransferPrepareResponse'
                  timestamp:
                    type: string
        '400':
          description: Validation error, insufficient balance, or signature verification failed
        '403':
          description: Account does not belong to authenticated institution
        '404':
          description: Account not found
        '409':
          description: Transfer already in progress

  /api/v1/institution/accounts/transfer/submit:
    post:
      tags:
        - Institution Account Transfers
      summary: Submit signed transfer transaction
      description: |
        After the account owner signs the prepared transaction and submits it to Solana,
        call this endpoint with the transfer code and on-chain transaction signature
        to finalize the transfer record.
      security:
        - InstitutionBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transferCode
                - txSignature
              properties:
                transferCode:
                  type: string
                  description: Transfer code returned by /prepare
                  example: TXF-A3K-9NZ
                txSignature:
                  type: string
                  description: On-chain transaction signature (base58)
      responses:
        '200':
          description: Transfer completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TransferReceipt'
                  timestamp:
                    type: string
        '400':
          description: Transaction failed on-chain or transfer in wrong status
        '404':
          description: Transfer not found or transaction not yet confirmed
        '410':
          description: Transfer expired — call /prepare again

