  - name: Institution Escrow
    description: Cross-border stablecoin escrow payment lifecycle
  - name: AI Analysis
    description: AI-powered escrow document risk analysis (renamed routes)
  - name: Institution Admin
    description: Admin operations for allowlist and corridor management

