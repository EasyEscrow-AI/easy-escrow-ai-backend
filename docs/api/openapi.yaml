    description: Two-phase lock/settle swaps for bulk and complex multi-asset exchanges

paths:
  /:
    get:
      tags:
        - Health
      summary: API root
      description: Returns API information and available endpoints
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: EasyEscrow.ai Backend API
                  version:
                    type: string
                    example: 1.0.0
                  endpoints:
                    type: object
                    properties:
                      health:
                        type: string
                        example: /health
                      offers:
                        type: string
                        example: /api/offers
                  documentation:
                    type: string
                    example: /docs

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API and all connected services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/quote:
    post:
      tags:
        - Quote
      summary: Get swap quote
      description: |
        Get a comprehensive quote for an atomic swap including:
        - **SOL price** in USD (cached from CoinGecko)
        - **Network fees** (based on actual Solana signature costs)
        - **Platform fees** (percentage, flat, or zero-fee for API key users)
        - **Transaction size** estimation with ALT support
        - **Time estimates** based on NFT count and types
        - **Warnings** about cNFT limitations or multi-asset restrictions
        - **Swap feasibility** check (`canSwap` boolean)
        
        This endpoint consolidates all information needed for the swap confirmation modal.
        
        **Note:** cNFT transaction size estimates use worst-case proof node counts (14 nodes)
        since actual proof size varies by tree canopy depth and cannot be determined without
        fetching the full proof data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL Quote
                description: Quote for trading an SPL NFT for SOL
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                      name: "Cool NFT #123"
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 100000000
              cnftForSol:
                summary: cNFT ↔ SOL Quote
                description: Quote for trading a compressed NFT for SOL (larger transaction)
                value:
                  makerAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                      name: "Compressed NFT"
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 200000000
              nftForNft:
                summary: NFT ↔ NFT Quote
                description: Quote for trading two NFTs
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  takerAssets:
                    - mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  makerSolLamports: 0
                  takerSolLamports: 0
              zeroFee:
                summary: Zero-Fee Quote (API Key)
                description: Quote with zero platform fee using API key
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 500000000
                  apiKey: "your-api-key-here"
      responses:
        '200':
          description: Quote generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers:
    get:
      tags:
        - Offers
      summary: List offers
      description: Retrieve swap offers with optional filters and pagination
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OfferStatus'
          description: Filter by offer status
        - in: query
          name: makerWallet
          schema:
            type: string
          description: Filter by maker wallet address
        - in: query
          name: takerWallet
          schema:
            type: string
          description: Filter by taker wallet address
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offers:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfferSummary'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Offers
      summary: Create offer (unified endpoint)
      description: |
        Create a new swap offer with automatic type detection.

        This unified endpoint supports **three offer types**:

        ### 1. Atomic Swap (default)
        Standard swaps for NFT↔NFT, NFT↔SOL, cNFT↔SOL.
        Use `makerWallet`, `offeredAssets`, `requestedAssets`, etc.

        ### 2. cNFT Bid (auto-detected when bidderWallet + targetAssetId + offerLamports present)
        Make a SOL bid on a specific cNFT.
        Use `bidderWallet`, `targetAssetId`, `offerLamports`.

        ### 3. Bulk Two-Phase Swap (auto-detected for 3+ cNFTs or 5+ total assets)
        Complex multi-asset swaps using lock/settle pattern.
        Use `partyA`, `assetsA`, `assetsB`, or standard fields.

        **Field Aliases Supported:**
        - `partyA` → `makerWallet`
        - `partyB` → `takerWallet`
        - `assetsA` → `offeredAssets`
        - `assetsB` → `requestedAssets`
        - `solAmountA` → `offeredSol`
        - `solAmountB` → `requestedSol`

        **Rate Limited**: 10 requests per 15 minutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL (Atomic)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "1000000000"
              cnftForSol:
                summary: cNFT ↔ SOL (Atomic)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "2000000000"
              cnftBid:
                summary: cNFT Bid (auto-detected)
                value:
                  bidderWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  targetAssetId: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                  offerLamports: "1000000000"
                  durationSeconds: 86400
              bulkSwapPartyStyle:
                summary: Bulk Swap (partyA/B style)
                value:
                  partyA: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  partyB: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  assetsA:
                    - mint: "Asset1MintAddress"
                      isCompressed: true
                    - mint: "Asset2MintAddress"
                      isCompressed: true
                    - mint: "Asset3MintAddress"
                      isCompressed: true
                  assetsB:
                    - mint: "Asset4MintAddress"
                      isCompressed: false
                  solAmountA: "0"
                  solAmountB: "500000000"
      responses:
        '201':
          description: Offer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "1"
                          status:
                            type: string
                            example: "PENDING"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                            nullable: true
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                          createdAt:
                            type: string
                            format: date-time
                      transaction:
                        type: object
                        properties:
                          nonceAccount:
                            type: string
                            description: Durable nonce account address
                          message:
                            type: string
                            example: "Transaction will be built when offer is accepted"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Validation error - asset ownership or on-chain validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}:
    get:
      tags:
        - Offers
      summary: Get offer details
      description: Retrieve full details for a specific offer
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/OfferDetail'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/counter:
    post:
      tags:
        - Offers
      summary: Create counter-offer
      description: Create a counter-offer to an existing offer with different terms
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            example:
              makerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              takerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              offeredAssets: []
              requestedAssets:
                - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  isCompressed: false
              offeredSol: "1500000000"
              requestedSol: "0"
      responses:
        '201':
          description: Counter-offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      parentOfferId:
                        type: integer
                      status:
                        type: string
                        example: "PENDING"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/cancel:
    post:
      tags:
        - Offers
      summary: Cancel offer
      description: |
        Cancel an active offer. This advances the durable nonce, invalidating any 
        serialized transactions that reference it.
        
        Only the maker can cancel their offer.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - walletAddress
              properties:
                walletAddress:
                  type: string
                  description: Must be the maker's wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
      responses:
        '200':
          description: Offer cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      status:
                        type: string
                        example: "CANCELLED"
                      cancelledAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Offer cancelled and nonce advanced"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Unauthorized - not the maker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/accept:
    post:
      tags:
        - Offers
      summary: Accept offer
      description: |
        Accept an active offer and receive the atomic swap transaction(s) to sign.
        
        **Single Transaction (Simple swaps):**
        The API returns a base64-encoded transaction that you must:
        1. Deserialize
        2. Sign with your wallet
        3. Broadcast to Solana
        4. Call /confirm with the signature
        
        **Multiple Transactions (Bulk swaps):**
        For swaps involving 3+ NFTs of any type, the API may return multiple transactions in a `bulkSwap` object:
        - Each transaction must be signed by the appropriate party (maker or taker)
        - Transactions should be sent sequentially or as a Jito bundle
        - The `requiredSigners` array indicates which wallet(s) must sign each transaction
        - On mainnet, transactions are bundled atomically via Jito
        
        **Requires idempotency key** to prevent duplicate nonce consumption.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - takerWallet
              properties:
                takerWallet:
                  type: string
                  description: Your wallet address (must match offer if it's a direct offer)
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
      responses:
        '200':
          description: Transaction ready for signing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                            example: "ACCEPTED"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                      transaction:
                        type: object
                        description: Single transaction (for simple swaps without cNFTs)
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded transaction to sign and broadcast
                            example: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDz..."
                          nonceAccount:
                            type: string
                            description: Durable nonce account used in the transaction
                      bulkSwap:
                        type: object
                        description: Multiple transactions (for bulk swaps with 3+ NFTs of any type)
                        properties:
                          isBulkSwap:
                            type: boolean
                            description: Indicates this is a bulk swap with multiple transactions
                            example: true
                          strategy:
                            type: string
                            description: |
                              Swap strategy:
                              - SINGLE_TRANSACTION: Simple swap via escrow program
                              - DIRECT_BUBBLEGUM_BUNDLE: cNFT bulk swap
                              - DIRECT_NFT_BUNDLE: SPL/Core NFT bulk swap
                              - MIXED_NFT_BUNDLE: Mixed NFT types bulk swap
                            enum:
                              - SINGLE_TRANSACTION
                              - DIRECT_BUBBLEGUM_BUNDLE
                              - DIRECT_NFT_BUNDLE
                              - MIXED_NFT_BUNDLE
                            example: "DIRECT_BUBBLEGUM_BUNDLE"
                          transactionCount:
                            type: integer
                            description: Number of transactions in the bundle
                            example: 2
                          requiresJitoBundle:
                            type: boolean
                            description: Whether Jito bundle is required (mainnet only)
                            example: true
                          transactions:
                            type: array
                            description: Array of transactions to sign and send
                            items:
                              type: object
                              properties:
                                index:
                                  type: integer
                                  description: Transaction index in the bundle
                                  example: 0
                                purpose:
                                  type: string
                                  description: Purpose of this transaction
                                  example: "SOL transfers and platform fee"
                                serializedTransaction:
                                  type: string
                                  description: Base64-encoded transaction
                                requiredSigners:
                                  type: array
                                  description: Wallet addresses that must sign this transaction
                                  items:
                                    type: string
                                  example: ["8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"]
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not authorized to accept this offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error - asset ownership validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/confirm:
    post:
      tags:
        - Offers
      summary: Confirm swap execution
      description: |
        Confirm that you've broadcast the swap transaction and provide its signature.
        
        The API will verify the transaction on-chain and mark the offer as filled.
        
        **Requires idempotency key** to prevent duplicate confirmations.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Transaction signature from Solana
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
      responses:
        '200':
          description: Swap confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Swap confirmed successfully"
                      signature:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid signature or transaction failed on-chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/bundle-status:
    get:
      tags:
        - Bundle Monitoring
      summary: Get bundle execution status
      description: |
        Get the current status of a bulk swap bundle execution (for swaps with 3+ NFTs).
        
        Bundle statuses:
        - **PENDING**: Bundle created, not yet submitted
        - **SUBMITTED**: Bundle submitted to Jito/RPC
        - **LANDED**: All transactions confirmed on-chain
        - **FAILED**: Bundle execution failed
        - **PARTIAL**: Some transactions succeeded, some failed
        - **TIMEOUT**: Bundle submission timed out
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Bundle status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: string
                      bundleStatus:
                        type: string
                        enum: [PENDING, SUBMITTED, LANDED, FAILED, PARTIAL, TIMEOUT]
                      transactionCount:
                        type: integer
                      confirmedCount:
                        type: integer
                      failedCount:
                        type: integer
                      signatures:
                        type: array
                        items:
                          type: string
                      error:
                        type: string
                        nullable: true
                      updatedAt:
                        type: string
                        format: date-time
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/retry-bundle:
    post:
      tags:
        - Bundle Monitoring
      summary: Retry failed bundle
      description: |
        Retry a failed or timed-out bulk swap bundle (for swaps with 3+ NFTs).
        
        This endpoint will:
        1. Fetch fresh Merkle proofs for all cNFTs
        2. Rebuild the transaction bundle
        3. Resubmit to Jito/RPC
        
        Only available for bundles in FAILED or TIMEOUT status.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Bundle retry initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: string
                      message:
                        type: string
                        example: "Bundle retry initiated"
                      newBundleStatus:
                        type: string
                        example: "SUBMITTED"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Bundle not eligible for retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/metrics/bundles:
    get:
      tags:
        - Bundle Monitoring
      summary: Get bundle metrics
      description: |
        Get aggregated metrics for cNFT bundle execution over the last 24 hours.
        
        Useful for monitoring bundle success rates and identifying issues.
      responses:
        '200':
          description: Bundle metrics retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      period:
                        type: string
                        example: "24h"
                      totals:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 150
                          landed:
                            type: integer
                            example: 142
                          failed:
                            type: integer
                            example: 5
                          timeout:
                            type: integer
                            example: 2
                          pending:
                            type: integer
                            example: 1
                      rates:
                        type: object
                        properties:
                          successRate:
                            type: string
                            example: "94.67%"
                          failureRate:
                            type: string
                            example: "3.33%"
                      recentFailures:
                        type: array
                        description: Last 10 failed bundles for debugging
                        items:
                          type: object
                          properties:
                            offerId:
                              type: string
                            status:
                              type: string
                            createdAt:
                              type: string
                            maker:
                              type: string
                            taker:
                              type: string
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
  # OFFER MANAGEMENT - ADDITIONAL ENDPOINTS
  # =============================================================================

  /api/offers/{offerId}/rebuild-transaction:
    post:
      tags:
        - Offers
      summary: Rebuild transaction with fresh proofs
      description: |
        Rebuild the swap transaction for an already-accepted offer with fresh cNFT Merkle proofs.

        Use this when cNFT proofs become stale between transaction building and execution.
        Only works for offers in ACCEPTED status.

        **Requires idempotency key** to prevent duplicate rebuilds.
      parameters:
        - $ref: '#/components/parameters/OfferId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Transaction rebuilt successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                      transaction:
                        type: object
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded rebuilt transaction
                          nonceAccount:
                            type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
  # LISTINGS API - cNFT Marketplace with Delegation
  # =============================================================================

  /api/listings:
    post:
      tags:
        - Listings
      summary: Create a new cNFT listing
      description: |
        Create a listing for a compressed NFT (cNFT) using delegation.

        The seller keeps the cNFT in their wallet while it's listed. The platform
        is granted delegate authority to transfer the cNFT when a buyer purchases it.

        **Flow:**
        1. Call this endpoint to get a delegation transaction
        2. Sign and submit the delegation transaction
        3. Call `/api/listings/{id}/confirm` with the signature
        4. Listing becomes ACTIVE and visible to buyers

        **Rate Limited**: Strict rate limiting applies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - seller
                - assetId
                - priceLamports
              properties:
                seller:
                  type: string
                  description: Seller's wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                assetId:
                  type: string
                  description: cNFT asset ID (from DAS API)
                  example: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                priceLamports:
                  type: string
                  description: Listing price in lamports
                  example: "1000000000"
                durationSeconds:
                  type: integer
                  description: Listing duration in seconds (default 7 days)
                  example: 604800
                feeBps:
                  type: integer
                  description: Custom fee basis points (default 100 = 1%)
                  example: 100
      responses:
        '201':
          description: Listing created, delegation transaction returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listing:
                        $ref: '#/components/schemas/Listing'
                      transaction:
                        type: object
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded delegation transaction to sign
                          delegatePda:
                            type: string
                            description: PDA that will receive delegation authority
                      fees:
                        type: object
                        properties:
                          platformFeeBps:
                            type: integer
                          platformFeeLamports:
                            type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Validation error (ownership, already listed, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - Listings
      summary: List cNFT listings
      description: Retrieve listings with optional filters and pagination
      parameters:
        - in: query
          name: seller
          schema:
            type: string
          description: Filter by seller wallet address
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, ACTIVE, SOLD, CANCELLED, EXPIRED]
          description: Filter by listing status
        - in: query
          name: delegationStatus
          schema:
            type: string
            enum: [PENDING, DELEGATED, REVOKED]
          description: Filter by delegation status
        - in: query
          name: includeExpired
          schema:
            type: boolean
            default: false
          description: Include expired listings
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listings:
                        type: array
                        items:
                          $ref: '#/components/schemas/ListingSummary'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/{listingId}:
    get:
      tags:
        - Listings
      summary: Get listing details
      description: Retrieve full details for a specific listing
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: string
          description: Listing ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listing:
                        $ref: '#/components/schemas/Listing'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/{listingId}/confirm:
    post:
      tags:
        - Listings
      summary: Confirm listing delegation
      description: |
        Confirm that the delegation transaction has been executed on-chain.

        After signing and submitting the delegation transaction from the create listing response,
        call this endpoint with the transaction signature to activate the listing.
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: string
          description: Listing ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Delegation transaction signature
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
      responses:
        '200':
          description: Listing confirmed and active
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listing:
                        type: object
                        properties:
                          id:
                            type: string
                          listingId:
                            type: string
                          status:
                            type: string
                            example: "ACTIVE"
                          delegationStatus:
                            type: string
                            example: "DELEGATED"
                          delegatedAt:
                            type: string
                            format: date-time
                          delegateTxId:
                            type: string
                      message:
                        type: string
                        example: "Listing confirmed and now active"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/{listingId}/cancel:
    post:
      tags:
        - Listings
      summary: Cancel a listing
      description: |
        Cancel an active listing. Only the seller can cancel.

        If the listing has an active delegation, a revoke transaction will be returned
        that must be signed and submitted to remove the delegation.
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: string
          description: Listing ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - seller
              properties:
                seller:
                  type: string
                  description: Seller's wallet address (must match listing)
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
      responses:
        '200':
          description: Listing cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listing:
                        $ref: '#/components/schemas/ListingSummary'
                      transaction:
                        type: object
                        nullable: true
                        description: Revoke transaction if delegation needs to be removed
                        properties:
                          serialized:
                            type: string
                      message:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '403':
          description: Not authorized (not the seller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/{listingId}/confirm-revoke:
    post:
      tags:
        - Listings
      summary: Confirm delegation revocation
      description: |
        Confirm that the revoke transaction has been executed on-chain
        after cancelling a listing.
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: string
          description: Listing ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Revoke transaction signature
      responses:
        '200':
          description: Revocation confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listing:
                        type: object
                        properties:
                          id:
                            type: string
                          listingId:
                            type: string
                          status:
                            type: string
                            example: "CANCELLED"
                          delegationStatus:
                            type: string
                            example: "REVOKED"
                          revokeTxId:
                            type: string
                      message:
                        type: string
                        example: "Delegation revoked successfully"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/{listingId}/buy:
    post:
      tags:
        - Listings
      summary: Buy a listed cNFT
      description: |
        Build an atomic buy transaction for a listed cNFT.

        The transaction will:
        1. Transfer SOL from buyer to seller (price minus fee)
        2. Transfer platform fee to fee collector
        3. Transfer cNFT from seller to buyer via marketplace delegate

        **Flow:**
        1. Call this endpoint to get the buy transaction
        2. Sign and submit the transaction
        3. Call `/api/listings/{id}/confirm-purchase` with the signature

        **Rate Limited**: Strict rate limiting applies
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: string
          description: Listing ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - buyer
              properties:
                buyer:
                  type: string
                  description: Buyer's wallet address
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
      responses:
        '200':
          description: Buy transaction ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listing:
                        $ref: '#/components/schemas/ListingSummary'
                      transaction:
                        type: object
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded buy transaction to sign
                      costs:
                        type: object
                        properties:
                          priceLamports:
                            type: string
                          platformFeeLamports:
                            type: string
                          totalLamports:
                            type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid request (listing not active, expired, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/{listingId}/confirm-purchase:
    post:
      tags:
        - Listings
      summary: Confirm cNFT purchase
      description: |
        Confirm that the purchase transaction has been executed on-chain.

        This marks the listing as SOLD and records the transaction details.
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: string
          description: Listing ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
                - buyer
              properties:
                signature:
                  type: string
                  description: Purchase transaction signature
                buyer:
                  type: string
                  description: Buyer's wallet address
      responses:
        '200':
          description: Purchase confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listing:
                        type: object
                        properties:
                          id:
                            type: string
                          listingId:
                            type: string
                          status:
                            type: string
                            example: "SOLD"
                          buyer:
                            type: string
                          soldAt:
                            type: string
                            format: date-time
                          settleTxId:
                            type: string
                      message:
                        type: string
                        example: "Purchase confirmed. The cNFT is now in your wallet!"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/seller/{wallet}:
    get:
      tags:
        - Listings
      summary: Get seller's listings
      description: Get all active listings for a specific seller
      parameters:
        - in: path
          name: wallet
          required: true
          schema:
            type: string
          description: Seller's wallet address
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      listings:
                        type: array
                        items:
                          $ref: '#/components/schemas/ListingSummary'
                      total:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/listings/delegate-authority:
    get:
      tags:
        - Listings
      summary: Get delegate authority
      description: Get the platform's delegate authority public key for cNFT delegation
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      delegateAuthority:
                        type: string
                        description: Platform delegate authority public key
                        example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                      marketplacePda:
                        type: string
                        description: Alias for delegateAuthority (backwards compatibility)
                      programId:
                        type: string
                        description: Escrow program ID
                  timestamp:
                    type: string
                    format: date-time

  # =============================================================================
  # cNFT OFFERS API - SOL Escrow Bids on cNFTs
  # =============================================================================

  /api/offers/cnft:
    post:
      tags:
        - cNFT Offers
      summary: Create a cNFT offer
      description: |
        Create an offer (bid) on a compressed NFT with SOL escrow.

        The bidder deposits SOL to a PDA to make an offer on a cNFT.
        The SOL is held in escrow until the offer is accepted, cancelled, rejected, or expired.

        **Flow:**
        1. Call this endpoint to get an escrow transaction
        2. Sign and submit the escrow transaction (deposits SOL)
        3. Call `/api/offers/cnft/{offerId}/confirm` with the signature
        4. Offer becomes ACTIVE and visible to the cNFT owner

        **Rate Limited**: Strict rate limiting applies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bidderWallet
                - targetAssetId
                - offerLamports
              properties:
                bidderWallet:
                  type: string
                  description: Bidder's wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                targetAssetId:
                  type: string
                  description: Target cNFT asset ID
                  example: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                offerLamports:
                  type: string
                  description: Offer amount in lamports
                  example: "1000000000"
                durationSeconds:
                  type: integer
                  description: Offer duration in seconds (default 7 days)
                feeBps:
                  type: integer
                  description: Custom fee basis points (default 100 = 1%)
                listingId:
                  type: string
                  description: Optional listing ID if making offer on a listed cNFT
      responses:
        '201':
          description: Offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        $ref: '#/components/schemas/CnftOffer'
                      transaction:
                        type: object
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded escrow transaction to sign
                          vaultPda:
                            type: string
                            description: SOL escrow vault PDA
                      fees:
                        type: object
                        properties:
