openapi: 3.0.3
info:
  title: EasyEscrow.ai Atomic Swap API
  version: 1.0.0
  description: |
    Backend API service for EasyEscrow.ai - Non-custodial atomic swap platform for NFTs and SOL on Solana.
    
    ## Supported Swap Types
    
    EasyEscrow.ai currently supports **three types of escrow swaps** on the **Solana blockchain**:
    
    ### 1. NFT <> SOL
    Direct exchange of an NFT for SOL payment.
    - **Seller provides:** NFT (Traditional NFT)
    - **Buyer provides:** SOL
    - **Platform fee:** 1% (100 basis points) - deducted from seller's proceeds
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ### 2. NFT <> NFT (with SOL fee)
    Exchange of two NFTs with a flat SOL platform fee.
    - **Seller provides:** NFT A (Traditional NFT)
    - **Buyer provides:** NFT B (Traditional NFT) + 0.005 SOL platform fee
    - **Platform fee:** 0.005 SOL flat fee (paid by taker/buyer by default)
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ### 3. NFT + SOL <> NFT
    Exchange of an NFT plus SOL payment for another NFT.
    - **Seller provides:** NFT A (Traditional NFT) + SOL
    - **Buyer provides:** NFT B (Traditional NFT)
    - **Platform fee:** 1% (100 basis points) - deducted from SOL amount
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ## Blockchain Support
    - ✅ **Solana blockchain** (Devnet, Mainnet)
    - ✅ **Traditional NFTs** (Metaplex standard)
    - ✅ **Compressed NFTs (cNFTs)** (Metaplex Bubblegum)
    - ✅ **Metaplex Core NFTs**
    - 🔜 **Additional blockchains** - Coming soon
    
    ## Bulk Swap Support
    
    Bulk swaps of up to **10 assets per side** are supported. Any combination of NFT type (SPL NFT, Core NFT, cNFT) and SOL. Bulk swap atomicity provided by JITO Solana validator for swaps requiring multiple transactions (3+ total assets).
    
    ### cNFT-Specific Features
    
    - **Direct Bubblegum transfers** - cNFTs transfer directly without escrow custody
    - **Merkle proof handling** - Automatic proof fetching from DAS API
    - **Full canopy tree support** - Eliminates stale proof issues
    - **Rate-limited DAS API** - Built-in rate limiting, batching, and caching
    
    ## Additional Features
    - **Custom expiry times** - Offers can be set to expire between 1 hour and 30 days (default: 7 days)
    - **On-chain non-custodial functionality** - Assets secured by Smart Contract, never held in escrow
    - **Automatic atomic settlement** - Swaps execute atomically when both parties sign the transaction
    - **Automatic offer expiry** - Expired offers are automatically marked as expired
    - **Comprehensive webhook notifications** - Real-time updates for all swap lifecycle events
    - **Transaction logging and monitoring** - Complete audit trail of all swap transactions
    - **Rate Limiting** - Standard endpoints: 100 requests per 15 minutes per IP; Strict endpoints: 20 requests per 15 minutes per IP
    - **Idempotency** - Offer creation endpoints support idempotency keys to prevent duplicate offers
    
    EasyEscrow.ai uses **atomic swaps** - instant, non-custodial exchanges that execute in a single transaction.
    Your assets are NEVER held in escrow. The swap happens atomically or not at all.
    
    ### How It Works
    
    1. **Maker creates offer** - Specifies what they offer and what they want
    2. **Taker accepts offer** - Gets a pre-built transaction to sign
    3. **Taker signs & broadcasts** - The swap executes atomically on Solana
    4. **Taker confirms** - Submits the transaction signature for verification
    5. **Instant settlement** - NFTs/SOL/cNFTs transfer simultaneously
    
    ### Supported Asset Types
    
    - ✅ **SPL NFTs** (Metaplex standard) - Up to 10 per side
    - ✅ **Compressed NFTs (cNFTs)** (Metaplex Bubblegum) - Up to 10 per side
    - ✅ **SOL** (Native Solana currency)
    - ✅ **Mixed swaps** (NFT ↔ SOL, NFT ↔ NFT, cNFT ↔ SOL, cNFT ↔ cNFT, etc.)
    - ✅ **Bulk swaps** - Up to 10 assets on each side of the trade
    
    ### Key Features
    
    - **Non-custodial**: Assets never leave your wallet until the swap executes
    - **Atomic**: All transfers happen in one transaction or none at all
    - **Durable nonces**: Offers don't expire due to blockhash expiration
    - **Low fees**: 1% platform fee on SOL swaps, 0.005 SOL flat fee for NFT-only swaps
    - **Instant settlement**: No waiting for confirmations or multi-step processes
    - **Cancel anytime**: Cancel offers instantly by advancing the durable nonce
    
    ### Platform Fees
    
    - **NFT-only swaps**: 0.005 SOL flat fee (paid by taker)
    - **Swaps with SOL**: 1% of total SOL amount (paid by taker)
    - **Minimum fee**: 0.001 SOL
    - **Maximum fee**: 0.5 SOL (fee cap)
    
    ### Security
    
    - **Durable nonces** prevent transaction replay attacks
    - **Asset validation** ensures you own what you're trading
    - **Rate limiting** prevents API abuse
    - **Input validation** protects against malicious inputs
    - **Idempotency keys** prevent duplicate operations
    
  contact:
    name: EasyEscrow.ai Support
