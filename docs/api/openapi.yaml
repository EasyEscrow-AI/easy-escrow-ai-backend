        url:
          type: string
          description: Pre-signed download URL (expires in 15 minutes)
        expiresAt:
          type: string
          format: date-time

    # ── Institution Escrow Schemas ──────────────────────────────────────

    InstitutionEscrowCreateRequest:
      type: object
      required:
        - payerWallet
        - recipientWallet
        - amount
        - corridor
        - conditionType
      properties:
        payerWallet:
          type: string
          description: Solana wallet address of the payer (base58, 32-44 chars)
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        recipientWallet:
          type: string
          description: Solana wallet address of the recipient
          example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
        amount:
          type: number
          minimum: 1
          maximum: 10000000
          description: Stablecoin amount (1 to 10,000,000)
          example: 50000
        corridor:
          type: string
          pattern: '^[A-Z]{2}-[A-Z]{2}$'
          description: Payment corridor in ISO country code format (e.g., SG-CH)
          example: "SG-CH"
        conditionType:
          type: string
          enum: [ADMIN_RELEASE, TIME_LOCK, COMPLIANCE_CHECK]
          description: |
            Release condition type:
            - **ADMIN_RELEASE**: Manual release by settlement authority
            - **TIME_LOCK**: Automatic release after time period
            - **COMPLIANCE_CHECK**: Release after compliance verification
          example: "ADMIN_RELEASE"
        expiryHours:
          type: integer
          minimum: 1
          maximum: 2160
          description: Escrow expiry in hours (1 to 2160 / 90 days). Default varies by corridor.
          example: 72
        settlementAuthority:
          type: string
          description: Optional Solana wallet address of the settlement authority
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        tokenMint:
          type: string
          description: |
            Optional SPL token mint address. Must be on the AMINA-approved whitelist.
            Defaults to USDC if omitted. Use `GET /api/v1/institution/tokens` to list available tokens.
          example: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"

    InstitutionEscrowDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        payerWallet:
          type: string
        recipientWallet:
          type: string
        amount:
          type: number
          description: USDC amount
          example: 50000
        corridor:
          type: string
          example: "SG-CH"
        conditionType:
          type: string
          enum: [ADMIN_RELEASE, TIME_LOCK, COMPLIANCE_CHECK]
        status:
          type: string
          enum: [CREATED, FUNDED, COMPLIANCE_HOLD, RELEASING, RELEASED, CANCELLING, CANCELLED, EXPIRED, FAILED]
          description: |
            Escrow lifecycle status:
            - **CREATED**: Escrow created, awaiting deposit
            - **FUNDED**: USDC deposited and verified
            - **COMPLIANCE_HOLD**: Held for compliance review
            - **RELEASING**: Release in progress
            - **RELEASED**: Funds released to recipient
            - **CANCELLING**: Cancellation in progress
            - **CANCELLED**: Escrow cancelled, funds refunded
            - **EXPIRED**: Escrow expired without completion
            - **FAILED**: Escrow failed due to an error
        escrowAddress:
          type: string
          description: On-chain escrow USDC address
        depositTxSignature:
          type: string
          nullable: true
          description: Deposit transaction signature
        releaseTxSignature:
          type: string
          nullable: true
          description: Release transaction signature
        settlementAuthority:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── AI Analysis Schemas ─────────────────────────────────────────────

    AiAnalyzeRequest:
      type: object
      required:
        - fileId
      properties:
        fileId:
          type: string
          format: uuid
          description: ID of the uploaded file to analyze
        context:
          type: object
          description: Optional context to improve analysis accuracy
          properties:
            expectedAmount:
              type: number
              minimum: 0
              description: Expected payment amount for cross-referencing
              example: 50000
            poNumber:
              type: string
              maxLength: 100
              description: Purchase order number for verification
              example: "PO-2025-0042"

    AiAnalysisResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        escrowId:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
        riskScore:
          type: number
          minimum: 0
          maximum: 100
          description: Risk score from 0 (low risk) to 100 (high risk)
          example: 15
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          description: Categorized risk level
          example: "LOW"
        findings:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
                example: "DOCUMENT_AUTHENTICITY"
              severity:
                type: string
                enum: [INFO, WARNING, CRITICAL]
              message:
                type: string
                example: "Document appears authentic with consistent formatting"
          description: Individual analysis findings
        summary:
          type: string
          description: Human-readable summary of the analysis
          example: "Document passes all checks with low risk indicators"
        analyzedAt:
          type: string
          format: date-time

    # ── Institution Admin Schemas ───────────────────────────────────────

    AdminAllowlistAdd:
      type: object
      required:
        - wallet
        - clientId
      properties:
        wallet:
          type: string
          description: Solana wallet address to add (base58)
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        clientId:
          type: string
          format: uuid
          description: Institution client ID to associate with the wallet

    AdminAllowlistEntry:
      type: object
      properties:
        wallet:
          type: string
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        clientId:
          type: string
          format: uuid
        addedAt:
          type: string
          format: date-time

    AdminCorridorConfig:
      type: object
      required:
        - sourceCountry
        - destCountry
        - minAmount
        - maxAmount
        - dailyLimit
        - monthlyLimit
        - riskLevel
      properties:
        sourceCountry:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 source country code
          example: "SG"
        destCountry:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2 destination country code
          example: "CH"
        minAmount:
          type: number
          minimum: 0
          description: Minimum transaction amount (USDC)
          example: 100
        maxAmount:
          type: number
          minimum: 1
          description: Maximum transaction amount (USDC)
          example: 1000000
        dailyLimit:
          type: number
          minimum: 1
          description: Daily transaction limit per client (USDC)
          example: 500000
        monthlyLimit:
          type: number
          minimum: 1
          description: Monthly transaction limit per client (USDC)
          example: 5000000
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          description: Risk classification for the corridor
          example: "LOW"
        requiredDocuments:
          type: array
          items:
            type: string
          description: Document types required for this corridor
          example: ["INVOICE", "PURCHASE_ORDER"]

    AdminCorridor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: Corridor code (source-dest)
          example: "SG-CH"
        sourceCountry:
          type: string
          example: "SG"
        destCountry:
          type: string
          example: "CH"
        minAmount:
          type: number
          example: 100
        maxAmount:
          type: number
          example: 1000000
        dailyLimit:
          type: number
          example: 500000
        monthlyLimit:
          type: number
          example: 5000000
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        requiredDocuments:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid wallet address format"
        timestamp:
          type: string
          format: date-time

    PresignedUrl:
      type: object
      properties:
        name:
          type: string
        s3Key:
          type: string
        url:
          type: string
        expiresAt:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for admin authentication
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from /api/v1/institution/auth/login
    SettlementAuthority:
      type: apiKey
      in: header
      name: X-Settlement-Authority-Key
      description: Settlement authority API key for release operations
