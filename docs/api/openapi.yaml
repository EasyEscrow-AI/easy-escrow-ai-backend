openapi: 3.0.3
info:
  title: EasyEscrow.ai Atomic Swap API
  version: 2.0.0
  description: |
    Backend API service for EasyEscrow.ai - Non-custodial atomic swap platform for NFTs and SOL on Solana.
    
    ## Atomic Swap System
    
    EasyEscrow.ai v2 uses **atomic swaps** - instant, non-custodial exchanges that execute in a single transaction.
    Your assets are NEVER held in escrow. The swap happens atomically or not at all.
    
    ### How It Works
    
    1. **Maker creates offer** - Specifies what they offer and what they want
    2. **Taker accepts offer** - Gets a pre-built transaction to sign
    3. **Taker signs & broadcasts** - The swap executes atomically on Solana
    4. **Instant settlement** - NFTs/SOL/cNFTs transfer simultaneously
    
    ### Supported Asset Types
    
    - ✅ **SPL NFTs** (Metaplex standard)
    - ✅ **Compressed NFTs (cNFTs)** (Metaplex Bubblegum)
    - ✅ **SOL** (Native Solana currency)
    - ✅ **Mixed swaps** (NFT ↔ SOL, NFT ↔ NFT, cNFT ↔ SOL, etc.)
    
    ### Key Features
    
    - **Non-custodial**: Assets never leave your wallet until the swap executes
    - **Atomic**: All transfers happen in one transaction or none at all
    - **Durable nonces**: Offers don't expire due to blockhash expiration
    - **Low fees**: 1% platform fee on SOL swaps, 0.005 SOL flat fee for NFT-only swaps
    - **Instant settlement**: No waiting for confirmations or multi-step processes
    - **Cancel anytime**: Cancel offers instantly by advancing the durable nonce
    
    ### Platform Fees
    
    - **SOL involved**: 1% of SOL amount (paid by taker)
    - **Pure NFT swaps**: 0.005 SOL flat fee (paid by taker)
    - **Maximum fee**: Capped at 0.5 SOL
    - **Minimum fee**: 0.001 SOL
    
    ### Security
    
    - **Durable nonces** prevent transaction replay attacks
    - **Asset validation** ensures you own what you're trading
    - **Rate limiting** prevents API abuse
    - **Input validation** protects against malicious inputs
    
  contact:
    name: EasyEscrow.ai Support
    email: support@easyescrow.ai
  license:
    name: ISC
    
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://staging-api.easyescrow.ai
    description: Staging environment (Devnet)
  - url: https://api.easyescrow.ai
    description: Production (Mainnet)

tags:
  - name: Health
    description: Service health and status
  - name: Offers
    description: Atomic swap offer lifecycle management

paths:
  /:
    get:
      tags:
        - Health
      summary: API root
      description: Returns API information and available endpoints
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: EasyEscrow.ai Backend API
                  version:
                    type: string
                    example: 2.0.0
                  endpoints:
                    type: object
                    properties:
                      health:
                        type: string
                        example: /health
                      offers:
                        type: string
                        example: /api/offers
                  documentation:
                    type: string
                    example: /docs

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API and all connected services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/offers:
    get:
      tags:
        - Offers
      summary: List offers
      description: Retrieve swap offers with optional filters and pagination
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OfferStatus'
          description: Filter by offer status
        - in: query
          name: makerWallet
          schema:
            type: string
          description: Filter by maker wallet address
        - in: query
          name: takerWallet
          schema:
            type: string
          description: Filter by taker wallet address
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offers:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfferSummary'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Offers
      summary: Create offer
      description: |
        Create a new atomic swap offer.
        
        You can create:
        - **Direct offers** (specify takerWallet) - only that address can accept
        - **Open offers** (omit takerWallet) - anyone can accept
        
        **Rate Limited**: 10 requests per 15 minutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - standard: "nft"
                      mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      amount: 1
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "1000000000"
              solForNft:
                summary: SOL ↔ NFT (Open Offer)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets: []
                  requestedAssets:
                    - standard: "nft"
                      mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      amount: 1
                  offeredSol: "500000000"
                  requestedSol: "0"
              nftForNft:
                summary: NFT ↔ NFT
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - standard: "nft"
                      mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      amount: 1
                  requestedAssets:
                    - standard: "nft"
                      mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      amount: 1
                  offeredSol: "0"
                  requestedSol: "0"
              cnftForSol:
                summary: cNFT ↔ SOL
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets:
                    - standard: "cnft"
                      assetId: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      tree: "TreeAccount..."
                      leafIndex: 12345
                      amount: 1
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "2000000000"
      responses:
        '201':
          description: Offer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                        example: 1
                      status:
                        type: string
                        example: "active"
                      makerWallet:
                        type: string
                      takerWallet:
                        type: string
                      offeredAssets:
                        type: array
                        items:
                          $ref: '#/components/schemas/Asset'
                      requestedAssets:
                        type: array
                        items:
                          $ref: '#/components/schemas/Asset'
                      offeredSol:
                        type: string
                        description: In lamports
                      requestedSol:
                        type: string
                        description: In lamports
                      platformFee:
                        type: string
                        description: In lamports
                      feeBreakdown:
                        $ref: '#/components/schemas/FeeBreakdown'
                      expiresAt:
                        type: string
                        format: date-time
                      createdAt:
                        type: string
                        format: date-time
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}:
    get:
      tags:
        - Offers
      summary: Get offer details
      description: Retrieve full details for a specific offer
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/OfferDetail'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/counter:
    post:
      tags:
        - Offers
      summary: Create counter-offer
      description: Create a counter-offer to an existing offer with different terms
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            example:
              makerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              takerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              offeredAssets: []
              requestedAssets:
                - standard: "nft"
                  mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  amount: 1
              offeredSol: "1500000000"
              requestedSol: "0"
      responses:
        '201':
          description: Counter-offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      parentOfferId:
                        type: integer
                      status:
                        type: string
                        example: "active"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/cancel:
    post:
      tags:
        - Offers
      summary: Cancel offer
      description: |
        Cancel an active offer. This advances the durable nonce, invalidating any 
        serialized transactions that reference it.
        
        Only the maker can cancel their offer.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - walletAddress
              properties:
                walletAddress:
                  type: string
                  description: Must be the maker's wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
      responses:
        '200':
          description: Offer cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      status:
                        type: string
                        example: "cancelled"
                      cancelledAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Offer cancelled and nonce advanced"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Unauthorized - not the maker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/accept:
    post:
      tags:
        - Offers
      summary: Accept offer
      description: |
        Accept an active offer and receive the atomic swap transaction to sign.
        
        The API returns a base64-encoded transaction that you must:
        1. Deserialize
        2. Sign with your wallet
        3. Broadcast to Solana
        4. Call /confirm with the signature
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - takerWallet
              properties:
                takerWallet:
                  type: string
                  description: Your wallet address (must match offer if it's a direct offer)
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
      responses:
        '200':
          description: Transaction ready for signing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      serializedTransaction:
                        type: string
                        description: Base64-encoded transaction to sign and broadcast
                        example: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDz..."
                      instructions:
                        type: string
                        description: Instructions for signing and broadcasting
                        example: "1. Deserialize this transaction 2. Sign with your wallet 3. Broadcast to Solana 4. Call /confirm with signature"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/{offerId}/confirm:
    post:
      tags:
        - Offers
      summary: Confirm swap execution
      description: |
        Confirm that you've broadcast the swap transaction and provide its signature.
        
        The API will verify the transaction on-chain and mark the offer as filled.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Transaction signature from Solana
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
      responses:
        '200':
          description: Swap confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      status:
                        type: string
                        example: "filled"
                      signature:
                        type: string
                      filledAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Swap executed successfully"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid signature or transaction failed on-chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    OfferId:
      in: path
      name: offerId
      required: true
      schema:
        type: integer
      description: Offer ID
      example: 1

  schemas:
    OfferStatus:
      type: string
      enum:
        - active
        - filled
        - cancelled
        - expired
      description: |
        Offer status:
        - **active**: Offer is open and can be accepted
        - **filled**: Swap has been executed
        - **cancelled**: Offer was cancelled by maker
        - **expired**: Offer has expired (after 7 days)

    Asset:
      type: object
      required:
        - standard
        - amount
      properties:
        standard:
          type: string
          enum: ["nft", "cnft"]
          description: Asset type - "nft" for SPL NFTs, "cnft" for compressed NFTs
          example: "nft"
        mint:
          type: string
          description: Mint address (required for NFTs)
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        amount:
          type: integer
          description: Amount of tokens (typically 1 for NFTs)
          example: 1
        assetId:
          type: string
          description: Asset ID (required for cNFTs)
          example: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
        tree:
          type: string
          description: Merkle tree account (required for cNFTs)
          example: "TreeAccount..."
        leafIndex:
          type: integer
          description: Leaf index in tree (optional for cNFTs)
          example: 12345

    CreateOfferRequest:
      type: object
      required:
        - makerWallet
        - offeredAssets
        - requestedAssets
      properties:
        makerWallet:
          type: string
          description: Your wallet address (the offer creator)
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        takerWallet:
          type: string
          description: |
            Optional: Specify who can accept this offer.
            - If provided: Only this address can accept (direct offer)
            - If omitted: Anyone can accept (open offer)
          example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
        offeredAssets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
          description: Assets you're offering (can be empty if offering only SOL)
        requestedAssets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
          description: Assets you're requesting (can be empty if requesting only SOL)
        offeredSol:
          type: string
          description: |
            SOL amount you're offering in lamports (1 SOL = 1,000,000,000 lamports).
            Use "0" if not offering SOL.
          example: "500000000"
        requestedSol:
          type: string
          description: |
            SOL amount you're requesting in lamports (1 SOL = 1,000,000,000 lamports).
            Use "0" if not requesting SOL.
          example: "1000000000"
        customFee:
          type: string
          description: |
            Optional: Override the platform fee (in lamports).
            Must still pass validation (min 0.001 SOL, max 0.5 SOL).
            If omitted, fee is calculated automatically.
          example: "10000000"

    OfferSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        makerWallet:
          type: string
        takerWallet:
          type: string
        offerType:
          type: string
          enum: ["MAKER_OFFER", "COUNTER_OFFER"]
        status:
          $ref: '#/components/schemas/OfferStatus'
        offeredAssetsCount:
          type: integer
          description: Number of assets offered
        requestedAssetsCount:
          type: integer
          description: Number of assets requested
        offeredSol:
          type: string
          description: In lamports
        requestedSol:
          type: string
          description: In lamports
        platformFeeLamports:
          type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    OfferDetail:
      allOf:
        - $ref: '#/components/schemas/OfferSummary'
        - type: object
          properties:
            offeredAssets:
              type: array
              items:
                $ref: '#/components/schemas/Asset'
            requestedAssets:
              type: array
              items:
                $ref: '#/components/schemas/Asset'
            nonceAccount:
              type: string
              description: Durable nonce account address
            currentNonceValue:
              type: string
              description: Current nonce value
            parentOfferId:
              type: integer
              description: Parent offer ID (for counter-offers)
            filledAt:
              type: string
              format: date-time
            cancelledAt:
              type: string
              format: date-time
            transactionSignature:
              type: string
              description: Solana transaction signature (if filled)

    FeeBreakdown:
      type: object
      properties:
        feeLamports:
          type: string
          description: Fee amount in lamports
          example: "10000000"
        feeSol:
          type: number
          description: Fee amount in SOL
          example: 0.01
        feeType:
          type: string
          enum: ["flat", "percentage"]
          description: Type of fee calculation used
        percentageRate:
          type: string
          description: Percentage rate used (if applicable)
          example: "1%"
        totalSwapValueLamports:
          type: string
          description: Total SOL value of the swap
        totalSwapValueSol:
          type: number
          description: Total SOL value in SOL

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          example: healthy
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: easy-escrow-ai-backend
        database:
          type: string
          enum: [connected, disconnected]
          example: connected
        redis:
          type: string
          enum: [connected, disconnected]
          example: connected
        solana:
          type: object
          properties:
            connected:
              type: boolean
            network:
              type: string
              example: "devnet"
            programId:
              type: string
              example: "AvdX6LEkoAmP961QwNjAUNpiuDtiQjaiSw5wR5zb9Zei"
        idempotency:
          type: object
          properties:
            status:
              type: string
              enum: [running, stopped]
            expirationHours:
              type: integer
            cleanupIntervalMinutes:
              type: integer

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid wallet address format"
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication (coming soon)

# No security required yet (public MVP)
# security:
#   - ApiKeyAuth: []
