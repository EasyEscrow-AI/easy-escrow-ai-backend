paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API and all connected services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/swaps/assets:
    get:
      tags:
        - Atomic Swaps
      summary: List supported assets
      description: |
        Returns a list of all supported assets and their chains for atomic swaps.

        **Supported Asset Types:**
        - **SPL NFT** - Solana SPL Token NFT (Metaplex standard)
        - **Core NFT** - Solana Metaplex Core NFT
        - **cNFT** - Solana Compressed NFT (Metaplex Bubblegum)
        - **SOL** - Solana native token

        All assets are currently on the Solana blockchain.
      responses:
        '200':
          description: List of supported assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetsListResponse'
              example:
                success: true
                timestamp: '2024-12-19T10:00:00.000Z'
                data:
                  assets:
                    - id: spl-nft
                      name: SPL NFT
                      description: Solana SPL Token NFT (Metaplex standard)
                      chain: Solana
                      chainId: solana
                      status: active
                      type: nft
                      standard: Metaplex Token Metadata
                    - id: core-nft
                      name: Core NFT
                      description: Solana Metaplex Core NFT
                      chain: Solana
                      chainId: solana
                      status: active
                      type: nft
                      standard: Metaplex Core
                    - id: cnft
                      name: cNFT
                      description: Solana Compressed NFT (Metaplex Bubblegum)
                      chain: Solana
                      chainId: solana
                      status: active
                      type: nft
                      standard: Metaplex Bubblegum
                    - id: sol
                      name: SOL
                      description: Solana native token
                      chain: Solana
                      chainId: solana
                      status: active
                      type: token
                  chains:
                    - id: solana
                      name: Solana
                      status: active
                  summary:
                    totalAssets: 4
                    activeAssets: 4
                    supportedChains: 1

  /api/swaps/quote:
    post:
      tags:
        - Atomic Swaps
      summary: Get swap quote
      description: |
        Get a comprehensive quote for an atomic swap including:
        - **SOL price** in USD (cached from CoinGecko)
        - **Network fees** (based on actual Solana signature costs)
        - **Platform fees** (percentage, flat, or zero-fee for API key users)
        - **Transaction size** estimation with ALT support
        - **Time estimates** based on NFT count and types
        - **Warnings** about cNFT limitations or multi-asset restrictions
        - **Swap feasibility** check (`canSwap` boolean)
        
        This endpoint consolidates all information needed for the swap confirmation modal.
        
        **Note:** cNFT transaction size estimates use worst-case proof node counts (14 nodes)
        since actual proof size varies by tree canopy depth and cannot be determined without
        fetching the full proof data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL Quote
                description: Quote for trading an SPL NFT for SOL
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                      name: "Cool NFT #123"
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 100000000
              cnftForSol:
                summary: cNFT ↔ SOL Quote
                description: Quote for trading a compressed NFT for SOL (larger transaction)
                value:
                  makerAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                      name: "Compressed NFT"
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 200000000
              nftForNft:
                summary: NFT ↔ NFT Quote
                description: Quote for trading two NFTs
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  takerAssets:
                    - mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  makerSolLamports: 0
                  takerSolLamports: 0
              zeroFee:
                summary: Zero-Fee Quote (API Key)
                description: Quote with zero platform fee using API key
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 500000000
                  apiKey: "your-api-key-here"
      responses:
        '200':
          description: Quote generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers:
    get:
      tags:
        - Atomic Swaps
      summary: List offers
      description: Retrieve swap offers with optional filters and pagination
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OfferStatus'
          description: Filter by offer status
        - in: query
          name: makerWallet
          schema:
            type: string
          description: Filter by maker wallet address
        - in: query
          name: takerWallet
          schema:
            type: string
          description: Filter by taker wallet address
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offers:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfferSummary'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Atomic Swaps
      summary: Create offer (unified endpoint)
      description: |
        Create a new swap offer with automatic type detection.

        This unified endpoint supports **three offer types**:

        ### 1. Atomic Swap (default)
        Standard swaps for NFT↔NFT, NFT↔SOL, cNFT↔SOL.
        Use `makerWallet`, `offeredAssets`, `requestedAssets`, etc.

        ### 2. cNFT Bid (auto-detected when bidderWallet + targetAssetId + offerLamports present)
        Make a SOL bid on a specific cNFT.
        Use `bidderWallet`, `targetAssetId`, `offerLamports`.

        ### 3. Bundle Two-Phase Swap (auto-detected for 3+ cNFTs or 5+ total assets)
        Complex multi-asset swaps using lock/settle pattern.
        Use `partyA`, `assetsA`, `assetsB`, or standard fields.

        **Field Aliases Supported:**
        - `partyA` → `makerWallet`
        - `partyB` → `takerWallet`
        - `assetsA` → `offeredAssets`
        - `assetsB` → `requestedAssets`
        - `solAmountA` → `offeredSol`
        - `solAmountB` → `requestedSol`

        **Rate Limited**: 10 requests per 15 minutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL (Atomic)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "1000000000"
              cnftForSol:
                summary: cNFT ↔ SOL (Atomic)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "2000000000"
              cnftBid:
                summary: cNFT Bid (auto-detected)
                value:
                  bidderWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  targetAssetId: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                  offerLamports: "1000000000"
                  durationSeconds: 86400
              bulkSwapPartyStyle:
                summary: Bundle Swap (partyA/B style)
                value:
                  partyA: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  partyB: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  assetsA:
                    - mint: "Asset1MintAddress"
                      isCompressed: true
                    - mint: "Asset2MintAddress"
                      isCompressed: true
                    - mint: "Asset3MintAddress"
                      isCompressed: true
                  assetsB:
                    - mint: "Asset4MintAddress"
                      isCompressed: false
                  solAmountA: "0"
                  solAmountB: "500000000"
      responses:
        '201':
          description: Offer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "1"
                          status:
                            type: string
                            example: "PENDING"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                            nullable: true
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                          createdAt:
                            type: string
                            format: date-time
                      offerType:
                        type: string
                        enum: [ATOMIC, CNFT_BID, BULK_TWO_PHASE]
                        description: |
                          The detected offer type:
                          - `ATOMIC`: Standard swap (NFT↔NFT, NFT↔SOL, cNFT↔SOL)
                          - `CNFT_BID`: cNFT bid with SOL escrow
                          - `BULK_TWO_PHASE`: Bundle swap using lock/settle pattern
                        example: "ATOMIC"
                      transaction:
                        type: object
                        properties:
                          nonceAccount:
                            type: string
                            description: Durable nonce account address
                          message:
                            type: string
                            example: "Transaction will be built when offer is accepted"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Validation error - asset ownership or on-chain validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}:
    get:
      tags:
        - Atomic Swaps
      summary: Get offer details
      description: Retrieve full details for a specific offer
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/OfferDetail'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/counter:
    post:
      tags:
        - Atomic Swaps
      summary: Create counter-offer
      description: Create a counter-offer to an existing offer with different terms
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            example:
              makerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              takerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              offeredAssets: []
              requestedAssets:
                - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  isCompressed: false
              offeredSol: "1500000000"
              requestedSol: "0"
      responses:
        '201':
          description: Counter-offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      parentOfferId:
                        type: integer
                      status:
                        type: string
                        example: "PENDING"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/cancel:
    post:
      tags:
        - Atomic Swaps
      summary: Cancel offer
      description: |
        Cancel an active offer. This advances the durable nonce, invalidating any 
        serialized transactions that reference it.
        
        Only the maker can cancel their offer.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - walletAddress
              properties:
                walletAddress:
                  type: string
                  description: Must be the maker's wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
      responses:
        '200':
          description: Offer cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      status:
                        type: string
                        example: "CANCELLED"
                      cancelledAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Offer cancelled and nonce advanced"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Unauthorized - not the maker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/accept:
    post:
      tags:
        - Atomic Swaps
      summary: Accept offer
      description: |
        Accept an active offer and receive the atomic swap transaction(s) to sign.
        
        **Single Transaction (Simple swaps):**
        The API returns a base64-encoded transaction that you must:
        1. Deserialize
        2. Sign with your wallet
        3. Broadcast to Solana
        4. Call /confirm with the signature
        
        **Multiple Transactions (Bundle swaps):**
        For swaps involving 3+ NFTs of any type, the API may return multiple transactions in a `bulkSwap` object:
        - Each transaction must be signed by the appropriate party (maker or taker)
        - Transactions should be sent sequentially or as a Jito bundle
        - The `requiredSigners` array indicates which wallet(s) must sign each transaction
        - On mainnet, transactions are bundled atomically via Jito
        
        **Requires idempotency key** to prevent duplicate nonce consumption.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - takerWallet
              properties:
                takerWallet:
                  type: string
                  description: Your wallet address (must match offer if it's a direct offer)
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
      responses:
        '200':
          description: Transaction ready for signing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                            example: "ACCEPTED"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                      transaction:
                        type: object
                        description: Single transaction (for simple swaps without cNFTs)
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded transaction to sign and broadcast
                            example: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDz..."
                          nonceAccount:
                            type: string
                            description: Durable nonce account used in the transaction
                      bulkSwap:
                        type: object
                        description: Multiple transactions (for bundle swaps with 3+ NFTs of any type)
                        properties:
                          isBulkSwap:
                            type: boolean
                            description: Indicates this is a bundle swap with multiple transactions
                            example: true
                          strategy:
                            type: string
                            description: |
                              Swap strategy:
                              - SINGLE_TRANSACTION: Simple swap via escrow program
                              - DIRECT_BUBBLEGUM_BUNDLE: cNFT bundle swap
                              - DIRECT_NFT_BUNDLE: SPL/Core NFT bundle swap
                              - MIXED_NFT_BUNDLE: Mixed NFT types bundle swap
                            enum:
                              - SINGLE_TRANSACTION
                              - DIRECT_BUBBLEGUM_BUNDLE
                              - DIRECT_NFT_BUNDLE
                              - MIXED_NFT_BUNDLE
                            example: "DIRECT_BUBBLEGUM_BUNDLE"
                          transactionCount:
                            type: integer
                            description: Number of transactions in the bundle
                            example: 2
                          requiresJitoBundle:
                            type: boolean
                            description: Whether Jito bundle is required (mainnet only)
                            example: true
                          transactions:
                            type: array
                            description: Array of transactions to sign and send
                            items:
                              type: object
                              properties:
                                index:
                                  type: integer
                                  description: Transaction index in the bundle
                                  example: 0
                                purpose:
                                  type: string
                                  description: Purpose of this transaction
                                  example: "SOL transfers and platform fee"
                                serializedTransaction:
                                  type: string
                                  description: Base64-encoded transaction
                                requiredSigners:
                                  type: array
                                  description: Wallet addresses that must sign this transaction
                                  items:
                                    type: string
                                  example: ["8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"]
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not authorized to accept this offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error - asset ownership validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/confirm:
    post:
      tags:
        - Atomic Swaps
      summary: Confirm swap execution
      description: |
        Confirm that you've broadcast the swap transaction and provide its signature.
        
        The API will verify the transaction on-chain and mark the offer as filled.
        
        **Requires idempotency key** to prevent duplicate confirmations.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Transaction signature from Solana
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
      responses:
        '200':
          description: Swap confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Swap confirmed successfully"
                      signature:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid signature or transaction failed on-chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/bundle-status:
    get:
      tags:
        - Atomic Swaps
      summary: Get bundle execution status
      description: |
        Get the current status of a bundle swap execution (for swaps with 3+ NFTs).
        
        Bundle statuses:
        - **PENDING**: Bundle created, not yet submitted
        - **SUBMITTED**: Bundle submitted to Jito/RPC
        - **LANDED**: All transactions confirmed on-chain
        - **FAILED**: Bundle execution failed
        - **PARTIAL**: Some transactions succeeded, some failed
        - **TIMEOUT**: Bundle submission timed out
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Bundle status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: string
                      bundleStatus:
                        type: string
                        enum: [PENDING, SUBMITTED, LANDED, FAILED, PARTIAL, TIMEOUT]
                      transactionCount:
                        type: integer
                      confirmedCount:
                        type: integer
                      failedCount:
                        type: integer
                      signatures:
                        type: array
                        items:
                          type: string
                      error:
                        type: string
                        nullable: true
                      updatedAt:
                        type: string
                        format: date-time
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

