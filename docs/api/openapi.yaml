        bidderWallet:
          type: string
        ownerWallet:
          type: string
        targetAssetId:
          type: string
        offerLamports:
          type: string
        status:
          type: string
          enum: [PENDING, ACTIVE, ACCEPTED, CANCELLED, REJECTED, EXPIRED]
        escrowStatus:
          type: string
          enum: [PENDING, ESCROWED, RELEASED, REFUNDED]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    # ==========================================================================
    # TWO-PHASE SWAP SCHEMAS
    # ==========================================================================

    TwoPhaseSwap:
      type: object
      description: Two-phase swap state for bulk/complex swaps
      properties:
        id:
          type: string
          description: Swap ID (UUID)
        status:
          type: string
          enum:
            - CREATED
            - ACCEPTED
            - LOCKING_PARTY_A
            - PARTY_A_LOCKED
            - LOCKING_PARTY_B
            - FULLY_LOCKED
            - SETTLING
            - PARTIAL_SETTLE
            - COMPLETED
            - FAILED
            - CANCELLED
            - EXPIRED
        partyA:
          type: string
          description: Party A (initiator) wallet address
        partyB:
          type: string
          nullable: true
          description: Party B (counterparty) wallet address
        assetsA:
          type: array
          description: Assets from Party A
          items:
            $ref: '#/components/schemas/SwapAsset'
        assetsB:
          type: array
          description: Assets from Party B
          items:
            $ref: '#/components/schemas/SwapAsset'
        solAmountA:
          type: string
          nullable: true
          description: SOL from Party A (lamports)
        solAmountB:
          type: string
          nullable: true
          description: SOL from Party B (lamports)
        lockTxA:
          type: string
          nullable: true
          description: Party A lock transaction signature
        lockTxB:
          type: string
          nullable: true
          description: Party B lock transaction signature
        lockConfirmedA:
          type: string
          format: date-time
          nullable: true
        lockConfirmedB:
          type: string
          format: date-time
          nullable: true
        settleTxs:
          type: array
          items:
            type: string
          description: Settlement transaction signatures
        finalSettleTx:
          type: string
          nullable: true
        currentSettleIndex:
          type: integer
          description: Current settlement chunk index
        totalSettleTxs:
          type: integer
          description: Total number of settlement chunks
        platformFeeLamports:
          type: string
        errorMessage:
          type: string
          nullable: true
        errorCode:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
        settledAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        failedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SwapAsset:
      type: object
      properties:
        type:
          type: string
          enum: [NFT, CNFT, CORE_NFT]
        identifier:
          type: string
          description: Mint address or asset ID
        metadata:
          type: object
          nullable: true
          properties:
            name:
              type: string
            image:
              type: string
            symbol:
              type: string

    LockTransaction:
      type: object
      description: Lock transaction details for two-phase swap
      properties:
        serialized:
          type: string
          description: Base64-encoded transaction to sign
        requiredSigners:
          type: array
          items:
            type: string
          description: Public keys that must sign
        delegatePDA:
          type: string
          description: Delegate authority PDA
        solVaultPDA:
          type: string
          description: SOL escrow vault PDA
        lockedAssets:
          type: array
          items:
            type: object
            properties:
              assetId:
                type: string
              type:
                type: string
        solAmountEscrowed:
          type: string
          description: SOL amount being escrowed (lamports)

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid wallet address format"
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication (coming soon)

# No security required yet (public MVP)
