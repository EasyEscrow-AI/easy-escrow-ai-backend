        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/accept:
    post:
      tags:
        - Atomic Swaps
      summary: Accept offer
      description: |
        Accept an active offer and receive the atomic swap transaction(s) to sign.
        
        **Single Transaction (Simple swaps):**
        The API returns a base64-encoded transaction that you must:
        1. Deserialize
        2. Sign with your wallet
        3. Broadcast to Solana
        4. Call /confirm with the signature
        
        **Multiple Transactions (Bundle swaps):**
        For swaps involving 3+ NFTs of any type, the API may return multiple transactions in a `bulkSwap` object:
        - Each transaction must be signed by the appropriate party (maker or taker)
        - Transactions should be sent sequentially or as a Jito bundle
        - The `requiredSigners` array indicates which wallet(s) must sign each transaction
        - On mainnet, transactions are bundled atomically via Jito
        
        **Requires idempotency key** to prevent duplicate nonce consumption.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - takerWallet
              properties:
                takerWallet:
                  type: string
                  description: Your wallet address (must match offer if it's a direct offer)
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
      responses:
        '200':
          description: Transaction ready for signing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                            example: "ACCEPTED"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                      transaction:
                        type: object
                        description: Single transaction (for simple swaps without cNFTs)
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded transaction to sign and broadcast
                            example: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDz..."
                          nonceAccount:
                            type: string
                            description: Durable nonce account used in the transaction
                      bulkSwap:
                        type: object
                        description: Multiple transactions (for bundle swaps with 3+ NFTs of any type)
                        properties:
                          isBulkSwap:
                            type: boolean
                            description: Indicates this is a bundle swap with multiple transactions
                            example: true
                          strategy:
                            type: string
                            description: |
                              Swap strategy:
                              - SINGLE_TRANSACTION: Simple swap via escrow program
                              - DIRECT_BUBBLEGUM_BUNDLE: cNFT bundle swap
                              - DIRECT_NFT_BUNDLE: SPL/Core NFT bundle swap
                              - MIXED_NFT_BUNDLE: Mixed NFT types bundle swap
                            enum:
                              - SINGLE_TRANSACTION
                              - DIRECT_BUBBLEGUM_BUNDLE
                              - DIRECT_NFT_BUNDLE
                              - MIXED_NFT_BUNDLE
                            example: "DIRECT_BUBBLEGUM_BUNDLE"
                          transactionCount:
                            type: integer
                            description: Number of transactions in the bundle
                            example: 2
                          requiresJitoBundle:
                            type: boolean
                            description: Whether Jito bundle is required (mainnet only)
                            example: true
                          transactions:
                            type: array
                            description: Array of transactions to sign and send
                            items:
                              type: object
                              properties:
                                index:
                                  type: integer
                                  description: Transaction index in the bundle
                                  example: 0
                                purpose:
                                  type: string
                                  description: Purpose of this transaction
                                  example: "SOL transfers and platform fee"
                                serializedTransaction:
                                  type: string
                                  description: Base64-encoded transaction
                                requiredSigners:
                                  type: array
                                  description: Wallet addresses that must sign this transaction
                                  items:
                                    type: string
                                  example: ["8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"]
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not authorized to accept this offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error - asset ownership validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/confirm:
    post:
      tags:
        - Atomic Swaps
      summary: Confirm swap execution
      description: |
        Confirm that you've broadcast the swap transaction and provide its signature.
        
        The API will verify the transaction on-chain and mark the offer as filled.
        
        **Requires idempotency key** to prevent duplicate confirmations.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Transaction signature from Solana
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
      responses:
        '200':
          description: Swap confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Swap confirmed successfully"
                      signature:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid signature or transaction failed on-chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/bundle-status:
    get:
      tags:
        - Atomic Swaps
      summary: Get bundle execution status
      description: |
        Get the current status of a bundle swap execution (for swaps with 3+ NFTs).
        
        Bundle statuses:
        - **PENDING**: Bundle created, not yet submitted
        - **SUBMITTED**: Bundle submitted to Jito/RPC
        - **LANDED**: All transactions confirmed on-chain
        - **FAILED**: Bundle execution failed
        - **PARTIAL**: Some transactions succeeded, some failed
        - **TIMEOUT**: Bundle submission timed out
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Bundle status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: string
                      bundleStatus:
                        type: string
                        enum: [PENDING, SUBMITTED, LANDED, FAILED, PARTIAL, TIMEOUT]
                      transactionCount:
                        type: integer
                      confirmedCount:
                        type: integer
                      failedCount:
                        type: integer
                      signatures:
                        type: array
                        items:
                          type: string
                      error:
                        type: string
                        nullable: true
                      updatedAt:
                        type: string
                        format: date-time
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

