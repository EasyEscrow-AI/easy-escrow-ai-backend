      summary: List branches
      description: |
        Returns all branches for the authenticated institution, ordered by creation date.
        Each branch includes nested active accounts and computed fields:
        - `riskLevel` — derived from `riskScore` (0-20 = low, 21-50 = medium, 51+ = high)
        - `isHeadquarters` — `true` for the first (oldest) branch
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Branches retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InstitutionBranch'
                  count:
                    type: integer
                    example: 4
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

