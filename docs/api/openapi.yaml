openapi: 3.0.3
info:
  title: EasyEscrow.ai API
  version: 1.0.0
  description: |
    Backend API service for EasyEscrow.ai - Super fast and easy to use digital escrow platform.
    
    ## Supported Swap Types
    
    EasyEscrow.ai currently supports **three types of escrow swaps** on the **Solana blockchain**:
    
    ### 1. NFT <> SOL
    Direct exchange of an NFT for SOL payment.
    - **Seller provides:** NFT (Traditional NFT)
    - **Buyer provides:** SOL
    - **Platform fee:** 2.5% (250 basis points) - deducted from seller's proceeds
    - **Min/Max:** Minimum $1.00 USD equivalent, Maximum $3,000.00 USD equivalent (BETA limits)
    
    ### 2. NFT <> NFT (with SOL fee)
    Exchange of two NFTs with a separate SOL fee payment.
    - **Seller provides:** NFT A (Traditional NFT)
    - **Buyer provides:** NFT B (Traditional NFT) + SOL platform fee
    - **Platform fee:** 2.5% (250 basis points) - paid separately in SOL by buyer
    - **Min/Max:** Platform fee based on agreed NFT valuation
    
    ### 3. NFT + SOL <> NFT
    Exchange of an NFT plus SOL payment for another NFT.
    - **Seller provides:** NFT A (Traditional NFT) + SOL
    - **Buyer provides:** NFT B (Traditional NFT)
    - **Platform fee:** 2.5% (250 basis points) - deducted from SOL amount
    - **Min/Max:** Minimum $1.00 USD equivalent in SOL, Maximum $3,000.00 USD equivalent (BETA limits)
    
    ## Blockchain Support
    - ✅ **Solana blockchain** (Devnet, Mainnet)
    - ✅ **Traditional NFTs** (Metaplex standard)
    - 🔜 **Compressed NFTs (cNFTs)** - Coming soon
    - 🔜 **Additional blockchains** - Coming soon
    
    ## Additional Features
    - **Custom expiry times (5 minutes - 24 hours)** with flexible input formats (presets, duration, timestamps)
    - On-chain non-custodial functionality (assets secured by Smart Contract)
    - Automatic atomic settlement when both assets are verified on-chain
    - Automatic agreement expiry and refund handling (auto return to sender)
    - Comprehensive webhook notifications (real-time updates)
    - Receipt generation and on-chain verification of assets
    - Transaction logging and monitoring to ensure a smooth escrow
    - Rate Limiting: 10 agreement requests per 15 minutes
    - Idempotency: Agreement creation endpoints support idempotency keys to prevent duplicates
    
    ## Custom Expiry Times
    Agreements support flexible expiry specifications:
    - **Presets**: "5m", "1h", "6h", "12h", "24h" (recommended for simplicity)
    - **Duration**: Number of hours (0.0833-24, where 0.0833 = 5 minutes) from creation time
    - **Absolute**: ISO 8601 timestamp for specific expiry time
    - **Default**: 5 minutes (when not specified)
    - **Constraints**: Minimum 5 minutes, maximum 24 hours from creation
    
  contact:
    name: EasyEscrow.ai Support
    email: support@easyescrow.ai
  license:
    name: ISC
    
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.easyescrow.ai
    description: Production server

tags:
  - name: Health
    description: Service health and status endpoints
  - name: Agreements
    description: Escrow agreement management
  - name: Receipts
    description: Settlement receipt retrieval and verification
  - name: Transactions
    description: Transaction logging and monitoring
  - name: Webhooks
    description: Webhook delivery management
  - name: Expiry & Cancellation
    description: Agreement expiry, cancellation, and refund management

paths:
  /:
    get:
      tags:
        - Health
      summary: API root endpoint
      description: Returns API information and available endpoints
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: EasyEscrow.ai Backend API
                  version:
                    type: string
                    example: 1.0.0
                  endpoints:
                    type: object
                    properties:
                      health:
                        type: string
                        example: /health
                      agreements:
                        type: string
                        example: /v1/agreements
                      receipts:
                        type: string
                        example: /v1/receipts
                      transactions:
                        type: string
                        example: /v1/transactions
                      expiryCancellation:
                        type: string
                        example: /api/expiry-cancellation
                      webhooks:
                        type: string
                        example: /api/webhooks

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API and all connected services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/agreements:
    post:
      tags:
        - Agreements
      summary: Create a new escrow agreement
      description: |
        Creates a new escrow agreement for NFT swaps. This initializes the escrow on the Solana blockchain
        and generates deposit addresses for the required assets (NFT, SOL, and/or second NFT depending on swap type).
        
        **Supported Swap Types:**
        - NFT <> SOL (NFT_FOR_SOL)
        - NFT <> NFT with fee (NFT_FOR_NFT_WITH_FEE)
        - NFT + SOL <> NFT (NFT_FOR_NFT_PLUS_SOL)
        
        **Rate Limited**: 10 requests per 15 minutes
        **Idempotency**: Supports X-Idempotency-Key header
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgreementRequest'
            examples:
              nftForSol:
                summary: NFT <> SOL Swap
                description: Direct exchange of NFT for SOL payment
                value:
                  swapType: "NFT_FOR_SOL"
                  nftMint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  solAmount: "1000000000"
                  seller: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  buyer: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  expiry: "12h"
                  feeBps: 250
                  honorRoyalties: true
              nftForNftWithFee:
                summary: NFT <> NFT (with SOL fee)
                description: Exchange two NFTs with separate SOL fee payment
                value:
                  swapType: "NFT_FOR_NFT_WITH_FEE"
                  nftMint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  nftBMint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  solAmount: "25000000"
                  seller: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  buyer: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  expiry: "6h"
                  feeBps: 250
                  honorRoyalties: true
              nftPlusSolForNft:
                summary: NFT + SOL <> NFT
                description: Exchange NFT plus SOL for another NFT
                value:
                  swapType: "NFT_FOR_NFT_PLUS_SOL"
                  nftMint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  nftBMint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  solAmount: "500000000"
                  seller: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  buyer: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
                  expiry: "24h"
                  feeBps: 250
                  honorRoyalties: true
      responses:
        '201':
          description: Agreement created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    get:
      tags:
        - Agreements
      summary: List agreements
      description: Retrieve a paginated list of escrow agreements with optional filters
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AgreementStatus'
          description: Filter by agreement status
        - in: query
          name: seller
          schema:
            type: string
          description: Filter by seller wallet address
        - in: query
          name: buyer
          schema:
            type: string
          description: Filter by buyer wallet address
        - in: query
          name: nft_mint
          schema:
            type: string
          description: Filter by NFT mint address
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/agreements/{agreementId}:
    get:
      tags:
        - Agreements
      summary: Get agreement by ID
      description: Retrieve detailed information about a specific agreement including balances and deposits
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/agreements/{agreementId}/cancel:
    post:
      tags:
        - Agreements
      summary: Cancel an expired agreement
      description: |
        Cancels an expired agreement that hasn't been settled. This triggers refunds to depositors.
        Only works for agreements that have passed their expiry date.
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Agreement cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelAgreementResponse'
        '400':
          description: Bad request (agreement not expired or already settled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/agreements/{agreementId}/extend-expiry:
    post:
      tags:
        - Agreements
      summary: Extend agreement expiry
      description: |
        Extends the expiry time of an existing agreement that hasn't expired yet.
        
        **Supported Extension Formats:**
        - **Duration in hours** (number 1-24): Extends from current expiry
        - **Preset string**: "1h", "6h", "12h", "24h"
        - **Absolute timestamp**: ISO 8601 format (sets new specific expiry time)
        
        **Constraints:**
        - Agreement must not be expired, settled, cancelled, or refunded
        - New expiry must be in the future
        - New expiry cannot exceed 24 hours from current time
        - Only seller or buyer can extend (if requesterAddress provided)
        
        **Rate Limited**: 10 requests per 15 minutes
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - extension
              properties:
                extension:
                  oneOf:
                    - type: number
                      minimum: 1
                      maximum: 24
                    - type: string
                      enum: ["1h", "6h", "12h", "24h"]
                    - type: string
                      format: date-time
                  description: |
                    Extension duration or new expiry time.
                    - Number: Hours to add from current expiry (1-24)
                    - Preset: "1h", "6h", "12h", "24h" from current expiry
                    - Timestamp: New absolute expiry time (ISO 8601)
                  example: "6h"
                requesterAddress:
                  type: string
                  description: Optional wallet address of the requester (seller or buyer). If provided, authorization is verified.
                  example: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
            examples:
              presetExtension:
                summary: Extend by preset duration
                value:
                  extension: "6h"
                  requesterAddress: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
              numericExtension:
                summary: Extend by number of hours
                value:
                  extension: 12
              absoluteExtension:
                summary: Set new absolute expiry
                value:
                  extension: "2025-11-04T18:00:00Z"
                  requesterAddress: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
      responses:
        '200':
          description: Expiry extended successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      agreementId:
                        type: string
                        example: "abc123"
                      oldExpiry:
                        type: string
                        format: date-time
                        example: "2025-11-03T12:00:00.000Z"
                      newExpiry:
                        type: string
                        format: date-time
                        example: "2025-11-03T18:00:00.000Z"
                      extensionHours:
                        type: number
                        example: 6
                      message:
                        type: string
                        example: "Successfully extended expiry by 6.0 hours"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-11-03T10:00:00.000Z"
        '400':
          description: Bad request (invalid extension, expired agreement, invalid state, or unauthorized)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts:
    get:
      tags:
        - Receipts
      summary: List receipts
      description: Retrieve a paginated list of settlement receipts with optional filters
      parameters:
        - in: query
          name: agreement_id
          schema:
            type: string
          description: Filter by agreement ID
        - in: query
          name: buyer
          schema:
            type: string
          description: Filter by buyer wallet address
        - in: query
          name: seller
          schema:
            type: string
          description: Filter by seller wallet address
        - in: query
          name: nft_mint
          schema:
            type: string
          description: Filter by NFT mint address
        - in: query
          name: start_date
          schema:
            type: string
            format: date-time
          description: Filter by start date (ISO 8601)
        - in: query
          name: end_date
          schema:
            type: string
            format: date-time
          description: Filter by end date (ISO 8601)
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts/{id}:
    get:
      tags:
        - Receipts
      summary: Get receipt by ID
      description: Retrieve a specific settlement receipt by its ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Receipt ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts/agreement/{agreementId}:
    get:
      tags:
        - Receipts
      summary: Get receipt by agreement ID
      description: Retrieve the settlement receipt for a specific agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts/hash/{hash}:
    get:
      tags:
        - Receipts
      summary: Get receipt by hash
      description: Retrieve a settlement receipt by its cryptographic hash
      parameters:
        - in: path
          name: hash
          required: true
          schema:
            type: string
          description: Receipt hash
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts/{id}/verify:
    post:
      tags:
        - Receipts
      summary: Verify receipt signature
      description: Verify the cryptographic signature of a settlement receipt
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Receipt ID
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptVerificationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions:
    get:
      tags:
        - Transactions
      summary: List transaction logs
      description: Search and filter transaction logs with pagination
      parameters:
        - $ref: '#/components/parameters/TransactionQueryParams'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionLogListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/logs:
    get:
      tags:
        - Transactions
      summary: List transaction logs (alternative endpoint)
      description: Alternative endpoint for searching and filtering transaction logs
      parameters:
        - $ref: '#/components/parameters/TransactionQueryParams'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionLogListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/logs/{txId}:
    get:
      tags:
        - Transactions
      summary: Get transaction by ID
      description: Retrieve a specific transaction log by transaction ID
      parameters:
        - in: path
          name: txId
          required: true
          schema:
            type: string
          description: Transaction ID (signature)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionLogResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/agreements/{agreementId}:
    get:
      tags:
        - Transactions
      summary: Get agreement transactions
      description: Retrieve all transactions for a specific agreement with statistics
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementTransactionsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/stats/{agreementId}:
    get:
      tags:
        - Transactions
      summary: Get transaction statistics
      description: Get transaction statistics for a specific agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionStatsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/failed:
    get:
      tags:
        - Transactions
      summary: Get recent failed transactions
      description: Retrieve recent failed transactions for debugging purposes
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Number of results
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionLog'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/{agreementId}:
    get:
      tags:
        - Webhooks
      summary: Get webhooks for agreement
      description: Retrieve all webhook delivery records for a specific agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/status/{webhookId}:
    get:
      tags:
        - Webhooks
      summary: Get webhook delivery status
      description: Retrieve detailed delivery status for a specific webhook
      parameters:
        - in: path
          name: webhookId
          required: true
          schema:
            type: string
            format: uuid
          description: Webhook ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/retry/{webhookId}:
    post:
      tags:
        - Webhooks
      summary: Retry webhook delivery
      description: Manually retry a failed webhook delivery
      parameters:
        - in: path
          name: webhookId
          required: true
          schema:
            type: string
            format: uuid
          description: Webhook ID
      responses:
        '200':
          description: Retry initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Webhook retry initiated
                  webhookId:
                    type: string
                    format: uuid
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/config:
    get:
      tags:
        - Webhooks
      summary: Get webhook configurations
      description: Retrieve all registered webhook endpoint configurations
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                  configs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        url:
                          type: string
                        events:
                          type: array
                          items:
                            type: string
                        enabled:
                          type: boolean
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/cleanup:
    post:
      tags:
        - Webhooks
      summary: Clean up old webhooks
      description: Delete old delivered webhook records from the database
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Delete webhooks older than this many days
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  deletedCount:
                    type: integer
                  daysOld:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/status:
    get:
      tags:
        - Expiry & Cancellation
      summary: Get orchestrator status
      description: Retrieve the status of the expiry and cancellation orchestrator service
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: object
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/health:
    get:
      tags:
        - Expiry & Cancellation
      summary: Health check
      description: Check health of expiry and cancellation services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  health:
                    type: object
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  health:
                    type: object

  /api/expiry-cancellation/check-expired:
    post:
      tags:
        - Expiry & Cancellation
      summary: Manually trigger expiry check
      description: Manually trigger a check for expired agreements
      responses:
        '200':
          description: Check completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
                    properties:
                      checkedCount:
                        type: integer
                      expiredCount:
                        type: integer
                      expiredAgreementIds:
                        type: array
                        items:
                          type: string
                      errorCount:
                        type: integer
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/expiring-soon:
    get:
      tags:
        - Expiry & Cancellation
      summary: Get expiring agreements
      description: Retrieve agreements that are about to expire within a specified time window
      parameters:
        - in: query
          name: withinMinutes
          schema:
            type: integer
            minimum: 1
            maximum: 1440
            default: 60
          description: Time window in minutes
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  agreements:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
                  withinMinutes:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/refund/calculate/{agreementId}:
    get:
      tags:
        - Expiry & Cancellation
      summary: Calculate refund
      description: Calculate refund amounts for an agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  calculation:
                    type: object
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/refund/process/{agreementId}:
    post:
      tags:
        - Expiry & Cancellation
      summary: Process refund
      description: Process refunds for a cancelled or expired agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Refund processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/refund/eligibility/{agreementId}:
    get:
      tags:
        - Expiry & Cancellation
      summary: Check refund eligibility
      description: Check if an agreement is eligible for refunds
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  eligibility:
                    type: object
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    AgreementId:
      in: path
      name: agreementId
      required: true
      schema:
        type: string
      description: Agreement ID
      
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 255
      description: Idempotency key to prevent duplicate requests (required for agreement creation)
      
    TransactionQueryParams:
      in: query
      name: query
      schema:
        type: object
        properties:
          agreementId:
            type: string
            description: Filter by agreement ID
          operationType:
            type: string
            enum: [INIT_ESCROW, DEPOSIT_SOL, DEPOSIT_NFT_A, DEPOSIT_NFT_B, SETTLE, CANCEL, REFUND]
            description: Filter by operation type
          status:
            type: string
            enum: [PENDING, CONFIRMED, FAILED, FINALIZED]
            description: Filter by status
          txId:
            type: string
            description: Filter by transaction ID (partial match)
          dateFrom:
            type: string
            format: date-time
            description: Filter by date range start (ISO 8601)
          dateTo:
            type: string
            format: date-time
            description: Filter by date range end (ISO 8601)
          limit:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            description: Number of results
          offset:
            type: integer
            minimum: 0
            default: 0
            description: Pagination offset
          sortBy:
            type: string
            enum: [timestamp, blockHeight]
            default: timestamp
            description: Sort field
          sortOrder:
            type: string
            enum: [asc, desc]
            default: desc
            description: Sort order

  schemas:
    AgreementStatus:
      type: string
      enum:
        - PENDING_INIT
        - PENDING_DEPOSITS
        - SOL_LOCKED
        - NFT_A_LOCKED
        - NFT_B_LOCKED
        - BOTH_LOCKED
        - ALL_LOCKED
        - SETTLED
        - EXPIRED
        - CANCELLED
      description: |
        Agreement status:
        - PENDING_INIT: Agreement is being initialized on-chain
        - PENDING_DEPOSITS: Waiting for required deposits
        - SOL_LOCKED: SOL has been deposited (for NFT<>SOL or NFT+SOL<>NFT swaps)
        - NFT_A_LOCKED: Seller's NFT has been deposited
        - NFT_B_LOCKED: Buyer's NFT has been deposited (for NFT<>NFT swaps)
        - BOTH_LOCKED: Two required assets are locked
        - ALL_LOCKED: All required assets are locked, ready for settlement
        - SETTLED: Agreement has been successfully settled
        - EXPIRED: Agreement has expired without settlement
        - CANCELLED: Agreement has been cancelled

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: easy-escrow-ai-backend
        database:
          type: string
          enum: [connected, disconnected]
        redis:
          type: string
          enum: [connected, disconnected]
        monitoring:
          type: object
          properties:
            status:
              type: string
              enum: [running, stopped]
            monitoredAccounts:
              type: integer
            uptime:
              type: string
            restartCount:
              type: integer
            solanaHealthy:
              type: boolean
        expiryCancellation:
          type: object
          properties:
            status:
              type: string
              enum: [running, stopped]
            services:
              type: object
            recentErrors:
              type: array
              items:
                type: object
        idempotency:
          type: object
          properties:
            status:
              type: string
              enum: [running, stopped]
            expirationHours:
              type: integer
            cleanupIntervalMinutes:
              type: integer

    CreateAgreementRequest:
      type: object
      required:
        - nftMint
        - seller
        - expiry
        - feeBps
        - honorRoyalties
        - swapType
      properties:
        nftMint:
          type: string
          description: |
            The seller's NFT mint address (NFT A - unique identifier).
            
            Important: This is NOT "minting" (creating) an NFT.
            The NFT must ALREADY EXIST in the seller's wallet.
            Provide the mint address of the specific NFT to be traded in this escrow agreement.
            
            In Solana, a "mint" is the account that defines a token type. For NFTs,
            the mint address serves as the unique identifier (like a serial number or contract address).
            
            **Supported:** Traditional NFTs (Metaplex standard)
            **Coming soon:** Compressed NFTs (cNFTs)
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        nftBMint:
          type: string
          description: |
            The buyer's NFT mint address (NFT B - unique identifier).
            Required for NFT_FOR_NFT_WITH_FEE and NFT_FOR_NFT_PLUS_SOL swap types.
            
            The NFT must ALREADY EXIST in the buyer's wallet.
            
            **Supported:** Traditional NFTs (Metaplex standard)
            **Coming soon:** Compressed NFTs (cNFTs)
          example: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        swapType:
          type: string
          enum: ['NFT_FOR_SOL', 'NFT_FOR_NFT_WITH_FEE', 'NFT_FOR_NFT_PLUS_SOL']
          default: 'NFT_FOR_SOL'
          description: |
            Type of swap to execute:
            - **NFT_FOR_SOL**: Direct exchange of NFT for SOL (default)
            - **NFT_FOR_NFT_WITH_FEE**: Exchange two NFTs with separate SOL fee payment
            - **NFT_FOR_NFT_PLUS_SOL**: Exchange NFT + SOL for another NFT
          example: "NFT_FOR_SOL"
        solAmount:
          type: string
          description: |
            Amount of SOL in lamports (as string to preserve precision).
            Required for NFT_FOR_SOL and NFT_FOR_NFT_PLUS_SOL swap types.
            1 SOL = 1,000,000,000 lamports.
            
            For NFT_FOR_NFT_WITH_FEE, this represents the platform fee amount.
          example: "1000000000"
        seller:
          type: string
          description: Seller wallet public key
          example: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        buyer:
          type: string
          description: Buyer wallet public key (optional, can be set later)
          example: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        expiry:
          oneOf:
            - type: string
              format: date-time
            - type: number
            - type: string
              enum: ["5m", "1h", "6h", "12h", "24h"]
          description: |
            Agreement expiry time. Supports multiple formats for flexibility:
            
            **Format Options:**
            - **ISO 8601 timestamp** (absolute time): "2025-11-04T12:00:00Z"
            - **Duration in hours** (number 0.0833-24, where 0.0833 = 5 minutes): 12
            - **Preset string**: "5m", "1h", "6h", "12h", "24h"
            - **Optional**: If not provided, defaults to 5 minutes from creation
            
            **Constraints:**
            - Minimum duration: 5 minutes from creation
            - Maximum duration: 24 hours from creation
            - Default: 5 minutes (when not specified)
            - Expiry must be in the future
            
            **Examples:**
            - Absolute: "2025-11-04T12:00:00Z" (expires at specific time)
            - Duration: 12 (expires 12 hours from now)
            - Preset: "5m" (expires 5 minutes from now - default)
            - Preset: "6h" (expires 6 hours from now)
            - Omitted: Uses default of 5 minutes from now
            
            **Note:** A 60-second buffer is added on-chain to prevent clock skew issues.
          example: "5m"
        expiryDurationHours:
          type: number
          minimum: 0.0833
          maximum: 24
          description: |
            Optional: Explicit duration in hours (alternative to expiry field).
            Minimum is 0.0833 hours (5 minutes). Default is 0.0833 hours (5 minutes) if not provided.
            If both expiry and expiryDurationHours are provided, expiry takes precedence.
          example: 6
        feeBps:
          type: integer
          description: Platform fee in basis points (100 = 1%)
          minimum: 0
          maximum: 10000
          example: 250
        honorRoyalties:
          type: boolean
          description: Whether to honor NFT creator royalties
          example: true

    CreateAgreementResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            agreementId:
              type: string
              example: "AGR-1234567890"
            escrowPda:
              type: string
              example: "EscrowPdaAddress..."
            depositAddresses:
              type: object
              properties:
                nftA:
                  type: string
                  description: Deposit address for seller's NFT
                  example: "NftADepositAddress..."
                sol:
                  type: string
                  description: Deposit address for SOL (if required by swap type)
                  example: "SolDepositAddress..."
                nftB:
                  type: string
                  description: Deposit address for buyer's NFT (if required by swap type)
                  example: "NftBDepositAddress..."
            expiry:
              type: string
              format: date-time
            transactionId:
              type: string
              example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        timestamp:
          type: string
          format: date-time

    AgreementListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Agreement'
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            pages:
              type: integer
        timestamp:
          type: string
          format: date-time

    AgreementDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/AgreementDetail'
        timestamp:
          type: string
          format: date-time

    Agreement:
      type: object
      properties:
        agreementId:
          type: string
        swapType:
          type: string
          enum: ['NFT_FOR_SOL', 'NFT_FOR_NFT_WITH_FEE', 'NFT_FOR_NFT_PLUS_SOL']
        nftMint:
          type: string
          description: The seller's NFT mint address (NFT A)
        nftBMint:
          type: string
          description: The buyer's NFT mint address (NFT B) - only for NFT<>NFT swaps
        solAmount:
          type: string
          description: Amount of SOL in lamports
        seller:
          type: string
        buyer:
          type: string
        status:
          $ref: '#/components/schemas/AgreementStatus'
        expiry:
          type: string
          format: date-time
        feeBps:
          type: integer
        honorRoyalties:
          type: boolean
        escrowPda:
          type: string
        nftADepositAddr:
          type: string
          description: Deposit address for seller's NFT
        solDepositAddr:
          type: string
          description: Deposit address for SOL
        nftBDepositAddr:
          type: string
          description: Deposit address for buyer's NFT (NFT<>NFT swaps only)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AgreementDetail:
      allOf:
        - $ref: '#/components/schemas/Agreement'
        - type: object
          properties:
            deposits:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
                    enum: [SOL, NFT_A, NFT_B]
                  depositor:
                    type: string
                  amount:
                    type: string
                  status:
                    type: string
                    enum: [PENDING, CONFIRMED, FAILED]
                  txId:
                    type: string
                  detectedAt:
                    type: string
                    format: date-time
                  confirmedAt:
                    type: string
                    format: date-time
            balances:
              type: object
              properties:
                solLocked:
                  type: boolean
                nftALocked:
                  type: boolean
                nftBLocked:
                  type: boolean
                actualSolAmount:
                  type: string
            isExpired:
              type: boolean
            canBeCancelled:
              type: boolean
            cancelledAt:
              type: string
              format: date-time
            settledAt:
              type: string
              format: date-time

    CancelAgreementResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            agreementId:
              type: string
            status:
              $ref: '#/components/schemas/AgreementStatus'
            cancelledAt:
              type: string
              format: date-time
            transactionId:
              type: string
            message:
              type: string
        timestamp:
          type: string
          format: date-time

    Receipt:
      type: object
      properties:
        id:
          type: string
        agreementId:
          type: string
        swapType:
          type: string
          enum: ['NFT_FOR_SOL', 'NFT_FOR_NFT_WITH_FEE', 'NFT_FOR_NFT_PLUS_SOL']
        nftMint:
          type: string
          description: The seller's NFT mint address (NFT A)
        nftBMint:
          type: string
          description: The buyer's NFT mint address (NFT B) - for NFT<>NFT swaps
        solAmount:
          type: string
          description: Amount of SOL exchanged (in lamports)
        platformFee:
          type: string
          description: Platform fee amount (in SOL lamports)
        creatorRoyalty:
          type: string
          description: Creator royalty amount (in SOL lamports)
        buyer:
          type: string
        seller:
          type: string
        escrowTxId:
          type: string
        settlementTxId:
          type: string
        receiptHash:
          type: string
        signature:
          type: string
        createdAt:
          type: string
          format: date-time
        settledAt:
          type: string
          format: date-time
        generatedAt:
          type: string
          format: date-time

    ReceiptResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Receipt'
        timestamp:
          type: string
          format: date-time

    ReceiptListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Receipt'
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            pages:
              type: integer
        timestamp:
          type: string
          format: date-time

    ReceiptVerificationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            receiptHash:
              type: string
            signature:
              type: string
            isValid:
              type: boolean
        timestamp:
          type: string
          format: date-time

    TransactionLog:
      type: object
      properties:
        id:
          type: string
        txId:
          type: string
        operationType:
          type: string
          enum: [INIT_ESCROW, DEPOSIT_SOL, DEPOSIT_NFT_A, DEPOSIT_NFT_B, SETTLE, CANCEL, REFUND]
        agreementId:
          type: string
        status:
          type: string
          enum: [PENDING, CONFIRMED, FAILED, FINALIZED]
        blockHeight:
          type: string
        slot:
          type: string
        errorMessage:
          type: string
        timestamp:
          type: string
          format: date-time
        explorerUrl:
          type: string

    TransactionLogResponse:
      allOf:
        - $ref: '#/components/schemas/TransactionLog'

    TransactionLogListResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    TransactionStatsResponse:
      type: object
      properties:
        agreementId:
          type: string
        totalTransactions:
          type: integer
        byOperationType:
          type: object
          additionalProperties:
            type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        firstTransaction:
          type: string
          format: date-time
        lastTransaction:
          type: string
          format: date-time

    AgreementTransactionsResponse:
      type: object
      properties:
        agreementId:
          type: string
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
        stats:
          type: object
          properties:
            totalTransactions:
              type: integer
            byOperationType:
              type: object
              additionalProperties:
                type: integer
            byStatus:
              type: object
              additionalProperties:
                type: integer
            firstTransaction:
              type: string
              format: date-time
            lastTransaction:
              type: string
              format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [ESCROW_FUNDED, ESCROW_ASSET_LOCKED, ESCROW_SETTLED, ESCROW_EXPIRED, ESCROW_REFUNDED]
        targetUrl:
          type: string
        status:
          type: string
          enum: [PENDING, DELIVERED, FAILED]
        attempts:
          type: integer
        maxAttempts:
          type: integer
        lastAttemptAt:
          type: string
          format: date-time
        lastResponseCode:
          type: integer
        deliveredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        scheduledFor:
          type: string
          format: date-time

    WebhookListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        agreementId:
          type: string
        count:
          type: integer
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'

    WebhookStatusResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        webhook:
          allOf:
            - $ref: '#/components/schemas/Webhook'
            - type: object
              properties:
                agreementId:
                  type: string
                lastResponseBody:
                  type: string
                payload:
                  type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication (not yet implemented)

# No security applied for now (development)
