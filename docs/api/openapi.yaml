                      lockTransaction:
                        $ref: '#/components/schemas/LockTransaction'
                        description: Next party's lock transaction (if not fully locked)
                      message:
                        type: string
                      nextAction:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not a party to this swap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/bulk/{id}/cancel:
    post:
      tags:
        - Bulk Swaps
      summary: Cancel bulk swap
      description: Cancel a bulk swap offer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - walletAddress
              properties:
                walletAddress:
                  type: string
                  description: Wallet requesting cancellation
                reason:
                  type: string
                  description: Optional cancellation reason
      responses:
        '200':
          description: Swap cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        $ref: '#/components/schemas/TwoPhaseSwap'
                      message:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/offers/bulk/{id}/delegation-status:
    get:
      tags:
        - Bulk Swaps
      summary: Get delegation status
      description: Check delegation status for cNFT assets in a bulk offer
      parameters:
