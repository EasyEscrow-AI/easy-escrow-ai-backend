                    type: string
                    format: date-time
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/institution-escrow/allowlist/{wallet}:
    delete:
      tags:
        - Institution Admin
      summary: Remove wallet from allowlist
      description: Remove a Solana wallet address from the institution escrow allowlist.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: wallet
          required: true
          schema:
            type: string
          description: Solana wallet address to remove
      responses:
        '200':
          description: Wallet removed from allowlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Wallet 498GVi... removed from allowlist"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/institution-escrow/corridors:
    post:
      tags:
        - Institution Admin
      summary: Configure corridor
      description: |
        Create or update a payment corridor between two countries. If a corridor with the
        same source/destination already exists, it will be updated (upsert).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCorridorConfig'
            example:
              sourceCountry: "SG"
              destCountry: "CH"
              minAmount: 100
              maxAmount: 1000000
              dailyLimit: 500000
              monthlyLimit: 5000000
              riskLevel: "LOW"
              requiredDocuments:
                - "INVOICE"
                - "PURCHASE_ORDER"
      responses:
        '201':
          description: Corridor configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AdminCorridor'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Institution Admin
      summary: List corridors
      description: Retrieve all configured payment corridors.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Corridors listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminCorridor'
                  count:
                    type: integer
                    example: 3
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    OfferId:
      in: path
      name: offerId
      required: true
      schema:
        type: string
      description: Agreement ID

    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 255
      description: Idempotency key to prevent duplicate requests (required for agreement creation)
      
    TransactionQueryParams:
      in: query
      name: query
      schema:
        type: object
        properties:
          agreementId:
            type: string
            description: Filter by agreement ID
          operationType:
            type: string
            enum: [INIT_ESCROW, DEPOSIT_SOL, DEPOSIT_NFT_A, DEPOSIT_NFT_B, SETTLE, CANCEL, REFUND]
            description: Filter by operation type
          status:
            type: string
            enum: [PENDING, CONFIRMED, FAILED, FINALIZED]
            description: Filter by status
          txId:
            type: string
            description: Filter by transaction ID (partial match)
          dateFrom:
            type: string
            format: date-time
            description: Filter by date range start (ISO 8601)
          dateTo:
            type: string
            format: date-time
            description: Filter by date range end (ISO 8601)
          limit:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            description: Number of results
          offset:
            type: integer
            minimum: 0
            default: 0
            description: Pagination offset
          sortBy:
            type: string
            enum: [timestamp, blockHeight]
            default: timestamp
            description: Sort field
          sortOrder:
            type: string
            enum: [asc, desc]
            default: desc
            description: Sort order

  schemas:
    # Asset schemas
    SupportedAsset:
      type: object
      description: A supported asset type for atomic swaps
      properties:
        id:
          type: string
          description: Unique identifier for the asset type
          example: spl-nft
        name:
          type: string
          description: Display name of the asset type
          example: SPL NFT
        description:
          type: string
          description: Detailed description of the asset type
          example: Solana SPL Token NFT (Metaplex standard)
        chain:
          type: string
          description: Name of the blockchain
          example: Solana
        chainId:
          type: string
          description: Unique identifier for the blockchain
          example: solana
        status:
          type: string
          enum:
            - active
            - coming_soon
            - deprecated
          description: Current support status
          example: active
        type:
          type: string
          enum:
            - nft
            - token
          description: Asset category
          example: nft
        standard:
          type: string
          description: Technical standard (for NFTs)
          example: Metaplex Token Metadata
      required:
        - id
        - name
        - description
        - chain
        - chainId
        - status
        - type

    SupportedChain:
      type: object
      description: A supported blockchain
      properties:
        id:
          type: string
          description: Unique identifier for the chain
          example: solana
        name:
          type: string
          description: Display name of the chain
          example: Solana
        status:
          type: string
          enum:
            - active
            - coming_soon
            - deprecated
          description: Current support status
          example: active
      required:
        - id
        - name
        - status

    AssetsListResponse:
      type: object
      description: Response containing all supported assets and chains
      properties:
        success:
          type: boolean
          example: true
        timestamp:
          type: string
          format: date-time
          example: '2024-12-19T10:00:00.000Z'
        data:
          type: object
          properties:
            assets:
              type: array
              items:
                $ref: '#/components/schemas/SupportedAsset'
            chains:
              type: array
              items:
                $ref: '#/components/schemas/SupportedChain'
            summary:
              type: object
              properties:
                totalAssets:
                  type: integer
                  description: Total number of asset types
                  example: 4
                activeAssets:
                  type: integer
                  description: Number of active asset types
                  example: 4
                supportedChains:
                  type: integer
                  description: Number of supported blockchains
                  example: 1

    AssetDetailResponse:
      type: object
      description: Response containing details for a single asset
      properties:
        success:
          type: boolean
          example: true
        timestamp:
          type: string
          format: date-time
          example: '2024-12-19T10:00:00.000Z'
        data:
          $ref: '#/components/schemas/SupportedAsset'

    QuoteRequest:
      type: object
      properties:
        makerAssets:
          type: array
          description: NFTs offered by the maker
          items:
            $ref: '#/components/schemas/QuoteAsset'
        takerAssets:
          type: array
          description: NFTs offered by the taker (requested by maker)
          items:
            $ref: '#/components/schemas/QuoteAsset'
        makerSolLamports:
          type: integer
          description: SOL amount offered by maker (in lamports)
          default: 0
          example: 0
        takerSolLamports:
          type: integer
          description: SOL amount offered by taker (in lamports)
          default: 0
          example: 100000000
        apiKey:
          type: string
          description: Optional API key for zero-fee swaps
          example: "your-api-key-here"

    QuoteAsset:
      type: object
      required:
        - mint
      properties:
        mint:
          type: string
          description: NFT mint address
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        isCompressed:
          type: boolean
          description: Whether the NFT is a compressed NFT (cNFT)
          default: false
        isCoreNft:
          type: boolean
          description: Whether the NFT is a Metaplex Core NFT
          default: false
        name:
          type: string
          description: NFT name (optional, for display)
          example: "Cool NFT #123"
        image:
          type: string
          description: NFT image URL (optional)
        symbol:
          type: string
          description: NFT symbol (optional)
        proofNodes:
          type: integer
          description: |
            Number of Merkle proof nodes for cNFT (optional).
            If not provided, worst-case estimate (14 nodes) is used.
          example: 3

    QuoteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/QuoteData'
        timestamp:
          type: string
          format: date-time

    QuoteData:
      type: object
      properties:
        solPriceUSD:
          type: number
          description: Current SOL price in USD (from CoinGecko, cached 1 minute)
          example: 138.30
        maker:
          $ref: '#/components/schemas/QuoteSide'
        taker:
          $ref: '#/components/schemas/QuoteSide'
        estimatedTime:
          type: object
          properties:
            seconds:
              type: integer
              description: Estimated swap time in seconds
              example: 5
            display:
              type: string
              description: Human-readable time estimate
              example: "~5 seconds"
        networkFee:
          $ref: '#/components/schemas/QuoteFee'
        platformFee:
          type: object
          allOf:
            - $ref: '#/components/schemas/QuoteFee'
            - type: object
              properties:
                type:
                  type: string
                  enum: [percentage, flat, zero]
                  description: |
                    Fee type:
                    - percentage: 1% of SOL amount (for swaps involving SOL)
                    - flat: 0.005 SOL (for NFT-only swaps)
                    - zero: No fee (for API key users)
                  example: "percentage"
                rate:
                  type: number
                  description: Fee rate (0.01 for 1%, 0.005 for flat fee, 0 for zero)
                  example: 0.01
                label:
                  type: string
                  description: Display label for the fee
                  example: "Platform Fee (1%):"
        transactionSize:
          $ref: '#/components/schemas/QuoteTransactionSize'
        warnings:
          type: array
          description: Warning messages about potential issues
          items:
            type: string
          example: ["cNFT proof size varies by tree. Estimate uses worst case (14 nodes)."]
        canSwap:
          type: boolean
          description: Whether the swap can proceed (false if transaction too large or other issues)
          example: true

    QuoteSide:
      type: object
      description: Quote information for one side of the swap (maker or taker)
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/QuoteAsset'
        assetCount:
          type: integer
          description: Total number of NFTs on this side
          example: 1
        sol:
          type: object
          nullable: true
          description: SOL amount if any (null if no SOL on this side)
          properties:
            sol:
              type: number
              example: 0.1
            lamports:
              type: integer
              example: 100000000
            usd:
              type: number
              nullable: true
              example: 13.83
            display:
              type: string
              example: "0.1000 SOL (~$13.83 USD)"
        breakdown:
          type: object
          properties:
            splNfts:
              type: integer
              description: Count of SPL NFTs
              example: 0
            cNfts:
              type: integer
              description: Count of compressed NFTs
              example: 1
            coreNfts:
              type: integer
              description: Count of Metaplex Core NFTs
              example: 0

    QuoteFee:
      type: object
      description: Fee amount with USD conversion
      properties:
        sol:
          type: number
          description: Fee amount in SOL
          example: 0.001
        lamports:
          type: integer
          description: Fee amount in lamports
          example: 1000000
        usd:
          type: number
          nullable: true
          description: Fee amount in USD (null if SOL price unavailable)
          example: 0.14
        display:
          type: string
          description: Formatted display string
          example: "0.0010 SOL (~$0.14 USD)"

    QuoteTransactionSize:
      type: object
      description: Transaction size estimation
      properties:
        estimated:
          type: integer
          description: Estimated transaction size in bytes (without ALT)
          example: 1271
        estimatedWithALT:
          type: integer
          nullable: true
          description: Estimated size with Address Lookup Table (null if still too large)
          example: 745
        maxSize:
          type: integer
          description: Maximum allowed transaction size (1232 bytes)
          example: 1232
        willFit:
          type: boolean
          description: Whether transaction fits without ALT
          example: false
        willFitWithALT:
          type: boolean
          description: Whether transaction fits with ALT
          example: true
        altAvailable:
          type: boolean
          description: Whether an Address Lookup Table is configured
          example: true
        useALT:
          type: boolean
          description: Whether ALT will be used for this transaction
          example: true
        altSavings:
          type: integer
          nullable: true
          description: Bytes saved by using ALT (null if not using ALT)
          example: 526
        status:
          type: string
          enum: [ok, alt_required, near_limit, too_large]
          description: |
            Transaction size status:
            - ok: Fits without ALT
            - alt_required: Requires ALT to fit
            - near_limit: Fits but close to limit (>80%)
            - too_large: Exceeds limit even with ALT
          example: "alt_required"
        breakdown:
          type: object
          description: Size breakdown by component
          properties:
            signatures:
              type: integer
              description: Signature data size (64 bytes × signers)
              example: 192
            accounts:
              type: integer
              description: Account keys size (32 bytes × accounts)
              example: 672
            instructions:
              type: integer
              description: Instruction data size
              example: 154
            cnftProofs:
              type: integer
              description: cNFT Merkle proof data size
              example: 556
        details:
          type: object
          description: Detailed count information
          properties:
            numSigners:
              type: integer
              example: 3
            numAccounts:
              type: integer
              example: 24
            makerProofNodes:
              type: integer
              description: Proof nodes for maker's cNFT(s)
              example: 14
            takerProofNodes:
              type: integer
              description: Proof nodes for taker's cNFT(s)
              example: 0

    Asset:
      type: object
      description: An NFT or cNFT asset in a swap offer
      required:
        - mint
      properties:
        mint:
          type: string
          description: NFT mint address (asset ID for cNFTs)
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        isCompressed:
          type: boolean
          description: Whether the NFT is a compressed NFT (cNFT)
          default: false
          example: false
        isCoreNft:
          type: boolean
          description: Whether the NFT is a Metaplex Core NFT
          default: false
          example: false
        name:
          type: string
          description: NFT name (optional)
          example: "Cool NFT #123"
        image:
          type: string
          description: NFT image URL (optional)
        symbol:
          type: string
          description: NFT symbol (optional)

    CreateOfferRequest:
      type: object
      description: Request body for creating a new swap offer
      properties:
        makerWallet:
          type: string
          description: Wallet address of the offer creator
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        takerWallet:
          type: string
          description: Optional specific taker wallet (for direct offers)
          example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
        offeredAssets:
          type: array
          description: NFTs/cNFTs offered by the maker
          items:
            $ref: '#/components/schemas/Asset'
        requestedAssets:
          type: array
          description: NFTs/cNFTs requested from the taker
          items:
            $ref: '#/components/schemas/Asset'
        offeredSol:
          type: string
          description: SOL amount offered by maker (in lamports)
          example: "0"
        requestedSol:
          type: string
          description: SOL amount requested from taker (in lamports)
          example: "1000000000"
        expiryDurationHours:
          type: number
          description: Offer expiry duration in hours (1-720, default 168)
          minimum: 1
          maximum: 720
          example: 168
        bidderWallet:
          type: string
          description: For cNFT bids - bidder wallet address
        targetAssetId:
          type: string
          description: For cNFT bids - target cNFT asset ID
        offerLamports:
          type: string
          description: For cNFT bids - SOL offer amount in lamports
        durationSeconds:
          type: integer
          description: For cNFT bids - bid duration in seconds
        partyA:
          type: string
          description: Alias for makerWallet (bundle swaps)
        partyB:
          type: string
          description: Alias for takerWallet (bundle swaps)
        assetsA:
          type: array
          description: Alias for offeredAssets (bundle swaps)
          items:
            $ref: '#/components/schemas/Asset'
        assetsB:
          type: array
          description: Alias for requestedAssets (bundle swaps)
          items:
            $ref: '#/components/schemas/Asset'
        solAmountA:
          type: string
          description: Alias for offeredSol (bundle swaps)
        solAmountB:
          type: string
          description: Alias for requestedSol (bundle swaps)

    OfferSummary:
      type: object
      description: Summary of a swap offer for listing
      properties:
        id:
          type: string
          description: Unique offer ID
          example: "1"
        status:
          $ref: '#/components/schemas/OfferStatus'
        makerWallet:
          type: string
          description: Maker's wallet address
        takerWallet:
          type: string
          nullable: true
          description: Taker's wallet address (null for open offers)
        offeredAssetCount:
          type: integer
          description: Number of assets offered by maker
          example: 1
        requestedAssetCount:
          type: integer
          description: Number of assets requested from taker
          example: 0
        offeredSol:
          type: string
          description: SOL offered by maker (in lamports)
          example: "0"
        requestedSol:
          type: string
          description: SOL requested from taker (in lamports)
          example: "1000000000"
        expiresAt:
          type: string
          format: date-time
          description: Offer expiration time
        createdAt:
          type: string
          format: date-time
          description: Offer creation time

    OfferDetail:
      type: object
      description: Full details of a swap offer
      properties:
        id:
          type: string
          description: Unique offer ID
          example: "1"
        status:
          $ref: '#/components/schemas/OfferStatus'
        makerWallet:
          type: string
          description: Maker's wallet address
        takerWallet:
          type: string
          nullable: true
          description: Taker's wallet address
        offeredAssets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        requestedAssets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        offeredSol:
          type: string
          description: SOL offered by maker (in lamports)
        requestedSol:
          type: string
          description: SOL requested from taker (in lamports)
        platformFee:
          type: string
          description: Platform fee in lamports
        nonceAccount:
          type: string
          description: Durable nonce account address
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        filledAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        parentOfferId:
          type: string
          nullable: true
          description: Parent offer ID for counter-offers

    AgreementStatus:
      type: string
      enum:
        - PENDING_INIT
        - PENDING_DEPOSITS
        - SOL_LOCKED
        - NFT_A_LOCKED
        - NFT_B_LOCKED
        - BOTH_LOCKED
        - ALL_LOCKED
        - SETTLED
        - EXPIRED
        - CANCELLED
      description: |
        Status of an agreement:
        - PENDING_INIT: Agreement is being initialized
        - PENDING_DEPOSITS: Waiting for deposits
        - SOL_LOCKED: SOL has been deposited
        - NFT_A_LOCKED: Seller's NFT has been deposited
        - NFT_B_LOCKED: Buyer's NFT has been deposited
        - BOTH_LOCKED: Two assets are locked
        - ALL_LOCKED: All assets locked, ready for settlement
        - SETTLED: Successfully settled
        - EXPIRED: Expired without settlement
        - CANCELLED: Cancelled

    OfferStatus:
      type: string
      enum:
        - PENDING_INIT
        - PENDING_DEPOSITS
        - SOL_LOCKED
        - NFT_A_LOCKED
        - NFT_B_LOCKED
        - BOTH_LOCKED
        - ALL_LOCKED
        - SETTLED
        - EXPIRED
        - CANCELLED
        - EXPIRED
      description: |
        Agreement status:
        - PENDING_INIT: Agreement is being initialized on-chain
        - PENDING_DEPOSITS: Waiting for required deposits
        - SOL_LOCKED: SOL has been deposited (for NFT<>SOL or NFT+SOL<>NFT swaps)
        - NFT_A_LOCKED: Seller's NFT has been deposited
        - NFT_B_LOCKED: Buyer's NFT has been deposited (for NFT<>NFT swaps)
        - BOTH_LOCKED: Two required assets are locked
        - ALL_LOCKED: All required assets are locked, ready for settlement
        - SETTLED: Agreement has been successfully settled
        - EXPIRED: Agreement has expired without settlement
        - CANCELLED: Agreement has been cancelled

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          example: healthy
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: easy-escrow-ai-backend
        mode:
          type: string
          example: atomic-swap
        database:
          type: string
          enum: [connected, disconnected]
          example: connected
        redis:
          type: string
          enum: [connected, disconnected]
          example: connected
        idempotency:
          type: object
          properties:
            isRunning:
              type: boolean
            status:
              type: string
              enum: [running, stopped]
            expirationHours:
              type: integer
            cleanupIntervalMinutes:
              type: integer

    CreateAgreementRequest:
      type: object
      required:
        - nftMint
        - seller
        - expiry
        - feeBps
        - honorRoyalties
        - swapType
      properties:
        nftMint:
          type: string
          description: |
            The seller's NFT mint address (NFT A - unique identifier).
            
            Important: This is NOT "minting" (creating) an NFT.
            The NFT must ALREADY EXIST in the seller's wallet.
            Provide the mint address of the specific NFT to be traded in this escrow agreement.
            
            In Solana, a "mint" is the account that defines a token type. For NFTs,
            the mint address serves as the unique identifier (like a serial number or contract address).
            
            **Supported:** Traditional NFTs, Compressed NFTs (cNFTs), Metaplex Core NFTs
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        nftBMint:
          type: string
          description: |
            The buyer's NFT mint address (NFT B - unique identifier).
            Required for NFT_FOR_NFT_WITH_FEE and NFT_FOR_NFT_PLUS_SOL swap types.
            
            The NFT must ALREADY EXIST in the buyer's wallet.
            
            **Supported:** Traditional NFTs, Compressed NFTs (cNFTs), Metaplex Core NFTs
          example: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        swapType:
          type: string
          enum: ['NFT_FOR_SOL', 'NFT_FOR_NFT_WITH_FEE', 'NFT_FOR_NFT_PLUS_SOL']
          default: 'NFT_FOR_SOL'
          description: |
            Type of swap to execute:
            - **NFT_FOR_SOL**: Direct exchange of NFT for SOL (1% platform fee paid by taker, blockchain fees covered)
            - **NFT_FOR_NFT_WITH_FEE**: Exchange two NFTs (0.005 SOL flat fee paid by taker, blockchain fees covered)
            - **NFT_FOR_NFT_PLUS_SOL**: Exchange NFT + SOL for another NFT (1% platform fee paid by taker, blockchain fees covered)

            **Limits for all types:** Min 0.1 SOL, Max 15 SOL (up to $5,000 AUD)
          example: "NFT_FOR_SOL"
        solAmount:
          type: string
          description: |
            Amount of SOL in lamports (as string to preserve precision).
            Required for NFT_FOR_SOL and NFT_FOR_NFT_PLUS_SOL swap types.
            1 SOL = 1,000,000,000 lamports.
            
            For NFT_FOR_NFT_WITH_FEE, this represents the platform fee (0.005 SOL = 5,000,000 lamports).
            
            **Limits:** Min 100,000,000 lamports (0.1 SOL), Max 15,000,000,000 lamports (15 SOL)
          example: "1000000000"
        seller:
          type: string
          description: Seller wallet public key
          example: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        buyer:
          type: string
          description: Buyer wallet public key (optional, can be set later)
          example: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        expiry:
          oneOf:
            - type: string
              format: date-time
            - type: number
            - type: string
              enum: ["1h", "6h", "12h", "24h", "7d", "30d"]
          description: |
            Agreement expiry time. Supports multiple formats for flexibility.
            Uses durable nonces for extended validity periods.

            **Format Options:**
            - **ISO 8601 timestamp** (absolute time): "2025-11-04T12:00:00Z"
            - **Duration in hours** (number 1-720): 24
            - **Preset string**: "1h", "6h", "12h", "24h", "7d", "30d"
            - **Optional**: If not provided, defaults to 7 days

            **Constraints:**
            - Minimum duration: 1 hour
            - Maximum duration: 30 days (720 hours)
            - Default: 7 days (when not specified)
            - Expiry must be in the future

            **Examples:**
            - Absolute: "2025-11-04T12:00:00Z" (expires at specific time)
            - Duration: 24 (expires 24 hours from now)
            - Preset: "7d" (expires 7 days from now - default)
            - Preset: "1h" (expires 1 hour from now - minimum)
            - Omitted: Uses default of 7 days

            **Note:** A 60-second buffer is added on-chain to prevent clock skew issues.
          example: "7d"
        expiryDurationHours:
          type: number
          minimum: 1
          maximum: 720
          description: |
            Optional: Explicit duration in hours (alternative to expiry field).
            Minimum is 1 hour. Maximum is 720 hours (30 days). Default is 168 hours (7 days) if not provided.
            If both expiry and expiryDurationHours are provided, expiry takes precedence.
          example: 168
        feeBps:
          type: integer
          description: |
            Platform fee in basis points (100 = 1%).
            - For NFT_FOR_SOL: 1% (100 bps) of SOL amount (paid by taker)
            - For NFT_FOR_NFT_WITH_FEE: Fixed 0.005 SOL flat fee (paid by taker)
            - For NFT_FOR_NFT_PLUS_SOL: 1% (100 bps) of SOL amount (paid by taker)
          minimum: 0
          maximum: 10000
          example: 100
        honorRoyalties:
          type: boolean
          description: Whether to honor NFT creator royalties
          example: true

