openapi: 3.0.3
info:
  title: EasyEscrow.ai API
  version: 1.0.0
  description: |
    Backend API service for EasyEscrow.ai - Super fast and easy to use digital escrow platform.
    
    ## Features
    - Create escrow agreements for NFT <> USDC
    - On-chain non-custodial functionality (assets secured by Smart Contract)
    - Automatic atomic settlement when both assets are verified on-chain
    - Automatic agreement expiry and refund handling (auto return to sender)
    - Comprehensive webhook notifications (real-time updates)
    - Receipt generation and on-chain verification of assets
    - Transaction logging and monitoring to ensure a smooth escrow
    - Rate Limiting: 10 agreement requests per 15 minutes
    - Idempotency: Agreement creation endpoints support idempotency keys to prevent duplicates
    
  contact:
    name: EasyEscrow.ai Support
    email: support@easyescrow.ai
  license:
    name: ISC
    
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.easyescrow.ai
    description: Production server

tags:
  - name: Health
    description: Service health and status endpoints
  - name: Agreements
    description: Escrow agreement management
  - name: Receipts
    description: Settlement receipt retrieval and verification
  - name: Transactions
    description: Transaction logging and monitoring
  - name: Webhooks
    description: Webhook delivery management
  - name: Expiry & Cancellation
    description: Agreement expiry, cancellation, and refund management

paths:
  /:
    get:
      tags:
        - Health
      summary: API root endpoint
      description: Returns API information and available endpoints
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: EasyEscrow.ai Backend API
                  version:
                    type: string
                    example: 1.0.0
                  endpoints:
                    type: object
                    properties:
                      health:
                        type: string
                        example: /health
                      agreements:
                        type: string
                        example: /v1/agreements
                      receipts:
                        type: string
                        example: /v1/receipts
                      transactions:
                        type: string
                        example: /v1/transactions
                      expiryCancellation:
                        type: string
                        example: /api/expiry-cancellation
                      webhooks:
                        type: string
                        example: /api/webhooks

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API and all connected services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/agreements:
    post:
      tags:
        - Agreements
      summary: Create a new escrow agreement
      description: |
        Creates a new escrow agreement for an NFT purchase. This initializes the escrow on the Solana blockchain
        and generates deposit addresses for USDC and NFT.
        
        **Rate Limited**: 10 requests per 15 minutes
        **Idempotency**: Supports X-Idempotency-Key header
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgreementRequest'
      responses:
        '201':
          description: Agreement created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    get:
      tags:
        - Agreements
      summary: List agreements
      description: Retrieve a paginated list of escrow agreements with optional filters
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AgreementStatus'
          description: Filter by agreement status
        - in: query
          name: seller
          schema:
            type: string
          description: Filter by seller wallet address
        - in: query
          name: buyer
          schema:
            type: string
          description: Filter by buyer wallet address
        - in: query
          name: nft_mint
          schema:
            type: string
          description: Filter by NFT mint address
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/agreements/{agreementId}:
    get:
      tags:
        - Agreements
      summary: Get agreement by ID
      description: Retrieve detailed information about a specific agreement including balances and deposits
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/agreements/{agreementId}/cancel:
    post:
      tags:
        - Agreements
      summary: Cancel an expired agreement
      description: |
        Cancels an expired agreement that hasn't been settled. This triggers refunds to depositors.
        Only works for agreements that have passed their expiry date.
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Agreement cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelAgreementResponse'
        '400':
          description: Bad request (agreement not expired or already settled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts:
    get:
      tags:
        - Receipts
      summary: List receipts
      description: Retrieve a paginated list of settlement receipts with optional filters
      parameters:
        - in: query
          name: agreement_id
          schema:
            type: string
          description: Filter by agreement ID
        - in: query
          name: buyer
          schema:
            type: string
          description: Filter by buyer wallet address
        - in: query
          name: seller
          schema:
            type: string
          description: Filter by seller wallet address
        - in: query
          name: nft_mint
          schema:
            type: string
          description: Filter by NFT mint address
        - in: query
          name: start_date
          schema:
            type: string
            format: date-time
          description: Filter by start date (ISO 8601)
        - in: query
          name: end_date
          schema:
            type: string
            format: date-time
          description: Filter by end date (ISO 8601)
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts/{id}:
    get:
      tags:
        - Receipts
      summary: Get receipt by ID
      description: Retrieve a specific settlement receipt by its ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Receipt ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts/agreement/{agreementId}:
    get:
      tags:
        - Receipts
      summary: Get receipt by agreement ID
      description: Retrieve the settlement receipt for a specific agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts/hash/{hash}:
    get:
      tags:
        - Receipts
      summary: Get receipt by hash
      description: Retrieve a settlement receipt by its cryptographic hash
      parameters:
        - in: path
          name: hash
          required: true
          schema:
            type: string
          description: Receipt hash
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/receipts/{id}/verify:
    post:
      tags:
        - Receipts
      summary: Verify receipt signature
      description: Verify the cryptographic signature of a settlement receipt
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Receipt ID
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptVerificationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions:
    get:
      tags:
        - Transactions
      summary: List transaction logs
      description: Search and filter transaction logs with pagination
      parameters:
        - $ref: '#/components/parameters/TransactionQueryParams'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionLogListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/logs:
    get:
      tags:
        - Transactions
      summary: List transaction logs (alternative endpoint)
      description: Alternative endpoint for searching and filtering transaction logs
      parameters:
        - $ref: '#/components/parameters/TransactionQueryParams'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionLogListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/logs/{txId}:
    get:
      tags:
        - Transactions
      summary: Get transaction by ID
      description: Retrieve a specific transaction log by transaction ID
      parameters:
        - in: path
          name: txId
          required: true
          schema:
            type: string
          description: Transaction ID (signature)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionLogResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/agreements/{agreementId}:
    get:
      tags:
        - Transactions
      summary: Get agreement transactions
      description: Retrieve all transactions for a specific agreement with statistics
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementTransactionsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/stats/{agreementId}:
    get:
      tags:
        - Transactions
      summary: Get transaction statistics
      description: Get transaction statistics for a specific agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionStatsResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/transactions/failed:
    get:
      tags:
        - Transactions
      summary: Get recent failed transactions
      description: Retrieve recent failed transactions for debugging purposes
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Number of results
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionLog'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/{agreementId}:
    get:
      tags:
        - Webhooks
      summary: Get webhooks for agreement
      description: Retrieve all webhook delivery records for a specific agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/status/{webhookId}:
    get:
      tags:
        - Webhooks
      summary: Get webhook delivery status
      description: Retrieve detailed delivery status for a specific webhook
      parameters:
        - in: path
          name: webhookId
          required: true
          schema:
            type: string
            format: uuid
          description: Webhook ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/retry/{webhookId}:
    post:
      tags:
        - Webhooks
      summary: Retry webhook delivery
      description: Manually retry a failed webhook delivery
      parameters:
        - in: path
          name: webhookId
          required: true
          schema:
            type: string
            format: uuid
          description: Webhook ID
      responses:
        '200':
          description: Retry initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Webhook retry initiated
                  webhookId:
                    type: string
                    format: uuid
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/config:
    get:
      tags:
        - Webhooks
      summary: Get webhook configurations
      description: Retrieve all registered webhook endpoint configurations
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                  configs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        url:
                          type: string
                        events:
                          type: array
                          items:
                            type: string
                        enabled:
                          type: boolean
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/webhooks/cleanup:
    post:
      tags:
        - Webhooks
      summary: Clean up old webhooks
      description: Delete old delivered webhook records from the database
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Delete webhooks older than this many days
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  deletedCount:
                    type: integer
                  daysOld:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/status:
    get:
      tags:
        - Expiry & Cancellation
      summary: Get orchestrator status
      description: Retrieve the status of the expiry and cancellation orchestrator service
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: object
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/health:
    get:
      tags:
        - Expiry & Cancellation
      summary: Health check
      description: Check health of expiry and cancellation services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  health:
                    type: object
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  health:
                    type: object

  /api/expiry-cancellation/check-expired:
    post:
      tags:
        - Expiry & Cancellation
      summary: Manually trigger expiry check
      description: Manually trigger a check for expired agreements
      responses:
        '200':
          description: Check completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
                    properties:
                      checkedCount:
                        type: integer
                      expiredCount:
                        type: integer
                      expiredAgreementIds:
                        type: array
                        items:
                          type: string
                      errorCount:
                        type: integer
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/expiring-soon:
    get:
      tags:
        - Expiry & Cancellation
      summary: Get expiring agreements
      description: Retrieve agreements that are about to expire within a specified time window
      parameters:
        - in: query
          name: withinMinutes
          schema:
            type: integer
            minimum: 1
            maximum: 1440
            default: 60
          description: Time window in minutes
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  agreements:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
                  withinMinutes:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/refund/calculate/{agreementId}:
    get:
      tags:
        - Expiry & Cancellation
      summary: Calculate refund
      description: Calculate refund amounts for an agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  calculation:
                    type: object
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/refund/process/{agreementId}:
    post:
      tags:
        - Expiry & Cancellation
      summary: Process refund
      description: Process refunds for a cancelled or expired agreement
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Refund processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expiry-cancellation/refund/eligibility/{agreementId}:
    get:
      tags:
        - Expiry & Cancellation
      summary: Check refund eligibility
      description: Check if an agreement is eligible for refunds
      parameters:
        - $ref: '#/components/parameters/AgreementId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  eligibility:
                    type: object
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    AgreementId:
      in: path
      name: agreementId
      required: true
      schema:
        type: string
      description: Agreement ID
      
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 255
      description: Idempotency key to prevent duplicate requests (required for agreement creation)
      
    TransactionQueryParams:
      in: query
      name: query
      schema:
        type: object
        properties:
          agreementId:
            type: string
            description: Filter by agreement ID
          operationType:
            type: string
            enum: [INIT_ESCROW, DEPOSIT_USDC, DEPOSIT_NFT, SETTLE, CANCEL, REFUND]
            description: Filter by operation type
          status:
            type: string
            enum: [PENDING, CONFIRMED, FAILED, FINALIZED]
            description: Filter by status
          txId:
            type: string
            description: Filter by transaction ID (partial match)
          dateFrom:
            type: string
            format: date-time
            description: Filter by date range start (ISO 8601)
          dateTo:
            type: string
            format: date-time
            description: Filter by date range end (ISO 8601)
          limit:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            description: Number of results
          offset:
            type: integer
            minimum: 0
            default: 0
            description: Pagination offset
          sortBy:
            type: string
            enum: [timestamp, blockHeight]
            default: timestamp
            description: Sort field
          sortOrder:
            type: string
            enum: [asc, desc]
            default: desc
            description: Sort order

  schemas:
    AgreementStatus:
      type: string
      enum:
        - PENDING_INIT
        - PENDING_DEPOSITS
        - USDC_LOCKED
        - NFT_LOCKED
        - BOTH_LOCKED
        - SETTLED
        - EXPIRED
        - CANCELLED
      description: |
        Agreement status:
        - PENDING_INIT: Agreement is being initialized on-chain
        - PENDING_DEPOSITS: Waiting for deposits
        - USDC_LOCKED: USDC has been deposited
        - NFT_LOCKED: NFT has been deposited
        - BOTH_LOCKED: Both USDC and NFT are locked, ready for settlement
        - SETTLED: Agreement has been successfully settled
        - EXPIRED: Agreement has expired without settlement
        - CANCELLED: Agreement has been cancelled

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: easy-escrow-ai-backend
        database:
          type: string
          enum: [connected, disconnected]
        redis:
          type: string
          enum: [connected, disconnected]
        monitoring:
          type: object
          properties:
            status:
              type: string
              enum: [running, stopped]
            monitoredAccounts:
              type: integer
            uptime:
              type: string
            restartCount:
              type: integer
            solanaHealthy:
              type: boolean
        expiryCancellation:
          type: object
          properties:
            status:
              type: string
              enum: [running, stopped]
            services:
              type: object
            recentErrors:
              type: array
              items:
                type: object
        idempotency:
          type: object
          properties:
            status:
              type: string
              enum: [running, stopped]
            expirationHours:
              type: integer
            cleanupIntervalMinutes:
              type: integer

    CreateAgreementRequest:
      type: object
      required:
        - nftMint
        - price
        - seller
        - expiry
        - feeBps
        - honorRoyalties
      properties:
        nftMint:
          type: string
          description: |
            The NFT's mint address (unique identifier).
            
            Important: This is NOT "minting" (creating) an NFT.
            The NFT must ALREADY EXIST in the seller's wallet.
            Provide the mint address of the specific NFT to be traded in this escrow agreement.
            
            In Solana, a "mint" is the account that defines a token type. For NFTs,
            the mint address serves as the unique identifier (like a serial number or contract address).
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        price:
          type: string
          description: Price in USDC (as string to preserve precision)
          example: "1000000000"
        seller:
          type: string
          description: Seller wallet public key
          example: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        buyer:
          type: string
          description: Buyer wallet public key (optional, can be set later)
          example: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        expiry:
          type: string
          format: date-time
          description: Agreement expiry date (ISO 8601)
          example: "2024-12-31T23:59:59Z"
        feeBps:
          type: integer
          description: Platform fee in basis points (100 = 1%)
          minimum: 0
          maximum: 10000
          example: 250
        honorRoyalties:
          type: boolean
          description: Whether to honor NFT creator royalties
          example: true

