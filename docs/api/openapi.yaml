    description: Staging environment (Devnet)
  - url: https://api.easyescrow.ai
    description: Production (Mainnet)

tags:
  - name: Introduction
    description: |
      Backend API service for EasyEscrow.ai - Non-custodial digital escrow platform on Solana.

      EasyEscrow.ai currently supports:

      ## Atomic Swaps
      Instant, non-custodial digital swaps that execute in a single transaction.

      **Features:**
      - Peer-to-peer settlement. Your assets are NEVER held in escrow (only leaves wallet upon instant settlement).
      - Swap happens all atomically or not at all (no partial settlement, no MEV attacks, no stuck assets).
      - Supported assets: SPL NFT (Metaplex standard), Core NFT (Metaplex Core), cNFT (Metaplex Bubblegum), SOL (Solana native token).

      ## Institutional Escrow
      Programmable cross-border stablecoin escrow payments, built for institutions compliance and auditability.

      **Features:**
      - Front-end integration with EasyEscrow Institution client portal app.
      - Solana DeFi stablecoin escrow settlement.
      - Primary support for USDC and AMINA-approved whitelist only tokens.
      - Primary support for Solana blockchain only.
      - AI-assisted payments (the AI only verifies, does not automate payments).
      - Escrow Settlement Mode: Atomic (non-custodial proof of funds) / Escrow (full PDA escrow).
      - Escrow Release Terms: programmable release mechanisms.
      - AI data anonymisation to keep sensitive data private from models.
      - Wallet whitelists and jurisdiction payment corridors.
      - Full blockchain audit of payment escrows and downloadable compliance & audit reports.
      - Escrow document uploads to secure server.
      - Supports KYC/KYB compliance integrations for clients (not activated for hackathon).
      - Supports AMINA Payment Network (APN) integrations (not activated for hackathon).
  - name: Changelog
    description: |
      ## Changelog

      ### v1.2.0 — Portal Integration
      **Released: 26 March 2026**

      New endpoints for the institution portal and branch management.

      - **Branches** — `GET /branches` with `riskLevel`, `isHeadquarters`, nested accounts
      - **Dashboard** — 8 analytics endpoints (metrics, cashflow, pending actions, branch/corridor activity, compliance, sanctions)
      - **Direct Payments** — list and detail endpoints for non-escrow transfers
      - **Reports** — compliance reports, audit logs, receipt history, escrow activity logs
      - **Reference data** — exchange rates, sanctioned regions, corridor list
      - **Receipts** — HTML/PDF receipt download and JSON receipt data
      - **Bootstrap** — single post-login endpoint to hydrate the full portal
      - **Account enhancements** — `branchId` filter, `includeBalances` opt-in, per-account settings, profile endpoint, refresh-balance
      - **Deposit transaction** — `GET /institution-escrow/{id}/deposit-tx` for unsigned Solana transactions

      ### v1.1.0 — Institutional Escrow
      **Released: 17 March 2026**

      Cross-border stablecoin escrow payments for institutional clients.

      - **AMINA-approved token whitelist** — USDC, USDT, EURC, PYUSD (active); RLUSD, USDG (pending)
      - Public token list endpoint: `GET /api/v1/institution/tokens`
      - Escrow creation accepts optional `tokenMint` (defaults to USDC)
      - Institution client authentication (JWT) with registration, login, and token refresh
      - Stablecoin escrow lifecycle: create, deposit, release, and cancel
      - AI-powered document analysis for compliance risk scoring
      - Wallet whitelists and jurisdiction payment corridors
      - File uploads for escrow supporting documents (PDF, images, Excel, CSV)
      - KYB profile management and client search/discovery
      - API key management for programmatic access
      - Admin endpoints for allowlist and corridor configuration
      - Settlement authority pattern for release operations
      - AI data anonymisation (PII redaction before model processing)

      ### v1.0.0 — Atomic Swaps
      **Released: 15 October 2025**

      Non-custodial peer-to-peer NFT and SOL atomic swaps on Solana.

      - NFT ↔ SOL, NFT ↔ NFT, and NFT + SOL ↔ NFT swap types
      - Support for SPL NFTs, Core NFTs, Compressed NFTs (cNFTs), and Programmable NFTs (pNFTs)
      - Jito bundle swaps for multi-NFT transactions (up to 4 NFTs)
      - TwoPhase fallback for bundle failures
      - Compressed NFT support with Merkle proof handling via DAS API
      - Dynamic platform fee calculation (1% SOL swaps, 0.005 SOL flat for NFT-only)
      - Offer lifecycle management (create, accept, cancel, counter, expire)
      - Durable nonce pool for reliable transaction submission
      - Health monitoring and service status endpoints
  - name: Atomic Swaps Overview
    description: |
      ## Non-Custodial Atomic Swaps

      EasyEscrow.ai atomic swaps are instant, non-custodial digital exchanges that execute in a single transaction on Solana.

      ### Key Features
      - **Peer-to-peer settlement** — your assets are NEVER held in escrow (only leave wallet upon instant settlement)
      - **Atomic execution** — swap happens all at once or not at all (no partial settlement, no MEV attacks, no stuck assets)
      - **Multiple asset types** — SPL NFTs, Core NFTs, cNFTs, and SOL
      - **Bundle swaps** — up to 4 NFTs per swap via Jito bundles

      ### How It Works
      1. **Create** an offer specifying maker/taker assets
      2. **Share** the offer with the counterparty
      3. **Accept** — both sides sign and the swap settles atomically on-chain
      4. If either side fails, the entire transaction reverts — no assets are lost

      ---

      ### Swap Types

      EasyEscrow.ai currently supports **three types of escrow swaps** on the **Solana blockchain**:

      #### 1. NFT ↔ SOL
      Direct exchange of an NFT for SOL payment.
      - **Seller provides:** NFT (Traditional NFT)
      - **Buyer provides:** SOL
      - **Platform fee:** 1% (100 basis points) - deducted from seller's proceeds
      - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)

      #### 2. NFT ↔ NFT (with SOL fee)
      Exchange of two NFTs with a flat SOL platform fee.
      - **Seller provides:** NFT A (Traditional NFT)
      - **Buyer provides:** NFT B (Traditional NFT) + 0.005 SOL platform fee
      - **Platform fee:** 0.005 SOL flat fee (paid by taker/buyer by default)

      #### 3. NFT + SOL ↔ NFT
      Exchange of an NFT plus SOL payment for another NFT.
      - **Seller provides:** NFT A (Traditional NFT) + SOL
      - **Buyer provides:** NFT B (Traditional NFT)
      - **Platform fee:** 1% (100 basis points) - deducted from SOL amount

      ---

      ### Blockchain Support

      - ✅ **Solana blockchain** (Devnet, Mainnet)
      - ✅ **Traditional NFTs** (Metaplex standard)
      - ✅ **Compressed NFTs (cNFTs)** (Metaplex Bubblegum)
      - ✅ **Metaplex Core NFTs**
      - ✅ **Programmable NFTs (pNFTs)**

      #### NFT Types Reference

      | Type | Full Name | Description | Status |
      |------|-----------|-------------|--------|
      | **cNFT** | Compressed NFT | Metaplex Bubblegum compressed NFTs stored in Merkle trees | ✅ Supported |
      | **CORE** | Metaplex CORE | Metaplex Core standard NFTs with improved functionality | ✅ Supported |
      | **pNFT** | Programmable NFT | Metaplex programmable NFTs with on-chain royalty enforcement | ✅ Supported |
      | **OTHER** | Other NFTs | Standard SPL NFTs, Semi-Fungible Tokens (SFT), and legacy formats | ✅ Supported |

      ---

      ### Bundle Swaps

      Bundle swaps of up to **4 NFTs total** (across both sides) are supported via Jito bundles.

      This limit exists because Jito bundles support a maximum of 5 transactions (1 for SOL/fee transfers + up to 4 for NFT transfers).

      #### cNFT-Specific Features
      - **Direct Bubblegum transfers** - cNFTs transfer directly without escrow custody
      - **Merkle proof handling** - Automatic proof fetching from DAS API
      - **Full canopy tree support** - Eliminates stale proof issues
      - **Rate-limited DAS API** - Built-in rate limiting, batching, and caching

      ---

      ### Fees & Limits

      #### Platform Fees
      - **NFT-only swaps**: 0.005 SOL flat fee (paid by taker)
      - **Swaps with SOL**: 1% of total SOL amount (paid by taker)
      - **Minimum fee**: 0.001 SOL
      - **Maximum fee**: 0.5 SOL (fee cap)

      #### Limits
      - **Min SOL**: 0.1 SOL minimum
      - **Max SOL**: 15 SOL maximum (up to $5,000 AUD limit)
      - **Max NFTs**: 4 NFTs total per swap (Jito bundle limit)
      - **Offer expiry**: 1 hour to 30 days (default: 7 days)
  - name: Health
    description: Service health and status endpoints
  - name: Atomic Swaps
    description: Atomic swap offer lifecycle management, supported assets, quotes, and bundle monitoring
  - name: Institution Overview
    description: |
      ## Cross-Border Institutional Escrow

      The Institution Escrow system enables **cross-border stablecoin payments on Solana** for
      institutional clients. Supports AMINA-approved stablecoins including USDC, USDT, EURC, and PYUSD.

      ### Key Features
      - **Multi-token support** — AMINA-approved stablecoins (USDC default, plus USDT, EURC, PYUSD)
      - **Authenticated accounts** via email + password with JWT tokens
      - **Compliance checks** with allowlists and corridor-based limits
      - **AI-powered document analysis** for risk assessment
      - **Multi-step escrow lifecycle** with 12 distinct states

      ### How It Works
      1. **Register** an institution client account
      2. **Configure** wallets and API keys via settings
      3. **List approved tokens** via `/api/v1/institution/tokens`
      4. **Create** an escrow with payer/recipient wallets, amount, corridor, and optional `tokenMint`
      5. **Deposit** stablecoins on-chain and record the transaction signature
      6. **Release** funds (requires settlement authority) or **cancel** the escrow
      7. Optionally **analyze** uploaded documents with AI for risk scoring

      ### Escrow States

      Every escrow progresses through a defined set of states. Terminal states (`COMPLETE`, `CANCELLED`, `EXPIRED`, `FAILED`) cannot transition further.

      | State | Description |
      |-------|-------------|
      | `DRAFT` | Saved as draft, not yet submitted |
      | `CREATED` | Escrow created, awaiting stablecoin deposit |
      | `FUNDED` | Deposit confirmed on-chain, awaiting release or cancellation |
      | `COMPLIANCE_HOLD` | Held for compliance review (medium risk score) |
      | `RELEASING` | Release transaction in progress |
      | `RELEASED` | Funds released to recipient |
      | `INSUFFICIENT_FUNDS` | Payer balance too low, can retry after funding |
      | `COMPLETE` | Settlement complete, notification sent (terminal) |
      | `CANCELLING` | Cancellation in progress |
      | `CANCELLED` | Escrow cancelled, funds refunded to payer (terminal) |
      | `EXPIRED` | Escrow expired without completion (terminal) |
      | `FAILED` | Escrow failed due to an error (terminal) |

      ### State Flow

      ```
      ┌──────────┐
      │  DRAFT   │ (save draft)
      └────┬─────┘
           │ submit
           ▼
                      ┌──────────────────────┐
                      │    Create Escrow      │
                      │  (compliance check)   │
                      └──────────┬───────────┘
                                 │
                  ┌──────────────┼──────────────┐
                  │              │              │
                  ▼              ▼              ▼
           ┌──────────┐  ┌───────────┐  (high risk)
           │ CREATED  │  │COMPLIANCE │   → rejected
           │          │  │   _HOLD   │
           └────┬─────┘  └─────┬─────┘
                │              │
         deposit│        cancel│
                ▼              ▼
           ┌──────────┐  ┌───────────┐
           │  FUNDED  │  │CANCELLING │──▶ CANCELLED
           └────┬─────┘  └───────────┘
                │
         ┌──────┼──────┐
         │      │      │
      release cancel  expire
         │      │      │
         ▼      ▼      ▼
      RELEASING CANCELLING EXPIRED
         │      │
         ├──▶ INSUFFICIENT_FUNDS ──▶ (retry release)
         │
         ▼
      RELEASED ──▶ COMPLETE
      ```

      ### State Transitions

      | From | Action | To | Notes |
      |------|--------|----|-------|
      | — | Save draft | `DRAFT` | Partial info, no compliance checks |
      | `DRAFT` | Submit | `CREATED` or `COMPLIANCE_HOLD` | Validates required fields, runs compliance |
      | — | Create (compliance passed) | `CREATED` | Ready for deposit |
      | — | Create (medium risk) | `COMPLIANCE_HOLD` | Requires review before proceeding |
      | — | Create (high risk ≥75) | Rejected | Error thrown, no escrow created |
      | `CREATED` | Record deposit | `FUNDED` | On-chain tx signature stored |
      | `CREATED` | Cancel | `CANCELLING` → `CANCELLED` | No deposit to refund |
      | `CREATED` | Auto-expire | `EXPIRED` | `expiresAt` exceeded (default 72h) |
      | `FUNDED` | Release funds | `RELEASING` → `RELEASED` | Requires settlement authority |
      | `FUNDED` | Cancel | `CANCELLING` → `CANCELLED` | On-chain refund to payer |
      | `FUNDED` | Auto-expire | `EXPIRED` | `expiresAt` exceeded |
      | `RELEASING` | Balance too low | `INSUFFICIENT_FUNDS` | Payer can fund and retry |
      | `INSUFFICIENT_FUNDS` | Release funds | `RELEASING` → `RELEASED` | Retry after funding |
      | `RELEASED` | Settlement complete | `COMPLETE` | Notification sent |
      | `COMPLIANCE_HOLD` | Cancel | `CANCELLING` → `CANCELLED` | No deposit to refund |
      | `COMPLIANCE_HOLD` | Auto-expire | `EXPIRED` | `expiresAt` exceeded |

      ### Feature Gate
      This feature is gated by the `INSTITUTION_ESCROW_ENABLED` environment variable.
      When disabled, all institution escrow endpoints return `503 Service Unavailable`.
  - name: Institution Auth
    description: Authentication for institution escrow clients (email/password, JWT)
  - name: Institution Settings
    description: Client settings, wallets, and API key management
  - name: Institution Clients
    description: Client profile lookup, search, list, and archive
  - name: Institution Files
    description: Document uploads for compliance (PDF, images, Excel, CSV)
  - name: Institution Tokens
    description: AMINA-approved stablecoin whitelist (public endpoint, no auth required)
  - name: Institution Escrow
    description: Cross-border stablecoin escrow payment lifecycle
  - name: AI Analysis
    description: |
      ## EasyEscrow AI

      AI-powered analysis helpers for the institutional escrow portal, using Claude (claude-sonnet-4-20250514).

      ### Analysis Types
      - **Escrow Analysis** — full AI review of escrow details (amounts, corridor, wallets, risk, client context)
      - **Document Analysis** — single file/document matched against an existing escrow (names, addresses, amounts)
      - **Client Analysis** — AI review of institution client profile & compliance posture

      ### Data Anonymization
      All analysis endpoints support `?anonymize=true` (default) which tokenizes sensitive data
      (company names, wallet addresses, PII) before sending to the AI model, then de-anonymizes
      the response. Use `?anonymize=false` to send raw data (for testing/internal use).
  - name: Institution Accounts
    description: |
      ## Institutional Accounts

      Manage Solana wallet accounts linked to your institution for escrow operations.

      ### Account Types
      - **TREASURY** — Primary treasury wallet for institutional funds
      - **OPERATIONS** — Day-to-day operations wallet
      - **SETTLEMENT** — Dedicated wallet for escrow settlements
      - **COLLATERAL** — Collateral/reserve wallet
      - **GENERAL** — General-purpose wallet

      ### Verification
      Accounts go through verification: `PENDING` → `VERIFIED` / `SUSPENDED` / `REJECTED`.
      Only verified accounts can be used for escrow operations.

      Each institution can set one account as the **default** for new escrow creation.
  - name: AI Chat
    description: |
      ## EasyEscrow AI Assistant

      Conversational AI assistant for institutional escrow users, powered by Claude.

      ### Features
      - Natural language questions about escrow operations, compliance, and platform usage
      - Context-aware responses based on the authenticated client's institution
      - PII anonymization pipeline — sensitive data is tokenized before reaching the AI model
      - Conversation history support for multi-turn interactions

      ### Data Privacy
      All messages pass through an anonymization pipeline that redacts PII (names, addresses,
      wallet keys, amounts) before sending to the AI model. Responses are then de-anonymized
      before returning to the client.
  - name: Institution Branches
    description: Branch management for multi-location institutions. Each branch has a geographic location, regulatory body, and compliance status. Accounts are linked to branches via `branchId`.
  - name: Institution Dashboard
    description: Dashboard analytics and metrics for the institution portal — cashflow, pending actions, branch/corridor activity, compliance scorecard, and sanctions alerts.
  - name: Institution Direct Payments
    description: Direct (non-escrow) USDC transfers between institutions, tracked with corridor metadata and compliance scoring.
  - name: Institution Reports
    description: Compliance reports, audit logs, receipt history, and escrow activity logs for regulatory and internal review.
  - name: Institution Reference
    description: Reference data — exchange rates, sanctioned regions, and payment corridors.
  - name: Institution Receipts
    description: Generate HTML/PDF receipts and structured JSON receipt data for completed escrows.
  - name: Institution Bootstrap
    description: Post-login endpoint that returns all data needed to hydrate the portal — profile, settings, accounts, branches, corridors, and notifications in a single request.
  - name: Privacy
    description: |
      Stealth address management for private escrow payments. Feature-gated — returns 503 when not enabled.
      Includes meta-address registration, blockchain scanning for incoming payments, and sweep operations.
  - name: Institution Notifications
    description: |
      ## In-App & Email Notifications

      Real-time notification system for escrow lifecycle events. Notifications are created automatically
      when escrow state changes occur and optionally sent via email based on user preferences.

      ### Notification Types (Escrow Lifecycle)
      | Type | Trigger | Priority |
      |------|---------|----------|
      | `ESCROW_CREATED` | Escrow created or draft submitted | MEDIUM |
      | `ESCROW_FUNDED` | Deposit confirmed on-chain | MEDIUM |
      | `ESCROW_COMPLIANCE_HOLD` | Held for compliance review | HIGH |
      | `ESCROW_INSUFFICIENT_FUNDS` | Release blocked — insufficient balance | HIGH |
      | `SETTLEMENT_COMPLETE` | Funds released to recipient | HIGH |
      | `ESCROW_CANCELLED` | Escrow cancelled by client | MEDIUM |
      | `ESCROW_EXPIRED` | Escrow expired without deposit | MEDIUM |

      ### Preference Flags
      Each notification type maps to a preference flag on the institution account:
      - `notifyOnEscrowCreated` — controls ESCROW_CREATED
      - `notifyOnEscrowFunded` — controls ESCROW_FUNDED, DEPOSIT_CONFIRMED
      - `notifyOnEscrowReleased` — controls SETTLEMENT_COMPLETE, ESCROW_CANCELLED, ESCROW_EXPIRED
      - `notifyOnComplianceAlert` — controls ESCROW_COMPLIANCE_HOLD, COMPLIANCE_CHECK_FAILED

      ### Email Delivery
      Emails are sent via Resend if a notification email is configured. Fallback chain:
      account → settings → client contactEmail → client email.
  - name: Institution Admin
    description: Admin operations for allowlist and corridor management

