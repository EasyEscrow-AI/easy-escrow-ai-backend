openapi: 3.0.3
info:
  title: EasyEscrow.ai Atomic Swap API
  version: 1.0.0
  description: |
    Backend API service for EasyEscrow.ai - Non-custodial atomic swap platform for NFTs and SOL on Solana.
    
    ## Supported Swap Types
    
    EasyEscrow.ai currently supports **three types of escrow swaps** on the **Solana blockchain**:
    
    ### 1. NFT <> SOL
    Direct exchange of an NFT for SOL payment.
    - **Seller provides:** NFT (Traditional NFT)
    - **Buyer provides:** SOL
    - **Platform fee:** 1% (100 basis points) - deducted from seller's proceeds
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ### 2. NFT <> NFT (with SOL fee)
    Exchange of two NFTs with a flat SOL platform fee.
    - **Seller provides:** NFT A (Traditional NFT)
    - **Buyer provides:** NFT B (Traditional NFT) + 0.005 SOL platform fee
    - **Platform fee:** 0.005 SOL flat fee (paid by taker/buyer by default)
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ### 3. NFT + SOL <> NFT
    Exchange of an NFT plus SOL payment for another NFT.
    - **Seller provides:** NFT A (Traditional NFT) + SOL
    - **Buyer provides:** NFT B (Traditional NFT)
    - **Platform fee:** 1% (100 basis points) - deducted from SOL amount
    - **Blockchain fees:** Covered by EasyEscrow (no additional cost to users)
    - **Min/Max:** 0.1 SOL minimum, 15 SOL maximum (up to $5,000 AUD limit)
    
    ## Blockchain Support
    - ✅ **Solana blockchain** (Devnet, Mainnet)
    - ✅ **Traditional NFTs** (Metaplex standard)
    - ✅ **Compressed NFTs (cNFTs)** (Metaplex Bubblegum)
    - ✅ **Metaplex Core NFTs**

    ## Bundle Swap Support

    Bundle swaps of up to **4 NFTs total** (across both sides) are supported via Jito bundles. This limit exists because Jito bundles support a maximum of 5 transactions (1 for SOL/fee transfers + up to 4 for NFT transfers). Any combination of NFT types (SPL NFT, Core NFT, cNFT) and SOL is supported.
    
    ### cNFT-Specific Features
    
    - **Direct Bubblegum transfers** - cNFTs transfer directly without escrow custody
    - **Merkle proof handling** - Automatic proof fetching from DAS API
    - **Full canopy tree support** - Eliminates stale proof issues
    - **Rate-limited DAS API** - Built-in rate limiting, batching, and caching
    
    ## Additional Features
    - **Custom expiry times** - Offers can be set to expire between 1 hour and 30 days (default: 7 days)
    - **On-chain non-custodial functionality** - Assets secured by Smart Contract, never held in escrow
    - **Automatic atomic settlement** - Swaps execute atomically when both parties sign the transaction
    - **Automatic offer expiry** - Expired offers are automatically marked as expired
    - **Comprehensive webhook notifications** - Real-time updates for all swap lifecycle events
    - **Transaction logging and monitoring** - Complete audit trail of all swap transactions
    - **Rate Limiting** - Standard endpoints: 100 requests per 15 minutes per IP; Strict endpoints: 20 requests per 15 minutes per IP
    - **Idempotency** - Offer creation endpoints support idempotency keys to prevent duplicate offers
    
    EasyEscrow.ai uses **atomic swaps** - instant, non-custodial exchanges that execute in a single transaction.
    Your assets are NEVER held in escrow. The swap happens atomically or not at all.
    
    ### How It Works
    
    1. **Maker creates offer** - Specifies what they offer and what they want
    2. **Taker accepts offer** - Gets a pre-built transaction to sign
    3. **Taker signs & broadcasts** - The swap executes atomically on Solana
    4. **Taker confirms** - Submits the transaction signature for verification
    5. **Instant settlement** - NFTs/SOL/cNFTs transfer simultaneously
    
    ### Supported Asset Types

    - ✅ **SOL** (Native Solana currency)
    - ✅ **Mixed swaps** (NFT ↔ SOL, NFT ↔ NFT, cNFT ↔ SOL, cNFT ↔ cNFT, etc.)
    - ✅ **Bundle swaps** - Up to 4 NFTs total (Jito bundle transaction limit)

    ### NFT Types Reference

    | Type | Full Name | Description | Status |
    |------|-----------|-------------|--------|
    | **cNFT** | Compressed Non-Fungible Token | Metaplex Bubblegum compressed NFTs stored in Merkle trees. Significantly cheaper to mint at scale. | ✅ Supported |
    | **CORE** | Metaplex CORE Token | Metaplex Core standard NFTs with improved functionality and lower costs than SPL. | ✅ Supported |
    | **pNFT** | Programmable Non-Fungible Token | Metaplex programmable NFTs with on-chain royalty enforcement and custom rules. | ✅ Supported |
    | **xNFT** | Executable Non-Fungible Token | Backpack executable NFTs that can contain embedded applications. | ⏳ Coming Soon |
    | **OTHER** | Other Non-Fungible Tokens | Standard SPL NFTs, Semi-Fungible Tokens (SFT), and legacy formats. | ✅ Supported |
    
    ### Key Features
    
    - **Non-custodial**: Assets never leave your wallet until the swap executes
    - **Atomic**: All transfers happen in one transaction or none at all
    - **Durable nonces**: Offers don't expire due to blockhash expiration
    - **Low fees**: 1% platform fee on SOL swaps, 0.005 SOL flat fee for NFT-only swaps
    - **Instant settlement**: No waiting for confirmations or multi-step processes
    - **Cancel anytime**: Cancel offers instantly by advancing the durable nonce


    ### Platform Fees
    
    - **NFT-only swaps**: 0.005 SOL flat fee (paid by taker)
    - **Swaps with SOL**: 1% of total SOL amount (paid by taker)
    - **Minimum fee**: 0.001 SOL
    - **Maximum fee**: 0.5 SOL (fee cap)
    
    ### Security
    
    - **Durable nonces** prevent transaction replay attacks
    - **Asset validation** ensures you own what you're trading
    - **Rate limiting** prevents API abuse
    - **Input validation** protects against malicious inputs
    - **Idempotency keys** prevent duplicate operations
    
  contact:
    name: EasyEscrow.ai Support
    email: support@easyescrow.ai
  license:
    name: ISC
    
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://staging-api.easyescrow.ai
    description: Staging environment (Devnet)
  - url: https://api.easyescrow.ai
    description: Production (Mainnet)

tags:
  - name: Health
    description: Service health and status
  - name: Atomic Swaps
    description: Atomic swap offer lifecycle management, supported assets, quotes, and bundle monitoring
  - name: DataSales
    description: DataSales.ai settlement layer for digital asset escrow.

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API and all connected services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/swaps/assets:
    get:
      tags:
        - Atomic Swaps
      summary: List supported assets
      description: |
        Returns a list of all supported assets and their chains for atomic swaps.

        **Supported Asset Types:**
        - **SPL NFT** - Solana SPL Token NFT (Metaplex standard)
        - **Core NFT** - Solana Metaplex Core NFT
        - **cNFT** - Solana Compressed NFT (Metaplex Bubblegum)
        - **SOL** - Solana native token

        All assets are currently on the Solana blockchain.
      responses:
        '200':
          description: List of supported assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetsListResponse'
              example:
                success: true
                timestamp: '2024-12-19T10:00:00.000Z'
                data:
                  assets:
                    - id: spl-nft
                      name: SPL NFT
                      description: Solana SPL Token NFT (Metaplex standard)
                      chain: Solana
                      chainId: solana
                      status: active
                      type: nft
                      standard: Metaplex Token Metadata
                    - id: core-nft
                      name: Core NFT
                      description: Solana Metaplex Core NFT
                      chain: Solana
                      chainId: solana
                      status: active
                      type: nft
                      standard: Metaplex Core
                    - id: cnft
                      name: cNFT
                      description: Solana Compressed NFT (Metaplex Bubblegum)
                      chain: Solana
                      chainId: solana
                      status: active
                      type: nft
                      standard: Metaplex Bubblegum
                    - id: sol
                      name: SOL
                      description: Solana native token
                      chain: Solana
                      chainId: solana
                      status: active
                      type: token
                  chains:
                    - id: solana
                      name: Solana
                      status: active
                  summary:
                    totalAssets: 4
                    activeAssets: 4
                    supportedChains: 1

  /api/swaps/quote:
    post:
      tags:
        - Atomic Swaps
      summary: Get swap quote
      description: |
        Get a comprehensive quote for an atomic swap including:
        - **SOL price** in USD (cached from CoinGecko)
        - **Network fees** (based on actual Solana signature costs)
        - **Platform fees** (percentage, flat, or zero-fee for API key users)
        - **Transaction size** estimation with ALT support
        - **Time estimates** based on NFT count and types
        - **Warnings** about cNFT limitations or multi-asset restrictions
        - **Swap feasibility** check (`canSwap` boolean)
        
        This endpoint consolidates all information needed for the swap confirmation modal.
        
        **Note:** cNFT transaction size estimates use worst-case proof node counts (14 nodes)
        since actual proof size varies by tree canopy depth and cannot be determined without
        fetching the full proof data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL Quote
                description: Quote for trading an SPL NFT for SOL
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                      name: "Cool NFT #123"
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 100000000
              cnftForSol:
                summary: cNFT ↔ SOL Quote
                description: Quote for trading a compressed NFT for SOL (larger transaction)
                value:
                  makerAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                      name: "Compressed NFT"
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 200000000
              nftForNft:
                summary: NFT ↔ NFT Quote
                description: Quote for trading two NFTs
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  takerAssets:
                    - mint: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  makerSolLamports: 0
                  takerSolLamports: 0
              zeroFee:
                summary: Zero-Fee Quote (API Key)
                description: Quote with zero platform fee using API key
                value:
                  makerAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  takerAssets: []
                  makerSolLamports: 0
                  takerSolLamports: 500000000
                  apiKey: "your-api-key-here"
      responses:
        '200':
          description: Quote generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers:
    get:
      tags:
        - Atomic Swaps
      summary: List offers
      description: Retrieve swap offers with optional filters and pagination
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OfferStatus'
          description: Filter by offer status
        - in: query
          name: makerWallet
          schema:
            type: string
          description: Filter by maker wallet address
        - in: query
          name: takerWallet
          schema:
            type: string
          description: Filter by taker wallet address
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offers:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfferSummary'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Atomic Swaps
      summary: Create offer (unified endpoint)
      description: |
        Create a new swap offer with automatic type detection.

        This unified endpoint supports **three offer types**:

        ### 1. Atomic Swap (default)
        Standard swaps for NFT↔NFT, NFT↔SOL, cNFT↔SOL.
        Use `makerWallet`, `offeredAssets`, `requestedAssets`, etc.

        ### 2. cNFT Bid (auto-detected when bidderWallet + targetAssetId + offerLamports present)
        Make a SOL bid on a specific cNFT.
        Use `bidderWallet`, `targetAssetId`, `offerLamports`.

        ### 3. Bundle Two-Phase Swap (auto-detected for 3+ cNFTs or 5+ total assets)
        Complex multi-asset swaps using lock/settle pattern.
        Use `partyA`, `assetsA`, `assetsB`, or standard fields.

        **Field Aliases Supported:**
        - `partyA` → `makerWallet`
        - `partyB` → `takerWallet`
        - `assetsA` → `offeredAssets`
        - `assetsB` → `requestedAssets`
        - `solAmountA` → `offeredSol`
        - `solAmountB` → `requestedSol`

        **Rate Limited**: 10 requests per 15 minutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            examples:
              nftForSol:
                summary: NFT ↔ SOL (Atomic)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  takerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  offeredAssets:
                    - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                      isCompressed: false
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "1000000000"
              cnftForSol:
                summary: cNFT ↔ SOL (Atomic)
                value:
                  makerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  offeredAssets:
                    - mint: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                      isCompressed: true
                  requestedAssets: []
                  offeredSol: "0"
                  requestedSol: "2000000000"
              cnftBid:
                summary: cNFT Bid (auto-detected)
                value:
                  bidderWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  targetAssetId: "DRiP2Pn2K6fuMLKQmt5rZWqHheXMyUtCeXhe8kDQdxRu"
                  offerLamports: "1000000000"
                  durationSeconds: 86400
              bulkSwapPartyStyle:
                summary: Bundle Swap (partyA/B style)
                value:
                  partyA: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
                  partyB: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
                  assetsA:
                    - mint: "Asset1MintAddress"
                      isCompressed: true
                    - mint: "Asset2MintAddress"
                      isCompressed: true
                    - mint: "Asset3MintAddress"
                      isCompressed: true
                  assetsB:
                    - mint: "Asset4MintAddress"
                      isCompressed: false
                  solAmountA: "0"
                  solAmountB: "500000000"
      responses:
        '201':
          description: Offer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "1"
                          status:
                            type: string
                            example: "PENDING"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                            nullable: true
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                          createdAt:
                            type: string
                            format: date-time
                      offerType:
                        type: string
                        enum: [ATOMIC, CNFT_BID, BULK_TWO_PHASE]
                        description: |
                          The detected offer type:
                          - `ATOMIC`: Standard swap (NFT↔NFT, NFT↔SOL, cNFT↔SOL)
                          - `CNFT_BID`: cNFT bid with SOL escrow
                          - `BULK_TWO_PHASE`: Bundle swap using lock/settle pattern
                        example: "ATOMIC"
                      transaction:
                        type: object
                        properties:
                          nonceAccount:
                            type: string
                            description: Durable nonce account address
                          message:
                            type: string
                            example: "Transaction will be built when offer is accepted"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Validation error - asset ownership or on-chain validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}:
    get:
      tags:
        - Atomic Swaps
      summary: Get offer details
      description: Retrieve full details for a specific offer
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/OfferDetail'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/counter:
    post:
      tags:
        - Atomic Swaps
      summary: Create counter-offer
      description: Create a counter-offer to an existing offer with different terms
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
            example:
              makerWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              takerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              offeredAssets: []
              requestedAssets:
                - mint: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
                  isCompressed: false
              offeredSol: "1500000000"
              requestedSol: "0"
      responses:
        '201':
          description: Counter-offer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      parentOfferId:
                        type: integer
                      status:
                        type: string
                        example: "PENDING"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/cancel:
    post:
      tags:
        - Atomic Swaps
      summary: Cancel offer
      description: |
        Cancel an active offer. This advances the durable nonce, invalidating any 
        serialized transactions that reference it.
        
        Only the maker can cancel their offer.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - walletAddress
              properties:
                walletAddress:
                  type: string
                  description: Must be the maker's wallet address
                  example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
      responses:
        '200':
          description: Offer cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: integer
                      status:
                        type: string
                        example: "CANCELLED"
                      cancelledAt:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Offer cancelled and nonce advanced"
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Unauthorized - not the maker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/accept:
    post:
      tags:
        - Atomic Swaps
      summary: Accept offer
      description: |
        Accept an active offer and receive the atomic swap transaction(s) to sign.
        
        **Single Transaction (Simple swaps):**
        The API returns a base64-encoded transaction that you must:
        1. Deserialize
        2. Sign with your wallet
        3. Broadcast to Solana
        4. Call /confirm with the signature
        
        **Multiple Transactions (Bundle swaps):**
        For swaps involving 3+ NFTs of any type, the API may return multiple transactions in a `bulkSwap` object:
        - Each transaction must be signed by the appropriate party (maker or taker)
        - Transactions should be sent sequentially or as a Jito bundle
        - The `requiredSigners` array indicates which wallet(s) must sign each transaction
        - On mainnet, transactions are bundled atomically via Jito
        
        **Requires idempotency key** to prevent duplicate nonce consumption.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - takerWallet
              properties:
                takerWallet:
                  type: string
                  description: Your wallet address (must match offer if it's a direct offer)
                  example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
      responses:
        '200':
          description: Transaction ready for signing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                            example: "ACCEPTED"
                          makerWallet:
                            type: string
                          takerWallet:
                            type: string
                          offeredAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          requestedAssets:
                            type: array
                            items:
                              $ref: '#/components/schemas/Asset'
                          offeredSol:
                            type: string
                            description: In lamports
                          requestedSol:
                            type: string
                            description: In lamports
                      transaction:
                        type: object
                        description: Single transaction (for simple swaps without cNFTs)
                        properties:
                          serialized:
                            type: string
                            description: Base64-encoded transaction to sign and broadcast
                            example: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDz..."
                          nonceAccount:
                            type: string
                            description: Durable nonce account used in the transaction
                      bulkSwap:
                        type: object
                        description: Multiple transactions (for bundle swaps with 3+ NFTs of any type)
                        properties:
                          isBulkSwap:
                            type: boolean
                            description: Indicates this is a bundle swap with multiple transactions
                            example: true
                          strategy:
                            type: string
                            description: |
                              Swap strategy:
                              - SINGLE_TRANSACTION: Simple swap via escrow program
                              - DIRECT_BUBBLEGUM_BUNDLE: cNFT bundle swap
                              - DIRECT_NFT_BUNDLE: SPL/Core NFT bundle swap
                              - MIXED_NFT_BUNDLE: Mixed NFT types bundle swap
                            enum:
                              - SINGLE_TRANSACTION
                              - DIRECT_BUBBLEGUM_BUNDLE
                              - DIRECT_NFT_BUNDLE
                              - MIXED_NFT_BUNDLE
                            example: "DIRECT_BUBBLEGUM_BUNDLE"
                          transactionCount:
                            type: integer
                            description: Number of transactions in the bundle
                            example: 2
                          requiresJitoBundle:
                            type: boolean
                            description: Whether Jito bundle is required (mainnet only)
                            example: true
                          transactions:
                            type: array
                            description: Array of transactions to sign and send
                            items:
                              type: object
                              properties:
                                index:
                                  type: integer
                                  description: Transaction index in the bundle
                                  example: 0
                                purpose:
                                  type: string
                                  description: Purpose of this transaction
                                  example: "SOL transfers and platform fee"
                                serializedTransaction:
                                  type: string
                                  description: Base64-encoded transaction
                                requiredSigners:
                                  type: array
                                  description: Wallet addresses that must sign this transaction
                                  items:
                                    type: string
                                  example: ["8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"]
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not authorized to accept this offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error - asset ownership validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/confirm:
    post:
      tags:
        - Atomic Swaps
      summary: Confirm swap execution
      description: |
        Confirm that you've broadcast the swap transaction and provide its signature.
        
        The API will verify the transaction on-chain and mark the offer as filled.
        
        **Requires idempotency key** to prevent duplicate confirmations.
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
              properties:
                signature:
                  type: string
                  description: Transaction signature from Solana
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z"
      responses:
        '200':
          description: Swap confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Swap confirmed successfully"
                      signature:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid signature or transaction failed on-chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swaps/offers/{offerId}/bundle-status:
    get:
      tags:
        - Atomic Swaps
      summary: Get bundle execution status
      description: |
        Get the current status of a bundle swap execution (for swaps with 3+ NFTs).
        
        Bundle statuses:
        - **PENDING**: Bundle created, not yet submitted
        - **SUBMITTED**: Bundle submitted to Jito/RPC
        - **LANDED**: All transactions confirmed on-chain
        - **FAILED**: Bundle execution failed
        - **PARTIAL**: Some transactions succeeded, some failed
        - **TIMEOUT**: Bundle submission timed out
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Bundle status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offerId:
                        type: string
                      bundleStatus:
                        type: string
                        enum: [PENDING, SUBMITTED, LANDED, FAILED, PARTIAL, TIMEOUT]
                      transactionCount:
                        type: integer
                      confirmedCount:
                        type: integer
                      failedCount:
                        type: integer
                      signatures:
                        type: array
                        items:
                          type: string
                      error:
                        type: string
                        nullable: true
                      updatedAt:
                        type: string
                        format: date-time
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
  # DATASALES SETTLEMENT LAYER ENDPOINTS
  # =============================================================================

  /api/datasales/agreements:
    get:
      tags:
        - DataSales
      summary: List agreements
      description: |
        List DataSales agreements by seller or buyer wallet.
        Either `seller` or `buyer` query parameter is required.
      parameters:
        - in: query
          name: seller
          schema:
            type: string
          description: Filter by seller wallet address
        - in: query
          name: buyer
          schema:
            type: string
          description: Filter by buyer wallet address
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DataSalesStatus'
          description: Filter by agreement status
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: List of agreements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSalesAgreementListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - DataSales
      summary: Create agreement
      description: |
        Create a new DataSales agreement with S3 bucket and escrow PDA.

        **Called by:** DataSales backend
        **Auth:** Requires `X-DataSales-API-Key` header
      security:
        - DataSalesApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataSalesAgreementRequest'
      responses:
        '201':
          description: Agreement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDataSalesAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or missing API key
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/datasales/agreements/{agreementId}:
    get:
      tags:
        - DataSales
      summary: Get agreement details
      description: Get full details for a specific DataSales agreement
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      responses:
        '200':
          description: Agreement details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSalesAgreementResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/datasales/agreements/{agreementId}/cancel:
    post:
      tags:
        - DataSales
      summary: Cancel agreement
      description: |
        Cancel an agreement (refunds SOL if deposited, deletes S3 bucket).

        **Auth:** Requires `X-DataSales-API-Key` header
      security:
        - DataSalesApiKey: []
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      responses:
        '200':
          description: Agreement cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/upload-urls:
    get:
      tags:
        - DataSales
      summary: Get upload URLs
      description: Get presigned S3 upload URLs for the seller to upload files.
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
        - in: query
          name: files
          required: true
          schema:
            type: string
          description: JSON array of file requests
      responses:
        '200':
          description: Upload URLs generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      uploadUrls:
                        type: array
                        items:
                          $ref: '#/components/schemas/PresignedUrl'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/confirm-upload:
    post:
      tags:
        - DataSales
      summary: Confirm file upload
      description: Confirm seller has finished uploading files.
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  items:
                    type: object
                sellerWallet:
                  type: string
      responses:
        '200':
          description: Upload confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/deposit:
    post:
      tags:
        - DataSales
      summary: Build deposit transaction
      description: Build a SOL deposit transaction for the buyer.
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - buyerWallet
              properties:
                buyerWallet:
                  type: string
      responses:
        '200':
          description: Deposit transaction built
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      transaction:
                        type: object
                        properties:
                          serializedTransaction:
                            type: string
                          escrowPda:
                            type: string
                          vaultPda:
                            type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/confirm-deposit:
    post:
      tags:
        - DataSales
      summary: Confirm SOL deposit
      description: Confirm buyer's SOL deposit transaction.
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - txSignature
              properties:
                txSignature:
                  type: string
                buyerWallet:
                  type: string
      responses:
        '200':
          description: Deposit confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/download-urls:
    get:
      tags:
        - DataSales
      summary: Get download URLs
      description: Get presigned S3 download URLs for the buyer (after settlement).
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
        - in: query
          name: buyerWallet
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download URLs generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      downloadUrls:
                        type: array
                        items:
                          $ref: '#/components/schemas/PresignedUrl'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Access expired or not settled
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/files:
    get:
      tags:
        - DataSales
      summary: Get files for verification
      description: |
        Get file list with read URLs for DataSales verification.

        **Auth:** Requires `X-DataSales-API-Key` header
      security:
        - DataSalesApiKey: []
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      responses:
        '200':
          description: Files with read URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      files:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            s3Key:
                              type: string
                            size:
                              type: integer
                            readUrl:
                              type: string
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Invalid or missing API key
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/approve:
    post:
      tags:
        - DataSales
      summary: Approve data quality
      description: |
        Approve uploaded data quality. Marks agreement as APPROVED.

        **Auth:** Requires `X-DataSales-API-Key` header
      security:
        - DataSalesApiKey: []
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                verifierAddress:
                  type: string
      responses:
        '200':
          description: Agreement approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid status for approval
        '401':
          description: Invalid or missing API key
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/reject:
    post:
      tags:
        - DataSales
      summary: Reject data quality
      description: |
        Reject uploaded data quality. Seller can re-upload within window.

        **Auth:** Requires `X-DataSales-API-Key` header
      security:
        - DataSalesApiKey: []
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Agreement rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid status or missing reason
        '401':
          description: Invalid or missing API key
        '404':
          $ref: '#/components/responses/NotFound'

  /api/datasales/agreements/{agreementId}/settle:
    post:
      tags:
        - DataSales
      summary: Execute settlement
      description: |
        Execute settlement (SOL to seller, access to buyer).

        **Auth:** Requires `X-DataSales-API-Key` header
      security:
        - DataSalesApiKey: []
      parameters:
        - $ref: '#/components/parameters/DataSalesAgreementId'
      responses:
        '200':
          description: Settlement executed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      settleTxSignature:
                        type: string
                      accessExpiresAt:
                        type: string
                        format: date-time
                      downloadUrls:
                        type: array
                        items:
                          $ref: '#/components/schemas/PresignedUrl'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid status for settlement
        '401':
          description: Invalid or missing API key
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    OfferId:
      in: path
      name: offerId
      required: true
      schema:
        type: string
      description: Agreement ID

    DataSalesAgreementId:
      in: path
      name: agreementId
      required: true
      schema:
        type: string
        format: uuid
      description: DataSales agreement ID (UUID)
      
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 255
      description: Idempotency key to prevent duplicate requests (required for agreement creation)
      
    TransactionQueryParams:
      in: query
      name: query
      schema:
        type: object
        properties:
          agreementId:
            type: string
            description: Filter by agreement ID
          operationType:
            type: string
            enum: [INIT_ESCROW, DEPOSIT_SOL, DEPOSIT_NFT_A, DEPOSIT_NFT_B, SETTLE, CANCEL, REFUND]
            description: Filter by operation type
          status:
            type: string
            enum: [PENDING, CONFIRMED, FAILED, FINALIZED]
            description: Filter by status
          txId:
            type: string
            description: Filter by transaction ID (partial match)
          dateFrom:
            type: string
            format: date-time
            description: Filter by date range start (ISO 8601)
          dateTo:
            type: string
            format: date-time
            description: Filter by date range end (ISO 8601)
          limit:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            description: Number of results
          offset:
            type: integer
            minimum: 0
            default: 0
            description: Pagination offset
          sortBy:
            type: string
            enum: [timestamp, blockHeight]
            default: timestamp
            description: Sort field
          sortOrder:
            type: string
            enum: [asc, desc]
            default: desc
            description: Sort order

  schemas:
    # Asset schemas
    SupportedAsset:
      type: object
      description: A supported asset type for atomic swaps
      properties:
        id:
          type: string
          description: Unique identifier for the asset type
          example: spl-nft
        name:
          type: string
          description: Display name of the asset type
          example: SPL NFT
        description:
          type: string
          description: Detailed description of the asset type
          example: Solana SPL Token NFT (Metaplex standard)
        chain:
          type: string
          description: Name of the blockchain
          example: Solana
        chainId:
          type: string
          description: Unique identifier for the blockchain
          example: solana
        status:
          type: string
          enum:
            - active
            - coming_soon
            - deprecated
          description: Current support status
          example: active
        type:
          type: string
          enum:
            - nft
            - token
          description: Asset category
          example: nft
        standard:
          type: string
          description: Technical standard (for NFTs)
          example: Metaplex Token Metadata
      required:
        - id
        - name
        - description
        - chain
        - chainId
        - status
        - type

    SupportedChain:
      type: object
      description: A supported blockchain
      properties:
        id:
          type: string
          description: Unique identifier for the chain
          example: solana
        name:
          type: string
          description: Display name of the chain
          example: Solana
        status:
          type: string
          enum:
            - active
            - coming_soon
            - deprecated
          description: Current support status
          example: active
      required:
        - id
        - name
        - status

    AssetsListResponse:
      type: object
      description: Response containing all supported assets and chains
      properties:
        success:
          type: boolean
          example: true
        timestamp:
          type: string
          format: date-time
          example: '2024-12-19T10:00:00.000Z'
        data:
          type: object
          properties:
            assets:
              type: array
              items:
                $ref: '#/components/schemas/SupportedAsset'
            chains:
              type: array
              items:
                $ref: '#/components/schemas/SupportedChain'
            summary:
              type: object
              properties:
                totalAssets:
                  type: integer
                  description: Total number of asset types
                  example: 4
                activeAssets:
                  type: integer
                  description: Number of active asset types
                  example: 4
                supportedChains:
                  type: integer
                  description: Number of supported blockchains
                  example: 1

    AssetDetailResponse:
      type: object
      description: Response containing details for a single asset
      properties:
        success:
          type: boolean
          example: true
        timestamp:
          type: string
          format: date-time
          example: '2024-12-19T10:00:00.000Z'
        data:
          $ref: '#/components/schemas/SupportedAsset'

    QuoteRequest:
      type: object
      properties:
        makerAssets:
          type: array
          description: NFTs offered by the maker
          items:
            $ref: '#/components/schemas/QuoteAsset'
        takerAssets:
          type: array
          description: NFTs offered by the taker (requested by maker)
          items:
            $ref: '#/components/schemas/QuoteAsset'
        makerSolLamports:
          type: integer
          description: SOL amount offered by maker (in lamports)
          default: 0
          example: 0
        takerSolLamports:
          type: integer
          description: SOL amount offered by taker (in lamports)
          default: 0
          example: 100000000
        apiKey:
          type: string
          description: Optional API key for zero-fee swaps
          example: "your-api-key-here"

    QuoteAsset:
      type: object
      required:
        - mint
      properties:
        mint:
          type: string
          description: NFT mint address
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        isCompressed:
          type: boolean
          description: Whether the NFT is a compressed NFT (cNFT)
          default: false
        isCoreNft:
          type: boolean
          description: Whether the NFT is a Metaplex Core NFT
          default: false
        name:
          type: string
          description: NFT name (optional, for display)
          example: "Cool NFT #123"
        image:
          type: string
          description: NFT image URL (optional)
        symbol:
          type: string
          description: NFT symbol (optional)
        proofNodes:
          type: integer
          description: |
            Number of Merkle proof nodes for cNFT (optional).
            If not provided, worst-case estimate (14 nodes) is used.
          example: 3

    QuoteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/QuoteData'
        timestamp:
          type: string
          format: date-time

    QuoteData:
      type: object
      properties:
        solPriceUSD:
          type: number
          description: Current SOL price in USD (from CoinGecko, cached 1 minute)
          example: 138.30
        maker:
          $ref: '#/components/schemas/QuoteSide'
        taker:
          $ref: '#/components/schemas/QuoteSide'
        estimatedTime:
          type: object
          properties:
            seconds:
              type: integer
              description: Estimated swap time in seconds
              example: 5
            display:
              type: string
              description: Human-readable time estimate
              example: "~5 seconds"
        networkFee:
          $ref: '#/components/schemas/QuoteFee'
        platformFee:
          type: object
          allOf:
            - $ref: '#/components/schemas/QuoteFee'
            - type: object
              properties:
                type:
                  type: string
                  enum: [percentage, flat, zero]
                  description: |
                    Fee type:
                    - percentage: 1% of SOL amount (for swaps involving SOL)
                    - flat: 0.005 SOL (for NFT-only swaps)
                    - zero: No fee (for API key users)
                  example: "percentage"
                rate:
                  type: number
                  description: Fee rate (0.01 for 1%, 0.005 for flat fee, 0 for zero)
                  example: 0.01
                label:
                  type: string
                  description: Display label for the fee
                  example: "Platform Fee (1%):"
        transactionSize:
          $ref: '#/components/schemas/QuoteTransactionSize'
        warnings:
          type: array
