  # ── Institution Escrow ─────────────────────────────────────────────────

  /api/v1/institution-escrow:
    post:
      tags:
        - Institution Escrow
      summary: Create escrow
      description: |
        Create a new USDC escrow between a payer and recipient wallet.

        The escrow is created in `CREATED` status. The payer must then send USDC to the
        escrow address and call the deposit endpoint with the transaction signature.

        **Compliance checks** are performed automatically based on the corridor configuration,
        allowlist status, and daily/monthly limits.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstitutionEscrowCreateRequest'
            example:
              payerWallet: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
              recipientWallet: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"
              amount: 50000
              corridor: "SG-CH"
              conditionType: "ADMIN_RELEASE"
              expiryHours: 72
              settlementAuthority: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
      responses:
        '201':
          description: Escrow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Compliance check failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    get:
      tags:
        - Institution Escrow
      summary: List escrows
      description: List escrows for the authenticated client with optional filters and pagination.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [CREATED, FUNDED, COMPLIANCE_HOLD, RELEASING, RELEASED, CANCELLING, CANCELLED, EXPIRED, FAILED]
          description: Filter by escrow status
        - in: query
          name: corridor
          schema:
            type: string
            pattern: '^[A-Z]{2}-[A-Z]{2}$'
          description: Filter by corridor (e.g., SG-CH)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Escrows listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      escrows:
                        type: array
                        items:
                          $ref: '#/components/schemas/InstitutionEscrowDetail'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/institution-escrow/{id}:
    get:
      tags:
        - Institution Escrow
      summary: Get escrow details
      description: Retrieve full details for a specific escrow.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID
      responses:
        '200':
          description: Escrow details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied - escrow belongs to another client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/institution-escrow/{id}/deposit:
    post:
      tags:
        - Institution Escrow
      summary: Record deposit
      description: |
        Record an on-chain USDC deposit for an escrow. The payer sends USDC to the escrow
        address independently, then calls this endpoint with the transaction signature.

        The API verifies the transaction on-chain and updates the escrow status to `FUNDED`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - txSignature
              properties:
                txSignature:
                  type: string
                  description: Solana transaction signature (base58)
                  example: "5KqZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
      responses:
        '200':
          description: Deposit recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Escrow has expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/institution-escrow/{id}/release:
    post:
      tags:
        - Institution Escrow
      summary: Release funds
      description: |
        Release escrowed USDC to the recipient wallet. This endpoint requires **both**
        a valid JWT token and a settlement authority API key (`X-Settlement-Authority-Key` header).

        **Rate Limited**: 10 requests per minute.
      security:
        - BearerAuth: []
        - SettlementAuthority: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  maxLength: 500
                  description: Optional release notes
            example:
              notes: "Invoice verified, releasing payment"
      responses:
        '200':
          description: Funds released
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing or invalid settlement authority key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/institution-escrow/{id}/cancel:
    post:
      tags:
        - Institution Escrow
      summary: Cancel escrow
      description: |
        Cancel an escrow and initiate a refund of any deposited USDC back to the payer wallet.
        Only escrows in `CREATED` or `FUNDED` status can be cancelled.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Escrow ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Optional cancellation reason
            example:
              reason: "Trade terms changed"
      responses:
        '200':
          description: Escrow cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InstitutionEscrowDetail'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

