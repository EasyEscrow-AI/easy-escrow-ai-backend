  /api/v1/institution-escrow/{id}/deposit-tx:
    get:
      tags: [Institution Escrow]
      summary: Get deposit transaction
      description: Returns the unsigned Solana transaction for funding an escrow. The client signs and submits this transaction, then calls `POST /deposit` with the signature.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Escrow ID
      responses:
        '200':
          description: Deposit transaction built
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { type: object }
                  timestamp: { type: string, format: date-time }
        '404':
          description: Escrow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/institution-escrow/{escrowId}/privacy-analysis:
    get:
      tags: [Institution Escrow]
      summary: Privacy analysis
      description: |
        Perform real-time on-chain privacy verification for an escrow transaction.
        Returns a structured report with 5 independent checks: stealth address derivation,
        PDA receipt verification, encrypted chain-of-custody, compliance audit trail,
        and transaction pool shielding. Results are cached for 60 seconds.
      security:
        - BearerAuth: []
      parameters:
        - name: escrowId
          in: path
          required: true
          schema:
            type: string
          description: Escrow ID (UUID) or escrow code (EE-XXX-XXX)
      responses:
        '200':
          description: Privacy analysis report
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: '#/components/schemas/PrivacyAnalysisResult'
                  timestamp: { type: string, format: date-time }
        '403':
          description: Access denied
        '404':
          description: Escrow not found

