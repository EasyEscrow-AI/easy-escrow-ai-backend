        byStatus:
          type: object
          additionalProperties:
            type: integer
        firstTransaction:
          type: string
          format: date-time
        lastTransaction:
          type: string
          format: date-time

    AgreementTransactionsResponse:
      type: object
      properties:
        agreementId:
          type: string
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
        stats:
          type: object
          properties:
            totalTransactions:
              type: integer
            byOperationType:
              type: object
              additionalProperties:
                type: integer
            byStatus:
              type: object
              additionalProperties:
                type: integer
            firstTransaction:
              type: string
              format: date-time
            lastTransaction:
              type: string
              format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [ESCROW_FUNDED, ESCROW_ASSET_LOCKED, ESCROW_SETTLED, ESCROW_EXPIRED, ESCROW_REFUNDED]
        targetUrl:
          type: string
        status:
          type: string
          enum: [PENDING, DELIVERED, FAILED]
        attempts:
          type: integer
        maxAttempts:
          type: integer
        lastAttemptAt:
          type: string
          format: date-time
        lastResponseCode:
          type: integer
        deliveredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        scheduledFor:
          type: string
          format: date-time

    WebhookListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        agreementId:
          type: string
        count:
          type: integer
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'

    WebhookStatusResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        webhook:
          allOf:
            - $ref: '#/components/schemas/Webhook'
            - type: object
              properties:
                agreementId:
                  type: string
                lastResponseBody:
                  type: string
                payload:
                  type: object

    # ==========================================================================
    # LISTINGS SCHEMAS
    # ==========================================================================

    Listing:
      type: object
      properties:
        id:
          type: string
          description: Internal database ID
        listingId:
          type: string
          description: Public listing identifier
        seller:
          type: string
          description: Seller's wallet address
        assetId:
          type: string
          description: cNFT asset ID
        priceLamports:
          type: string
          description: Price in lamports
        status:
          type: string
          enum: [PENDING, ACTIVE, SOLD, CANCELLED, EXPIRED]
        delegationStatus:
          type: string
          enum: [PENDING, DELEGATED, REVOKED]
        delegatePda:
          type: string
          description: PDA with delegation authority
        delegateTxId:
          type: string
          description: Delegation transaction signature
        revokeTxId:
          type: string
          description: Revocation transaction signature
        buyer:
          type: string
          nullable: true
          description: Buyer's wallet address (if sold)
        settleTxId:
          type: string
          nullable: true
          description: Settlement transaction signature
        delegatedAt:
          type: string
          format: date-time
          nullable: true
        soldAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        metadata:
          type: object
          description: cNFT metadata (name, image, etc.)

    ListingSummary:
      type: object
      properties:
        id:
          type: string
        listingId:
          type: string
        seller:
          type: string
        assetId:
          type: string
        priceLamports:
          type: string
        status:
          type: string
          enum: [PENDING, ACTIVE, SOLD, CANCELLED, EXPIRED]
        delegationStatus:
          type: string
          enum: [PENDING, DELEGATED, REVOKED]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    # ==========================================================================
    # cNFT OFFER SCHEMAS
    # ==========================================================================

    CnftOffer:
      type: object
      properties:
        id:
          type: string
