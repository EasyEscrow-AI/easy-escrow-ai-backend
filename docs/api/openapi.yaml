                  description: Lock transaction signature
      responses:
        '200':
          description: Lock confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      offer:
                        $ref: '#/components/schemas/TwoPhaseSwap'
                      fullyLocked:
                        type: boolean
