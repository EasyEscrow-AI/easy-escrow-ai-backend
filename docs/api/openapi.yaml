              type: boolean
            status:
              type: string
              enum: [running, stopped]
            expirationHours:
              type: integer
            cleanupIntervalMinutes:
              type: integer

    CreateAgreementRequest:
      type: object
      required:
        - nftMint
        - seller
        - expiry
        - feeBps
        - honorRoyalties
        - swapType
      properties:
        nftMint:
          type: string
          description: |
            The seller's NFT mint address (NFT A - unique identifier).
            
            Important: This is NOT "minting" (creating) an NFT.
            The NFT must ALREADY EXIST in the seller's wallet.
            Provide the mint address of the specific NFT to be traded in this escrow agreement.
            
            In Solana, a "mint" is the account that defines a token type. For NFTs,
            the mint address serves as the unique identifier (like a serial number or contract address).
            
            **Supported:** Traditional NFTs (Metaplex standard)
            **Coming soon:** Compressed NFTs (cNFTs)
          example: "7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        nftBMint:
          type: string
          description: |
            The buyer's NFT mint address (NFT B - unique identifier).
            Required for NFT_FOR_NFT_WITH_FEE and NFT_FOR_NFT_PLUS_SOL swap types.
            
            The NFT must ALREADY EXIST in the buyer's wallet.
            
            **Supported:** Traditional NFTs (Metaplex standard)
            **Coming soon:** Compressed NFTs (cNFTs)
          example: "8xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU"
        swapType:
          type: string
          enum: ['NFT_FOR_SOL', 'NFT_FOR_NFT_WITH_FEE', 'NFT_FOR_NFT_PLUS_SOL']
          default: 'NFT_FOR_SOL'
          description: |
            Type of swap to execute:
            - **NFT_FOR_SOL**: Direct exchange of NFT for SOL (1% platform fee, blockchain fees covered)
            - **NFT_FOR_NFT_WITH_FEE**: Exchange two NFTs (0.005 SOL fee split 50/50, blockchain fees covered)
            - **NFT_FOR_NFT_PLUS_SOL**: Exchange NFT + SOL for another NFT (1% platform fee, blockchain fees covered)
            
            **Limits for all types:** Min 0.1 SOL, Max 15 SOL (up to $5,000 AUD)
          example: "NFT_FOR_SOL"
        solAmount:
          type: string
          description: |
            Amount of SOL in lamports (as string to preserve precision).
            Required for NFT_FOR_SOL and NFT_FOR_NFT_PLUS_SOL swap types.
            1 SOL = 1,000,000,000 lamports.
            
            For NFT_FOR_NFT_WITH_FEE, this represents the platform fee (0.005 SOL = 5,000,000 lamports).
            
            **Limits:** Min 100,000,000 lamports (0.1 SOL), Max 15,000,000,000 lamports (15 SOL)
          example: "1000000000"
        seller:
          type: string
          description: Seller wallet public key
          example: "4qxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        buyer:
          type: string
          description: Buyer wallet public key (optional, can be set later)
          example: "5rxZ9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9Z9"
        expiry:
          oneOf:
            - type: string
              format: date-time
            - type: number
            - type: string
              enum: ["5m", "1h", "6h", "12h", "24h"]
          description: |
            Agreement expiry time. Supports multiple formats for flexibility:
            
            **Format Options:**
            - **ISO 8601 timestamp** (absolute time): "2025-11-04T12:00:00Z"
            - **Duration in hours** (number 0.0833-24, where 0.0833 = 5 minutes): 12
            - **Preset string**: "5m", "1h", "6h", "12h", "24h"
            - **Optional**: If not provided, defaults to 5 minutes from creation
            
            **Constraints:**
            - Minimum duration: 5 minutes from creation
            - Maximum duration: 24 hours from creation
            - Default: 5 minutes (when not specified)
            - Expiry must be in the future
            
            **Examples:**
            - Absolute: "2025-11-04T12:00:00Z" (expires at specific time)
            - Duration: 12 (expires 12 hours from now)
            - Preset: "5m" (expires 5 minutes from now - default)
            - Preset: "6h" (expires 6 hours from now)
            - Omitted: Uses default of 5 minutes from now
            
            **Note:** A 60-second buffer is added on-chain to prevent clock skew issues.
          example: "5m"
        expiryDurationHours:
          type: number
          minimum: 0.0833
          maximum: 24
          description: |
            Optional: Explicit duration in hours (alternative to expiry field).
            Minimum is 0.0833 hours (5 minutes). Default is 0.0833 hours (5 minutes) if not provided.
            If both expiry and expiryDurationHours are provided, expiry takes precedence.
          example: 6
        feeBps:
          type: integer
          description: |
            Platform fee in basis points (100 = 1%).
            - For NFT_FOR_SOL: 1% (100 bps) of SOL amount
            - For NFT_FOR_NFT_WITH_FEE: Fixed 0.005 SOL total (split 50/50)
            - For NFT_FOR_NFT_PLUS_SOL: 1% (100 bps) of SOL amount
          minimum: 0
          maximum: 10000
          example: 100
        honorRoyalties:
          type: boolean
          description: Whether to honor NFT creator royalties
          example: true

