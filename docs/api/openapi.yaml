      summary: Sitewide search
      description: |
        Search across escrows, clients, accounts, and notifications in a single query.
        Results are scoped to the authenticated client's data and returned as a flat array with a `category` field on each item. Category counts are provided separately.

        **Smart query detection:**
        - `EE-XXX-XXX` → searches escrow codes
        - Solana wallet address → searches wallet fields
        - Numeric value → searches escrow amounts
        - Status name (e.g., `funded`) → filters by escrow status
        - General text → searches names, messages, corridors
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 200
          description: Search query (min 2 characters)
          example: "EE-ABC-123"
        - in: query
          name: categories
          schema:
            type: string
          description: Comma-separated category filter (escrow, client, account, notification)
          example: "escrow,client"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 10
          description: Max results per category
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      query:
                        type: string
                        example: "EE-ABC-123"
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            category:
                              type: string
                              enum: [escrow, client, account, notification]
                            id:
                              type: string
                            title:
                              type: string
                            subtitle:
                              type: string
                            status:
                              type: string
                            metadata:
                              type: object
                      counts:
                        type: object
                        properties:
                          escrows:
                            type: integer
                          clients:
                            type: integer
                          accounts:
                            type: integer
                          notifications:
                            type: integer
                          total:
                            type: integer
