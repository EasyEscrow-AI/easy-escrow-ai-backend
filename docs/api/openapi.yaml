            payerWallet:
              type: string
              nullable: true
            recipientWallet:
              type: string
              nullable: true
        defaultTimelockHours:
          type: integer
          nullable: true
          minimum: 0
          maximum: 2160
          description: |
            Default payment timelock in hours for new escrows created by this client.
            0 or null = disabled (falls back to global config). Values are in hours.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InstitutionSettingsUpdate:
      type: object
      properties:
        companyName:
          type: string
          description: Updated company name
        webhookUrl:
          type: string
          description: Webhook URL for escrow status notifications
        defaultTimelockHours:
          type: integer
          minimum: 0
          maximum: 2160
          description: |
            Default payment timelock in hours for new escrows. 0 = disabled (falls back to global config).
            Per-escrow `timelockHours` takes precedence over this client-level default.

    InstitutionWalletsUpdate:
      type: object
      properties:
        payerWallet:
          type: string
          description: Solana wallet address for sending payments
          example: "498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R"
        recipientWallet:
          type: string
          description: Solana wallet address for receiving payments
          example: "8LL197pziojWHtS3zeyJonrh1swKvMZpumfesVmDgUcZ"

    InstitutionApiKeyCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Human-readable name for the API key
          example: "Production API Key"
        permissions:
          type: array
          items:
            type: string
          description: List of permissions granted to this key
          example: ["escrow:create", "escrow:read"]

    InstitutionApiKeyFull:
      type: object
      description: API key object returned on creation (includes the full key)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        key:
          type: string
          description: The full API key (only shown once at creation time)
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    InstitutionApiKeySummary:
      type: object
      description: API key summary (key is masked)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
          description: First characters of the key for identification
          example: "iek_a1b2..."
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true

    # ── Institution Files Schemas ───────────────────────────────────────

    InstitutionFile:
