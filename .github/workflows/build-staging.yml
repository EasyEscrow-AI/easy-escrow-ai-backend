name: Build for STAGING

on:
  push:
    branches: [staging]
    tags: ['staging-*']

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Node dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Run linting
        run: npm run lint
      
      - name: Pin Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      
      - name: Verify Solana installation
        run: solana --version
      
      - name: Pin Rust toolchain
        run: rustup show  # Reads rust-toolchain.toml
      
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.30.1
          avm use 0.30.1
      
      - name: Build Anchor program
        run: anchor build
      
      - name: Generate checksums
        run: |
          shasum -a 256 target/deploy/escrow.so > target/deploy/escrow.so.sha256
          shasum -a 256 target/idl/escrow.json > target/idl/escrow.json.sha256
          echo "Program checksums generated"
          cat target/deploy/escrow.so.sha256
          cat target/idl/escrow.json.sha256
      
      - name: Run TypeScript tests
        run: npm test -- --passWithNoTests
      
      - name: Upload program artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-artifacts
          path: |
            target/deploy/escrow.so
            target/deploy/escrow.so.sha256
            target/idl/escrow.json
            target/idl/escrow.json.sha256
          retention-days: 30
      
      - name: Upload TypeScript build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          path: |
            dist/
            package.json
            package-lock.json
            prisma/
          retention-days: 30
      
      - name: Build summary
        run: |
          echo "### Build Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Program Checksums" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat target/deploy/escrow.so.sha256 >> $GITHUB_STEP_SUMMARY
          cat target/idl/escrow.json.sha256 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

