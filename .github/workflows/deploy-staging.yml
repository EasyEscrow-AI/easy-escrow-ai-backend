name: Deploy to STAGING

on:
  workflow_run:
    workflows: ["Build for STAGING"]
    types: [completed]
  workflow_dispatch:  # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: staging  # Requires manual approval in GitHub settings
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download program artifacts
        uses: actions/download-artifact@v4
        with:
          name: program-artifacts
          path: target/deploy
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      
      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-artifacts
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      
      - name: Setup Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      
      - name: Verify Solana installation
        run: solana --version
      
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.30.1
          avm use 0.30.1
      
      - name: Configure staging deployer keypair
        env:
          STAGING_DEPLOYER_KEY: ${{ secrets.STAGING_DEPLOYER_KEYPAIR }}
        run: |
          echo "$STAGING_DEPLOYER_KEY" > /tmp/staging-deployer.json
          chmod 600 /tmp/staging-deployer.json
          solana-keygen pubkey /tmp/staging-deployer.json
      
      - name: Verify program checksum
        run: |
          echo "Verifying program artifact integrity..."
          shasum -c target/deploy/escrow.so.sha256
          shasum -c target/idl/escrow.json.sha256
          echo "✓ Checksums verified"
      
      - name: Deploy program to STAGING (devnet)
        env:
          STAGING_RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          STAGING_PROGRAM_ID: ${{ secrets.STAGING_PROGRAM_ID }}
        run: |
          echo "Deploying to STAGING environment (devnet)"
          anchor deploy \
            --program-name escrow \
            --program-keypair target/deploy/escrow-keypair.json \
            --provider.cluster devnet \
            --provider.wallet /tmp/staging-deployer.json
          
          echo "Program deployed to: $STAGING_PROGRAM_ID"
      
      - name: Update IDL
        env:
          STAGING_RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          STAGING_PROGRAM_ID: ${{ secrets.STAGING_PROGRAM_ID }}
        run: |
          echo "Updating IDL for program $STAGING_PROGRAM_ID"
          anchor idl upgrade $STAGING_PROGRAM_ID \
            target/idl/escrow.json \
            --provider.cluster devnet \
            --provider.wallet /tmp/staging-deployer.json
          
          echo "✓ IDL updated successfully"
      
      - name: Setup Node.js for backend deployment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      
      - name: Get current app info
        env:
          STAGING_APP_ID: ${{ secrets.STAGING_APP_ID }}
        run: |
          echo "Current STAGING app status:"
          doctl apps list | grep staging || echo "App not found in list"
          doctl apps get $STAGING_APP_ID --format ID,DefaultIngress,ActiveDeployment.Phase
      
      - name: Deploy backend to DigitalOcean App Platform
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          STAGING_APP_ID: ${{ secrets.STAGING_APP_ID }}
        run: |
          echo "Triggering STAGING backend deployment..."
          doctl apps create-deployment $STAGING_APP_ID \
            --wait \
            --timeout 10m
          
          echo "✓ Backend deployment initiated"
      
      - name: Wait for deployment to stabilize
        run: |
          echo "Waiting 30 seconds for services to stabilize..."
          sleep 30
      
      - name: Setup Node.js for smoke tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies for smoke tests
        run: npm ci
      
      - name: Run smoke tests
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          STAGING_RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          STAGING_PROGRAM_ID: ${{ secrets.STAGING_PROGRAM_ID }}
        run: |
          echo "Running smoke tests against STAGING environment..."
          npm run test:staging:smoke
      
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f /tmp/staging-deployer.json
      
      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** STAGING (devnet)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Services Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Solana Program (devnet)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Backend API (DigitalOcean)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Smoke tests passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**STAGING URL:** ${{ secrets.STAGING_API_URL }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: ':rocket: STAGING Deployment Successful',
              attachments: [{
                color: 'good',
                text: `Branch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nDeployed by: ${{ github.actor }}\nEnvironment: STAGING (devnet)\nURL: ${{ secrets.STAGING_API_URL }}`
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
      
      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: ':x: STAGING Deployment Failed',
              attachments: [{
                color: 'danger',
                text: `Branch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nDeployed by: ${{ github.actor }}\nEnvironment: STAGING (devnet)\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

