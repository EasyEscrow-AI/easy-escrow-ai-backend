name: Deploy to STAGING

on:
  workflow_run:
    workflows: ["Build for STAGING"]
    types: [completed]
  workflow_dispatch:  # Allow manual deployments

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: staging  # Requires manual approval in GitHub
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download program artifacts (from build workflow)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v3
        with:
          name: program-artifacts
          path: target/deploy
      
      - name: Setup Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.x/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install latest
          avm use latest
      
      - name: Build program (manual deployment only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Building program for manual deployment..."
          anchor build
          
          # Generate checksums (relative paths)
          cd target/deploy && shasum -a 256 escrow.so > escrow.so.sha256
          cd ../../target/idl && shasum -a 256 escrow.json > escrow.json.sha256
          
          # Build TypeScript backend
          npm run build
      
      - name: Configure staging deployer
        env:
          STAGING_DEPLOYER_KEY: ${{ secrets.STAGING_DEPLOYER_KEYPAIR }}
        run: |
          echo "$STAGING_DEPLOYER_KEY" > /tmp/staging-deployer.json
          chmod 600 /tmp/staging-deployer.json
      
      - name: Verify program checksum (from artifacts)
        if: github.event_name == 'workflow_run'
        run: |
          echo "Verifying program binary checksum..."
          cd target/deploy && shasum -c escrow.so.sha256
          echo "Verifying IDL checksum..."
          cd target/deploy && shasum -c escrow.json.sha256
      
      - name: Deploy Solana program to STAGING
        env:
          STAGING_RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          STAGING_PROGRAM_ID: ${{ secrets.STAGING_PROGRAM_ID }}
        run: |
          anchor deploy \
            -C Anchor.staging.toml \
            --provider.cluster devnet \
            --provider.wallet /tmp/staging-deployer.json
      
      - name: Update IDL
        env:
          STAGING_PROGRAM_ID: ${{ secrets.STAGING_PROGRAM_ID }}
        run: |
          anchor idl upgrade $STAGING_PROGRAM_ID \
            target/idl/escrow.json \
            -C Anchor.staging.toml \
            --provider.cluster devnet \
            --provider.wallet /tmp/staging-deployer.json
      
      - name: Run database migrations
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npm run staging:migrate:ci
      
      - name: Deploy backend to DigitalOcean App Platform
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          STAGING_APP_ID: ${{ secrets.STAGING_APP_ID }}
        run: |
          # Install doctl
          cd ~
          wget https://github.com/digitalocean/doctl/releases/download/v1.104.0/doctl-1.104.0-linux-amd64.tar.gz
          tar xf doctl-1.104.0-linux-amd64.tar.gz
          sudo mv doctl /usr/local/bin
          
          # Authenticate and deploy
          doctl auth init --access-token $DIGITALOCEAN_ACCESS_TOKEN
          doctl apps create-deployment $STAGING_APP_ID \
            --wait \
            --timeout 10m
      
      - name: Wait for deployment to stabilize
        run: sleep 30
      
      - name: Run smoke tests
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          STAGING_RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          STAGING_PROGRAM_ID: ${{ secrets.STAGING_PROGRAM_ID }}
        run: npm run test:staging:smoke:ci
      
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f /tmp/staging-deployer.json
      
      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            ✅ STAGING deployment completed successfully!
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
      
      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ STAGING deployment failed!
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

