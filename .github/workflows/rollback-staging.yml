name: Rollback STAGING

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git commit SHA or tag to rollback to (e.g., previous release tag or commit)'
        required: true
        type: string
      deployment_id:
        description: 'DigitalOcean Deployment ID for reference (optional)'
        required: false
        type: string
      reason:
        description: 'Reason for rollback'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: staging  # Requires manual approval
    
    steps:
      - name: Checkout code at specific commit/tag
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.git_ref }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install doctl
        run: |
          cd ~
          wget https://github.com/digitalocean/doctl/releases/download/v1.104.0/doctl-1.104.0-linux-amd64.tar.gz
          tar xf doctl-1.104.0-linux-amd64.tar.gz
          sudo mv doctl /usr/local/bin
      
      - name: Authenticate with DigitalOcean
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: doctl auth init --access-token $DIGITALOCEAN_ACCESS_TOKEN
      
      - name: Verify rollback target
        run: |
          echo "Rolling back to: ${{ github.event.inputs.git_ref }}"
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Commit message: $(git log -1 --pretty=%B)"
          if [ -n "${{ github.event.inputs.deployment_id }}" ]; then
            echo "Reference deployment ID: ${{ github.event.inputs.deployment_id }}"
          fi
      
      - name: Build at rollback point
        run: |
          npm ci
          npm run build
      
      - name: Rollback deployment via DigitalOcean App Platform
        env:
          STAGING_APP_ID: ${{ secrets.STAGING_APP_ID }}
        run: |
          echo "Triggering deployment from git ref: ${{ github.event.inputs.git_ref }}"
          doctl apps create-deployment $STAGING_APP_ID \
            --wait \
            --timeout 10m
      
      - name: Wait for rollback to stabilize
        run: sleep 30
      
      - name: Run smoke tests after rollback
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          STAGING_RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          STAGING_PROGRAM_ID: ${{ secrets.STAGING_PROGRAM_ID }}
        run: |
          npm ci
          npm run test:staging:smoke:ci
      
      - name: Create rollback audit log
        run: |
          echo "Rollback executed at $(date)" >> rollback-audit.log
          echo "Git ref: ${{ github.event.inputs.git_ref }}" >> rollback-audit.log
          echo "Commit SHA: $(git rev-parse HEAD)" >> rollback-audit.log
          if [ -n "${{ github.event.inputs.deployment_id }}" ]; then
            echo "Reference Deployment ID: ${{ github.event.inputs.deployment_id }}" >> rollback-audit.log
          fi
          echo "Reason: ${{ github.event.inputs.reason }}" >> rollback-audit.log
          echo "Executed by: ${{ github.actor }}" >> rollback-audit.log
          cat rollback-audit.log
      
      - name: Notify rollback success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            🔄 STAGING rollback completed successfully!
            Git ref: ${{ github.event.inputs.git_ref }}
            Reason: ${{ github.event.inputs.reason }}
            Executed by: ${{ github.actor }}
        continue-on-error: true
      
      - name: Notify rollback failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ STAGING rollback failed!
            Git ref: ${{ github.event.inputs.git_ref }}
            Reason: ${{ github.event.inputs.reason }}
            Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
      
      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-audit-log
          path: rollback-audit.log

