name: Rollback STAGING

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'DigitalOcean App Platform Deployment ID to rollback to'
        required: true
        type: string
      reason:
        description: 'Reason for rollback'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: staging  # Requires manual approval
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      
      - name: Verify deployment exists
        env:
          STAGING_APP_ID: ${{ secrets.STAGING_APP_ID }}
        run: |
          echo "Verifying deployment ${{ github.event.inputs.deployment_id }} exists..."
          
          doctl apps get-deployment $STAGING_APP_ID ${{ github.event.inputs.deployment_id }} \
            --format ID,Phase,Progress.Steps
          
          echo "✓ Deployment verified"
      
      - name: Get current deployment info
        env:
          STAGING_APP_ID: ${{ secrets.STAGING_APP_ID }}
        run: |
          echo "Current STAGING deployment:"
          doctl apps get $STAGING_APP_ID --format ActiveDeployment.ID,ActiveDeployment.Phase
      
      - name: Rollback to previous deployment
        env:
          STAGING_APP_ID: ${{ secrets.STAGING_APP_ID }}
        run: |
          echo "Rolling back STAGING to deployment ${{ github.event.inputs.deployment_id }}..."
          echo "Reason: ${{ github.event.inputs.reason }}"
          
          # Note: DigitalOcean doesn't have a direct rollback command
          # We need to redeploy using the spec from the target deployment
          
          # Get the deployment's spec
          doctl apps get-deployment $STAGING_APP_ID ${{ github.event.inputs.deployment_id }} \
            --format Spec > /tmp/rollback-spec.yaml
          
          # Create a new deployment with the previous spec
          doctl apps update $STAGING_APP_ID --spec /tmp/rollback-spec.yaml
          
          echo "✓ Rollback deployment initiated"
      
      - name: Wait for rollback to complete
        env:
          STAGING_APP_ID: ${{ secrets.STAGING_APP_ID }}
        run: |
          echo "Waiting for rollback to complete (timeout: 10 minutes)..."
          
          # Poll for deployment completion
          timeout=600  # 10 minutes
          elapsed=0
          interval=15
          
          while [ $elapsed -lt $timeout ]; do
            phase=$(doctl apps get $STAGING_APP_ID --format ActiveDeployment.Phase --no-header)
            
            echo "Current phase: $phase (${elapsed}s elapsed)"
            
            if [ "$phase" = "ACTIVE" ]; then
              echo "✓ Rollback completed successfully"
              exit 0
            elif [ "$phase" = "ERROR" ] || [ "$phase" = "FAILED" ]; then
              echo "✗ Rollback failed with phase: $phase"
              exit 1
            fi
            
            sleep $interval
            elapsed=$((elapsed + interval))
          done
          
          echo "✗ Rollback timed out after ${timeout}s"
          exit 1
      
      - name: Verify rollback health
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          echo "Verifying STAGING health after rollback..."
          
          # Wait a bit for services to stabilize
          sleep 15
          
          # Check health endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" $STAGING_API_URL/health)
          
          if [ "$response" = "200" ]; then
            echo "✓ Health check passed (HTTP $response)"
          else
            echo "✗ Health check failed (HTTP $response)"
            exit 1
          fi
      
      - name: Setup Node.js for smoke tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run smoke tests
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          STAGING_RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          STAGING_PROGRAM_ID: ${{ secrets.STAGING_PROGRAM_ID }}
        run: |
          echo "Running smoke tests after rollback..."
          npm run test:staging:smoke
      
      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/rollback-spec.yaml
      
      - name: Rollback summary
        if: success()
        run: |
          echo "### Rollback Summary :leftwards_arrow_with_hook:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** STAGING" >> $GITHUB_STEP_SUMMARY
          echo "**Rolled back to:** ${{ github.event.inputs.deployment_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "**Performed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Verification" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Deployment completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Health check passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Smoke tests passed" >> $GITHUB_STEP_SUMMARY
      
      - name: Notify rollback success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: ':leftwards_arrow_with_hook: STAGING Rollback Successful',
              attachments: [{
                color: 'warning',
                text: `Deployment ID: ${{ github.event.inputs.deployment_id }}\nReason: ${{ github.event.inputs.reason }}\nPerformed by: ${{ github.actor }}\nEnvironment: STAGING\nURL: ${{ secrets.STAGING_API_URL }}`
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
      
      - name: Notify rollback failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: ':x: STAGING Rollback Failed',
              attachments: [{
                color: 'danger',
                text: `Deployment ID: ${{ github.event.inputs.deployment_id }}\nReason: ${{ github.event.inputs.reason }}\nPerformed by: ${{ github.actor }}\nEnvironment: STAGING\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

