#
# DigitalOcean App Platform Configuration - STAGING Environment
# Native CI/CD Pipeline with Pre-Deploy Testing
#
# IMPORTANT SECURITY NOTE:
# This file is SAFE TO COMMIT to Git. All sensitive values use ${VARIABLE_NAME}
# placeholders or are marked as type: SECRET and configured in DigitalOcean App Platform.
#
# NEVER commit actual private keys, passwords, or API keys to this file.
#
# This configuration uses DEVNET_STAGING_* naming convention to differentiate
# from DEV environment variables.
#
# Deploy with: doctl apps create --spec staging-app.yaml
# Update with: doctl apps update <app-id> --spec staging-app.yaml
#
# See docs/deployment/DO_NATIVE_CICD.md for complete CI/CD pipeline documentation.
#

name: easyescrow-backend-staging
region: sgp1

# VPC configuration for private database access
# COMMENTED OUT: Had problems with VPC, will add back later
# vpc:
#   id: 1b54e9f9-6da0-45bd-9acb-2b9df642aa61

services:
  - name: api
    # Build configuration
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: staging
      deploy_on_push: true
    
    #
    # PRE-DEPLOY JOBS
    # These run BEFORE building and deploying. If any fail, deployment stops.
    #
    jobs:
      # Job 1: Run tests and linting
      - name: pre-deploy-tests
        kind: PRE_DEPLOY
        run_command: |
          #!/bin/bash
          set -e  # Exit on any error
          
          echo "=========================================="
          echo "   PRE-DEPLOYMENT TESTS & VALIDATION"
          echo "=========================================="
          
          echo ""
          echo "Step 1: Installing dependencies..."
          npm ci
          
          echo ""
          echo "Step 2: Running linter..."
          npm run lint
          
          echo ""
          echo "Step 3: Running unit tests..."
          npm run test:unit
          
          echo ""
          echo "Step 4: Generating Prisma client..."
          npm run db:generate
          
          echo ""
          echo "=========================================="
          echo "   ✅ ALL PRE-DEPLOYMENT CHECKS PASSED"
          echo "=========================================="
        
        environment_slug: node-js
        instance_size_slug: basic-xxs
        
        # Environment variables needed for testing
        envs:
          - key: NODE_ENV
            value: staging
          - key: DATABASE_URL
            type: SECRET
            scope: BUILD_TIME
      
      # Job 2: Run database migrations
      - name: run-migrations
        kind: PRE_DEPLOY
        run_command: |
          #!/bin/bash
          set -e  # Exit on any error
          
          echo "=========================================="
          echo "   DATABASE MIGRATIONS"
          echo "=========================================="
          
          echo ""
          echo "Installing dependencies..."
          npm ci
          
          echo ""
          echo "Running Prisma migrations..."
          npx prisma migrate deploy
          
          echo ""
          echo "Generating Prisma client..."
          npx prisma generate
          
          echo ""
          echo "=========================================="
          echo "   ✅ MIGRATIONS COMPLETED SUCCESSFULLY"
          echo "=========================================="
        
        environment_slug: node-js
        instance_size_slug: basic-xxs
        
        envs:
          - key: NODE_ENV
            value: staging
          - key: DATABASE_URL
            type: SECRET
            scope: BUILD_TIME
    
    # Use custom Dockerfile for building
    dockerfile_path: Dockerfile
    
    # Runtime configuration
    instance_count: 1
    instance_size_slug: basic-xxs
    
    # Health check - DigitalOcean waits for this before marking deployment successful
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 20
      success_threshold: 1
      failure_threshold: 5
    
    # HTTP configuration
    http_port: 8080
    
    # Routes
    routes:
      - path: /
    
    #
    # ENVIRONMENT VARIABLES
    # All secrets are configured in DigitalOcean App Platform console
    #
    envs:
      #
      # Core Environment
      #
      - key: NODE_ENV
        value: staging
        scope: RUN_AND_BUILD_TIME
      
      - key: SOLANA_NETWORK
        value: devnet
        scope: RUN_AND_BUILD_TIME
      
      - key: PORT
        value: "8080"
        scope: RUN_AND_BUILD_TIME
      
      - key: HOST
        value: 0.0.0.0
        scope: RUN_AND_BUILD_TIME
      
      - key: LOG_LEVEL
        value: debug
        scope: RUN_AND_BUILD_TIME
      
      # Enable E2E testing mode (higher rate limits for comprehensive testing)
      - key: ENABLE_E2E_TESTING
        value: "true"
        scope: RUN_AND_BUILD_TIME
      
      #
      # Solana RPC Configuration
      # IMPORTANT: Set actual value in DigitalOcean App Platform console
      # NOTE: No 'value' field - must be set in DO console
      #
      - key: SOLANA_RPC_URL
        type: SECRET
        scope: RUN_TIME
      
      - key: SOLANA_RPC_URL_FALLBACK
        value: https://api.devnet.solana.com
        scope: RUN_TIME
      
      - key: SOLANA_RPC_TIMEOUT
        value: "30000"
        scope: RUN_TIME
      
      - key: SOLANA_RPC_RETRIES
        value: "3"
        scope: RUN_TIME
      
      - key: SOLANA_RPC_HEALTH_CHECK_INTERVAL
        value: "30000"
        scope: RUN_TIME
      
      #
      # STAGING Program Configuration
      # NOTE: DEVNET_STAGING_PROGRAM_ID is for environment identification
      #       ESCROW_PROGRAM_ID is what the application code expects
      #       Both must have the same value
      #
      - key: DEVNET_STAGING_PROGRAM_ID
        value: AvdX6LEkoAmP961QwNjAUNpiuDtiQjaiSw5wR5zb9Zei
        scope: RUN_TIME
      
      - key: ESCROW_PROGRAM_ID
        value: AvdX6LEkoAmP961QwNjAUNpiuDtiQjaiSw5wR5zb9Zei
        scope: RUN_TIME
      
      #
      # STAGING Wallet Configuration (Base58 Private Keys)
      # NOTE: Uses DEVNET_STAGING_* prefix to avoid DEV conflicts
      # IMPORTANT: Actual private keys stored in DO App Platform
      #
      - key: DEVNET_STAGING_SENDER_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: DEVNET_STAGING_RECEIVER_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      # Admin keypair for signing escrow transactions
      # Application code reads DEVNET_STAGING_ADMIN_PRIVATE_KEY (based on NODE_ENV=staging)
      - key: DEVNET_STAGING_ADMIN_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      # Admin address for reference (derived from DEVNET_STAGING_ADMIN_PRIVATE_KEY)
      - key: DEVNET_STAGING_ADMIN_ADDRESS
        value: 498GViCLvzbGnRoByJCAj7skXkAe3NBpCY2Wghcd2e4R
        scope: RUN_TIME
      
      - key: DEVNET_STAGING_FEE_COLLECTOR_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      #
      # Token Configuration (Official Circle USDC Devnet)
      # NOTE: DEVNET_STAGING_USDC_MINT_ADDRESS is for environment identification
      #       USDC_MINT_ADDRESS is what the application code expects
      #       Both must have the same value
      #
      - key: DEVNET_STAGING_USDC_MINT_ADDRESS
        value: Gh9ZwEmdLJ8DscKNTkTqPbNwLNNBjuSzaG9Vp2KGtKJr
        scope: RUN_TIME
      
      - key: USDC_MINT_ADDRESS
        value: Gh9ZwEmdLJ8DscKNTkTqPbNwLNNBjuSzaG9Vp2KGtKJr
        scope: RUN_TIME
      
      #
      # Database Configuration
      # IMPORTANT: Actual connection strings with passwords stored in DO App Platform
      #
      - key: DATABASE_URL
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      
      - key: DATABASE_POOL_URL
        type: SECRET
        scope: RUN_TIME
      
      - key: DATABASE_POOL_SIZE
        value: "10"
        scope: RUN_TIME
      
      - key: DATABASE_POOL_TIMEOUT
        value: "30"
        scope: RUN_TIME
      
      #
      # Redis Configuration
      # IMPORTANT: Actual Redis URL with password stored in DO App Platform
      #
      - key: REDIS_URL
        type: SECRET
        scope: RUN_TIME
      
      #
      # Platform Fee Configuration
      #
      - key: PLATFORM_FEE_BPS
        value: "100"
        scope: RUN_TIME
      
      - key: DEVNET_STAGING_FEE_COLLECTOR_ADDRESS
        type: SECRET
        scope: RUN_TIME
      
      #
      # Monitoring & Health Checks
      #
      - key: MONITORING_ENDPOINT
        value: https://staging.easyescrow.ai/health
        scope: RUN_TIME
      
      - key: HEALTH_CHECK_ENABLED
        value: "true"
        scope: RUN_TIME
      
      - key: HEALTH_CHECK_PATH
        value: /health
        scope: RUN_TIME
      
      - key: ENABLE_DEPOSIT_MONITORING
        value: "true"
        scope: RUN_TIME
      
      - key: DEPOSIT_POLL_INTERVAL_MS
        value: "10000"
        scope: RUN_TIME
      
      - key: TRANSACTION_CONFIRMATION_TIMEOUT
        value: "60000"
        scope: RUN_TIME
      
      #
      # JWT Configuration
      # IMPORTANT: Actual JWT secret stored in DO App Platform
      #
      - key: JWT_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: JWT_EXPIRATION
        value: 24h
        scope: RUN_TIME
      
      #
      # API Rate Limiting
      #
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
        scope: RUN_TIME
      
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "200"
        scope: RUN_TIME
      
      #
      # CORS Configuration
      #
      - key: CORS_ORIGIN
        value: https://staging.easyescrow.ai,http://localhost:3000
        scope: RUN_TIME
      
      #
      # Webhook Configuration
      # IMPORTANT: Actual webhook secret stored in DO App Platform
      #
      - key: WEBHOOK_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: WEBHOOK_MAX_RETRIES
        value: "5"
        scope: RUN_TIME
      
      - key: WEBHOOK_RETRY_DELAY
        value: "5000"
        scope: RUN_TIME
      
      #
      # Feature Flags
      #
      - key: ENABLE_WEBHOOKS
        value: "true"
        scope: RUN_TIME
      
      - key: ENABLE_RATE_LIMITING
        value: "true"
        scope: RUN_TIME
      
      - key: ENABLE_REQUEST_LOGGING
        value: "true"
        scope: RUN_TIME
      
      #
      # Swagger/Documentation
      #
      - key: ENABLE_SWAGGER
        value: "true"
        scope: RUN_TIME
      
      - key: SWAGGER_PATH
        value: /api/docs
        scope: RUN_TIME
      
      #
      # Monitoring & Analytics (Optional)
      #
      - key: SENTRY_DSN
        type: SECRET
        scope: RUN_TIME
      
      - key: SENTRY_ENVIRONMENT
        value: staging
        scope: RUN_TIME
      
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.5"
        scope: RUN_TIME
      
      #
      # Email Configuration (Test Service)
      # IMPORTANT: SMTP credentials stored in DO App Platform
      #
      - key: SMTP_HOST
        value: smtp.mailtrap.io
        scope: RUN_TIME
      
      - key: SMTP_PORT
        value: "2525"
        scope: RUN_TIME
      
      - key: SMTP_USER
        type: SECRET
        scope: RUN_TIME
      
      - key: SMTP_PASS
        type: SECRET
        scope: RUN_TIME
      
      - key: SMTP_FROM
        value: noreply@staging.easyescrow.ai
        scope: RUN_TIME
      
      #
      # S3/Spaces Configuration (Singapore Region)
      # IMPORTANT: Spaces credentials stored in DO App Platform
      #
      - key: DO_SPACES_ENDPOINT
        value: https://sgp1.digitaloceanspaces.com
        scope: RUN_TIME
      
      - key: DO_SPACES_BUCKET_NAME
        value: easyescrow-test
        scope: RUN_TIME
      
      - key: DO_SPACES_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: DO_SPACES_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: DO_SPACES_REGION
        value: sgp1
        scope: RUN_TIME
      
      #
      # Logging Configuration
      #
      - key: LOG_FORMAT
        value: json
        scope: RUN_TIME
      
      - key: LOG_MAX_SIZE
        value: 10m
        scope: RUN_TIME
      
      - key: LOG_MAX_FILES
        value: "7"
        scope: RUN_TIME
      
      #
      # Notification Configuration (Optional)
      # For deployment notifications via Slack/Discord
      #
      - key: SLACK_WEBHOOK
        type: SECRET
        scope: BUILD_TIME
      
      - key: DISCORD_WEBHOOK
        type: SECRET
        scope: BUILD_TIME

#
# WORKERS
# Optional: Smoke test worker that runs after deployment
#
workers:
  - name: post-deploy-smoke-tests
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: staging
      deploy_on_push: false  # Don't auto-deploy, will be triggered manually
    
    run_command: |
      #!/bin/bash
      set -e
      
      echo "=========================================="
      echo "   POST-DEPLOYMENT SMOKE TESTS"
      echo "=========================================="
      
      # Wait for API to be fully ready
      echo ""
      echo "Waiting 60 seconds for API to stabilize..."
      sleep 60
      
      # Install dependencies
      echo ""
      echo "Installing dependencies..."
      npm ci
      
      # Run smoke tests
      echo ""
      echo "Running smoke tests..."
      npm run test:staging:smoke
      
      # Send success notification
      if [ -n "$SLACK_WEBHOOK" ]; then
        curl -X POST "$SLACK_WEBHOOK" \
          -H 'Content-Type: application/json' \
          -d "{\"text\":\"✅ STAGING deployment smoke tests passed!\"}"
      fi
      
      echo ""
      echo "=========================================="
      echo "   ✅ SMOKE TESTS PASSED"
      echo "=========================================="
    
    environment_slug: node-js
    instance_size_slug: basic-xxs
    
    envs:
      - key: STAGING_API_URL
        value: https://staging.easyescrow.ai
      - key: STAGING_RPC_URL
        type: SECRET
      - key: STAGING_PROGRAM_ID
        value: AvdX6LEkoAmP961QwNjAUNpiuDtiQjaiSw5wR5zb9Zei
      - key: SLACK_WEBHOOK
        type: SECRET

# Custom Domain Configuration
domains:
  - domain: staging.easyescrow.ai
    type: PRIMARY

# Alerts - DigitalOcean will notify on these events
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: DEPLOYMENT_LIVE
