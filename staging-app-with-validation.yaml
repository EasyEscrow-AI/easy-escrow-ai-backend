#         value: https://staging-api.easyescrow.ai
#       - key: STAGING_RPC_URL
#         value: ${SOLANA_RPC_URL}
#         type: SECRET
#       - key: STAGING_PROGRAM_ID
#         value: ${STAGING_PROGRAM_ID}
#         type: SECRET

# Databases
databases:
  - name: postgres
    engine: PG
    version: "15"
    production: false
    cluster_name: staging-db

# Notes:
# 1. Replace <your-org>/<your-repo> with your GitHub repository
# 2. Set all SECRET values in DigitalOcean App Platform console
# 3. PRE_DEPLOY jobs run before deployment and block if they fail
# 4. POST_DEPLOY jobs run after deployment (optional, for verification)
# 5. Manual trigger recommended for PRE_DEPLOY to avoid blocking automatic deployments
# 6. Validation reports are saved to .taskmaster/reports/ (view in job logs)

