# ============================================
# DigitalOcean App Platform Configuration
# EasyEscrow.ai Backend API - DEVELOPMENT
# ============================================
#
# DEVELOPMENT CONFIGURATION
# Uses App Platform's FREE dev database
# Perfect for testing and development
#
# Create with: doctl apps create --spec .do/app-dev.yaml
# ============================================

name: easyescrow-backend-dev
region: sgp1

# ============================================
# Services
# ============================================

services:
  - name: api-dev
    # GitHub repository configuration
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: master
      deploy_on_push: false  # Manual deployments for DEV
    
    # Use Dockerfile for consistency
    dockerfile_path: Dockerfile
    
    # Instance configuration (smallest for dev)
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/month - 512MB RAM, 1 vCPU
    
    # HTTP configuration
    http_port: 3000
    
    # Health check
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    
    # Environment variables
    envs:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: "3000"
      - key: SOLANA_NETWORK
        value: devnet
      - key: SOLANA_COMMITMENT
        value: confirmed
      - key: MONITORING_ENABLED
        value: "true"
      - key: WEBHOOK_ENABLED
        value: "false"
      - key: CORS_ENABLED
        value: "true"
      - key: HELMET_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: debug
      - key: PLATFORM_FEE_BPS
        value: "250"
      
      # Health Check & Monitoring Intervals (Optimized for Development)
      - key: SOLANA_RPC_HEALTH_CHECK_INTERVAL
        value: "60000"  # 1 minute - Faster feedback for development
      - key: HEALTH_CHECK_INTERVAL_MS
        value: "60000"  # 1 minute - Service health monitoring
      - key: METRICS_INTERVAL_MS
        value: "180000"  # 3 minutes - Metrics collection
      
      # DEV Database (automatically injected by App Platform)
      # DATABASE_URL will be set automatically
      
      # Set these via console (secrets)
      # - JWT_SECRET
      # - SOLANA_RPC_URL (Helius/QuickNode devnet)
      # - ESCROW_PROGRAM_ID (devnet)
      # - USDC_MINT_ADDRESS (devnet)
      # - REDIS_URL (Upstash)
      # - SPACES_ACCESS_KEY_ID
      # - SPACES_SECRET_ACCESS_KEY
      # - SPACES_BUCKET (easyescrow-test for dev/staging)
      # - SPACES_ENDPOINT (https://sgp1.digitaloceanspaces.com)
      # - SPACES_REGION (sgp1)

# ============================================
# Dev Database (FREE)
# ============================================

databases:
  - name: db-dev
    engine: PG
    production: false  # This makes it a FREE dev database!

# ============================================
# Features
# ============================================

features:
  - buildpack-stack=ubuntu-22

# ============================================
# Alerts
# ============================================

alerts:
  - rule: DEPLOYMENT_FAILED

# ============================================
# Notes
# ============================================

# Deployment:
# 1. Create app:
#    doctl apps create --spec .do/app-dev.yaml
#
# 2. Set secrets via console or CLI:
#    doctl apps update <APP_ID> --spec .do/app-dev.yaml
#
# 3. View logs:
#    doctl apps logs <APP_ID> --type run
#
# Cost: ~$5/month (database is FREE!)

