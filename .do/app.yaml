# DigitalOcean App Specification - Staging Environment
# This file explicitly controls build and run commands

name: easy-escrow-ai-backend-staging
region: nyc

services:
  - name: backend
    environment_slug: node-js
    github:
      branch: staging
      deploy_on_push: true
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
    
    # Build configuration
    build_command: npm ci && npm run build
    
    # Pre-deployment command (database migrations)
    run_command: npm run db:migrate:deploy && npm start
    
    # Environment variables (secrets configured in DigitalOcean console)
    envs:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: "8080"
    
    # Health check
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    
    # Instance configuration
    instance_count: 1
    instance_size_slug: professional-xs
    
    http_port: 8080

databases:
  - name: easyescrow-staging-postgres
    engine: PG
    production: false
    
  - name: easyescrow-staging-redis
    engine: REDIS
    production: false
