# Alerts (requires configuration via console)
# ============================================

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

# ============================================
# Notes
# ============================================

# Deployment:
# 1. Push this file to .do/app.yaml in your repository
# 2. Create app via console or CLI:
#    doctl apps create --spec .do/app.yaml
# 3. Configure secrets via console
# 4. Connect databases via Resources tab
# 5. Add custom domain and verify DNS
#
# Update:
# doctl apps update <APP_ID> --spec .do/app.yaml
#
# Get app ID:
# doctl apps list
#
# View logs:
# doctl apps logs <APP_ID> --type run
#
# SSH into container (if needed):
# doctl apps exec <APP_ID> --component api

