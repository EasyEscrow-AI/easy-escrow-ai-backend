# ============================================
# DigitalOcean App Platform Configuration
# EasyEscrow.ai Backend API
# ============================================
#
# PRODUCTION CONFIGURATION
# This deploys to Singapore (sgp1) region
#
# For other environments, see:
# - .do/app-dev.yaml (Development with free dev database)
# - .do/app-staging.yaml (Staging environment)
# ============================================

name: easyescrow-backend-prod
region: sgp1

# ============================================
# Services
# ============================================

services:
  - name: api
    # GitHub repository configuration
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: master
      deploy_on_push: true
    
    # Build configuration
    build_command: npm run build
    
    # Runtime configuration
    run_command: npm start
    
    # Dockerfile configuration (alternative to buildpack)
    # dockerfile_path: Dockerfile
    
    # Environment
    environment_slug: node-js
    
    # Instance configuration
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/month - 512MB RAM, 1 vCPU
    
    # HTTP configuration
    http_port: 3000
    
    # Health check
    health_check:
      http_path: /health
      initial_delay_seconds: 40
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    
    # Auto-scaling (optional, requires paid plan)
    # autoscaling:
    #   min_instance_count: 1
    #   max_instance_count: 3
    #   metrics:
    #     cpu:
    #       percent: 80
    
    # Environment variables (non-sensitive)
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SOLANA_NETWORK
        value: mainnet-beta
      - key: SOLANA_COMMITMENT
        value: finalized
      - key: MONITORING_ENABLED
        value: "true"
      - key: WEBHOOK_ENABLED
        value: "true"
      - key: CORS_ENABLED
        value: "true"
      - key: HELMET_ENABLED
        value: "true"
      - key: IDEMPOTENCY_EXPIRATION_HOURS
        value: "24"
      - key: PLATFORM_FEE_BPS
        value: "250"
      
      # These will be set via console (sensitive values)
      # - key: DATABASE_URL
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: REDIS_URL
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: JWT_SECRET
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: SOLANA_RPC_URL
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: ESCROW_PROGRAM_ID
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: USDC_MINT_ADDRESS
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: SPACES_ACCESS_KEY_ID
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: SPACES_SECRET_ACCESS_KEY
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: SPACES_BUCKET
      #   value: "easyescrow-storage"  # Production uses easyescrow-storage
      #   scope: RUN_TIME
      # - key: SPACES_ENDPOINT
      #   value: "https://sgp1.digitaloceanspaces.com"
      #   scope: RUN_TIME
      # - key: SPACES_REGION
      #   value: "sgp1"
      #   scope: RUN_TIME

# ============================================
# Databases (Managed DigitalOcean Services)
# ============================================

# PostgreSQL and Redis clusters created separately
# Database ID: b0f97f57-f399-4727-8abf-dc741cc9a5d2 (easyescrow-prod-postgres)
# These will be attached via App Platform console or CLI
#
# Note: Redis uses Upstash instead of DigitalOcean (not enabled on account)
# Configure REDIS_URL as environment variable from Upstash

databases:
  - name: easyescrow-prod-postgres
    engine: PG
    production: true
    cluster_name: easyescrow-prod-postgres
    db_name: easyescrow_production
    db_user: easyescrow_app

# ============================================
# Custom Domains
# ============================================

domains:
  - domain: api.easyescrow.ai
    type: PRIMARY
    zone: easyescrow.ai

