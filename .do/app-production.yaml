#
# DigitalOcean App Platform Configuration - PRODUCTION Environment
# Native CI/CD Pipeline with Pre-Deploy Testing & Migrations
#
# IMPORTANT SECURITY NOTE:
# This file is SAFE TO COMMIT to Git. All sensitive values use ${VARIABLE_NAME}
# placeholders or are marked as type: SECRET and configured in DigitalOcean App Platform.
#
# NEVER commit actual private keys, passwords, or API keys to this file.
#
# This configuration uses MAINNET_PROD_* naming convention for production environment.
#
# Deploy with: doctl apps create --spec app-production.yaml
# Update with: doctl apps update <app-id> --spec app-production.yaml
#
# See docs/deployment/PRODUCTION_DEPLOYMENT.md for complete deployment documentation.
#

name: easyescrow-backend-production
region: sgp1

# VPC configuration for private database access
# Configure after VPC is properly set up
# vpc:
#   id: <production-vpc-id>

#
# PRE-DEPLOY JOBS (TOP LEVEL)
# These run BEFORE building and deploying. If any fail, deployment stops.
#
jobs:
  - name: db-migrate
    kind: PRE_DEPLOY
    dockerfile_path: Dockerfile
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: master
      deploy_on_push: true
    run_command: npx prisma migrate deploy
    instance_size_slug: basic-xs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: DATABASE_URL
        type: SECRET
        scope: RUN_AND_BUILD_TIME

services:
  - name: api
    # Build configuration
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: master
      deploy_on_push: true
    
    # Use custom Dockerfile for building
    dockerfile_path: Dockerfile
    
    # Runtime configuration
    instance_count: 1
    instance_size_slug: basic-xs
    
    # Health check - DigitalOcean waits for this before marking deployment successful
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 20
      success_threshold: 1
      failure_threshold: 5
    
    # HTTP configuration
    http_port: 8080
    
    #
    # ENVIRONMENT VARIABLES
    # All secrets are configured in DigitalOcean App Platform console
    #
    envs:
      #
      # Core Environment
      #
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      
      - key: SOLANA_NETWORK
        value: mainnet-beta
        scope: RUN_AND_BUILD_TIME
      
      - key: PORT
        value: "8080"
        scope: RUN_AND_BUILD_TIME
      
      - key: HOST
        value: 0.0.0.0
        scope: RUN_AND_BUILD_TIME
      
      - key: LOG_LEVEL
        value: info
        scope: RUN_AND_BUILD_TIME
      
      #
      # Solana RPC Configuration
      # IMPORTANT: Set actual Mainnet RPC URL in DigitalOcean App Platform console
      # Recommended: Use Helius, QuickNode, or Triton for production-grade RPC
      #
      - key: SOLANA_RPC_URL
        type: SECRET
        scope: RUN_TIME
      
      - key: SOLANA_RPC_URL_FALLBACK
        value: https://api.mainnet-beta.solana.com
        scope: RUN_TIME
      
      - key: SOLANA_RPC_TIMEOUT
        value: "30000"
        scope: RUN_TIME
      
      - key: SOLANA_RPC_RETRIES
        value: "3"
        scope: RUN_TIME
      
      - key: SOLANA_RPC_HEALTH_CHECK_INTERVAL
        value: "30000"
        scope: RUN_TIME
      
      #
      # PRODUCTION Program Configuration
      # Program ID: 2GFDPMZawisx4AMadZEjbcNJPUsLKMzcG4rLEbKtTQUx
      # NOTE: MAINNET_PROD_PROGRAM_ID is for environment identification
      #       ESCROW_PROGRAM_ID is what the application code expects
      #       Both must have the same value
      #
      - key: MAINNET_PROD_PROGRAM_ID
        value: 2GFDPMZawisx4AMadZEjbcNJPUsLKMzcG4rLEbKtTQUx
        scope: RUN_TIME
      
      - key: ESCROW_PROGRAM_ID
        value: 2GFDPMZawisx4AMadZEjbcNJPUsLKMzcG4rLEbKtTQUx
        scope: RUN_TIME
      
      #
      # PRODUCTION Wallet Configuration (Base58 Private Keys)
      # IMPORTANT: All private keys must be stored in DO App Platform as secrets
      # SECURITY: Never commit actual private keys to this file
      #
      - key: MAINNET_PROD_ADMIN_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_ADMIN_ADDRESS
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_FEE_COLLECTOR_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_FEE_COLLECTOR_ADDRESS
        type: SECRET
        scope: RUN_TIME
      
      # Additional wallet configuration for testing/operations
      - key: MAINNET_PROD_SENDER_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_SENDER_ADDRESS
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_RECEIVER_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_RECEIVER_ADDRESS
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_DEPLOYER_ADDRESS
        type: SECRET
        scope: RUN_TIME
      
      # Legacy admin key (if needed for backward compatibility)
      - key: MAINNET_ADMIN_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      #
      # Token Configuration (Official Circle USDC Mainnet)
      # NOTE: MAINNET_PROD_USDC_MINT_ADDRESS is for environment identification
      #       USDC_MINT_ADDRESS is what the application code expects
      #       Both must have the same value
      # Circle USDC Mainnet Address: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
      #
      - key: MAINNET_PROD_USDC_MINT_ADDRESS
        value: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        scope: RUN_TIME
      
      - key: USDC_MINT_ADDRESS
        value: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        scope: RUN_TIME
      
      #
      # Database Configuration
      # IMPORTANT: Actual connection strings with passwords stored in DO App Platform
      # Use production database (easyescrow_prod)
      #
      - key: DATABASE_URL
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      
      - key: DATABASE_POOL_URL
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      
      #
      # Redis Configuration
      # IMPORTANT: Actual Redis URL with password stored in DO App Platform
      #
      - key: REDIS_URL
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      
      #
      # Platform Fee Configuration
      # Production fee: 1% (100 basis points)
      #
      - key: PLATFORM_FEE_BPS
        value: "100"
        scope: RUN_TIME
      
      #
      # Monitoring & Health Checks
      #
      - key: MONITORING_ENDPOINT
        value: https://api.easyescrow.ai/health
        scope: RUN_TIME
      
      - key: HEALTH_CHECK_ENABLED
        value: "true"
        scope: RUN_TIME
      
      - key: HEALTH_CHECK_PATH
        value: /health
        scope: RUN_TIME
      
      - key: ENABLE_DEPOSIT_MONITORING
        value: "true"
        scope: RUN_TIME
      
      - key: DEPOSIT_POLL_INTERVAL_MS
        value: "10000"
        scope: RUN_TIME
      
      - key: TRANSACTION_CONFIRMATION_TIMEOUT
        value: "60000"
        scope: RUN_TIME
      
      # Disable WebSocket monitoring to avoid RPC rate limits (429 errors)
      # System will use polling-only mode for monitoring deposits
      - key: DISABLE_WS_MONITORING
        value: "true"
        scope: RUN_TIME
      
      #
      # JWT Configuration
      # IMPORTANT: Strong JWT secret stored in DO App Platform
      # Generate with: openssl rand -base64 64
      #
      - key: JWT_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: JWT_EXPIRATION
        value: 24h
        scope: RUN_TIME
      
      #
      # API Rate Limiting (More restrictive for production)
      #
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
        scope: RUN_TIME
      
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
        scope: RUN_TIME
      
      #
      # CORS Configuration
      # Note: Only allow production frontend domain
      #
      - key: CORS_ORIGIN
        value: https://easyescrow.ai,https://www.easyescrow.ai
        scope: RUN_TIME
      
      #
      # Webhook Configuration
      # IMPORTANT: Actual webhook secret stored in DO App Platform
      # Generate with: openssl rand -base64 32
      #
      - key: WEBHOOK_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: WEBHOOK_MAX_RETRIES
        value: "5"
        scope: RUN_TIME
      
      - key: WEBHOOK_RETRY_DELAY
        value: "5000"
        scope: RUN_TIME
      
      #
      # Feature Flags
      #
      - key: ENABLE_WEBHOOKS
        value: "true"
        scope: RUN_TIME
      
      - key: ENABLE_RATE_LIMITING
        value: "true"
        scope: RUN_TIME
      
      - key: ENABLE_REQUEST_LOGGING
        value: "true"
        scope: RUN_TIME
      
      #
      # Swagger/Documentation (Disabled in production for security)
      #
      - key: ENABLE_SWAGGER
        value: "false"
        scope: RUN_TIME
      
      - key: SWAGGER_PATH
        value: /docs
        scope: RUN_TIME
      
      #
      # Monitoring & Analytics
      # IMPORTANT: Sentry DSN stored in DO App Platform
      #
      - key: SENTRY_DSN
        type: SECRET
        scope: RUN_TIME
      
      - key: SENTRY_ENVIRONMENT
        value: production
        scope: RUN_TIME
      
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
        scope: RUN_TIME
      
      #
      # Email Configuration (Production SMTP)
      # IMPORTANT: Production SMTP credentials stored in DO App Platform
      # Use SendGrid, AWS SES, or similar production-grade service
      #
      - key: SMTP_HOST
        type: SECRET
        scope: RUN_TIME
      
      - key: SMTP_PORT
        value: "587"
        scope: RUN_TIME
      
      - key: SMTP_USER
        type: SECRET
        scope: RUN_TIME
      
      - key: SMTP_PASS
        type: SECRET
        scope: RUN_TIME
      
      - key: SMTP_FROM
        value: noreply@easyescrow.ai
        scope: RUN_TIME
      
      #
      # S3/Spaces Configuration (Singapore Region)
      # IMPORTANT: Production Spaces credentials stored in DO App Platform
      #
      - key: DO_SPACES_ENDPOINT
        value: https://sgp1.digitaloceanspaces.com
        scope: RUN_TIME
      
      - key: DO_SPACES_BUCKET
        value: easyescrow-production
        scope: RUN_TIME
      
      - key: DO_SPACES_BUCKET_NAME
        value: easyescrow-production
        scope: RUN_TIME
      
      - key: DO_SPACES_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: DO_SPACES_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: DO_SPACES_REGION
        value: sgp1
        scope: RUN_TIME
      
      #
      # Logging Configuration (JSON format for production)
      #
      - key: LOG_FORMAT
        value: json
        scope: RUN_TIME
      
      - key: LOG_MAX_SIZE
        value: 20m
        scope: RUN_TIME
      
      - key: LOG_MAX_FILES
        value: "14"
        scope: RUN_TIME
      
      #
      # Notification Configuration
      # For deployment and alert notifications
      #
      - key: SLACK_WEBHOOK
        type: SECRET
        scope: BUILD_TIME
      
      - key: DISCORD_WEBHOOK
        type: SECRET
        scope: BUILD_TIME

# ============================================
# Databases
# ============================================

databases:
  - name: easyescrow-production-postgres
    engine: PG
    production: true  # Production environment
    cluster_name: easyescrow-production-postgres

# Custom Domain Configuration
domains:
  - domain: api.easyescrow.ai
    type: PRIMARY

# Ingress configuration for routing
ingress:
  rules:
  - component:
      name: api
    match:
      path:
        prefix: /

# Alerts - DigitalOcean will notify on these events
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: DEPLOYMENT_LIVE

