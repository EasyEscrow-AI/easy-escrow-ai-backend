# ============================================
# DigitalOcean App Platform Configuration
# EasyEscrow.ai Backend API - STAGING
# ============================================
#
# STAGING CONFIGURATION
# Uses managed PostgreSQL cluster (db-s-1vcpu-1gb)
# Tests production-like environment before deploying to prod
#
# Create with: doctl apps create --spec .do/app-staging.yaml
# ============================================

name: easyescrow-backend-staging
region: sgp1

# ============================================
# Jobs - Run before deployment
# ============================================

jobs:
  - name: db-migrate
    kind: PRE_DEPLOY
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: staging
      deploy_on_push: true
    dockerfile_path: Dockerfile
    run_command: npx prisma migrate deploy
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: staging
      # Use direct database connection for migrations
      # Migrations require direct connection (not pool) because PgBouncer doesn't support DDL
      # ${DATABASE_URL} references the secret set via console (port 25060, direct connection)
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${DATABASE_URL}

# ============================================
# Services
# ============================================

services:
  - name: api-staging
    # GitHub repository configuration
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: staging
      deploy_on_push: true
    
    # Use Dockerfile for consistency (build_command/run_command in Dockerfile)
    dockerfile_path: Dockerfile
    
    # Instance configuration
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/month - 512MB RAM, 1 vCPU
    
    # HTTP configuration
    http_port: 3000
    
    # Health check
    health_check:
      http_path: /health
      initial_delay_seconds: 50
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    
    # Environment variables
    # 
    # Note: Variables with ${VARIABLE_NAME} syntax reference secrets set via console.
    # This preserves existing secret values when updating the app spec.
    # To set/update secrets: DigitalOcean Console → App → Settings → Environment Variables
    #
    envs:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: "3000"
      - key: SOLANA_NETWORK
        value: devnet  # or mainnet-beta
      - key: SOLANA_COMMITMENT
        value: finalized
      - key: MONITORING_ENABLED
        value: "true"
      - key: WEBHOOK_ENABLED
        value: "true"
      - key: CORS_ENABLED
        value: "true"
      - key: HELMET_ENABLED
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: PLATFORM_FEE_BPS
        value: "250"
      
      # Health Check & Monitoring Intervals (Optimized for Staging)
      - key: SOLANA_RPC_HEALTH_CHECK_INTERVAL
        value: "120000"  # 2 minutes - Moderate for staging testing
      - key: HEALTH_CHECK_INTERVAL_MS
        value: "120000"  # 2 minutes - Service health monitoring
      - key: METRICS_INTERVAL_MS
        value: "300000"  # 5 minutes - Metrics collection
      
      # Database & Cache (Secrets - set via console)
      - key: DATABASE_URL_POOL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${DATABASE_URL_POOL}
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${REDIS_URL}
      
      # Authentication (Secrets - set via console)
      - key: JWT_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${JWT_SECRET}
      
      # Solana Configuration (Secrets - set via console)
      - key: SOLANA_RPC_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${SOLANA_RPC_URL}
      - key: ESCROW_PROGRAM_ID
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${ESCROW_PROGRAM_ID}
      - key: USDC_MINT_ADDRESS
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${USDC_MINT_ADDRESS}
      - key: DEVNET_STAGING_ADMIN_PRIVATE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${DEVNET_STAGING_ADMIN_PRIVATE_KEY}
      - key: DEVNET_STAGING_ADMIN_ADDRESS
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${DEVNET_STAGING_ADMIN_ADDRESS}
      
      # DigitalOcean Spaces (Secrets - set via console)
      - key: SPACES_ACCESS_KEY_ID
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${SPACES_ACCESS_KEY_ID}
      - key: SPACES_SECRET_ACCESS_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${SPACES_SECRET_ACCESS_KEY}
      - key: SPACES_BUCKET
        scope: RUN_AND_BUILD_TIME
        value: ${SPACES_BUCKET}
      - key: SPACES_ENDPOINT
        scope: RUN_AND_BUILD_TIME
        value: ${SPACES_ENDPOINT}
      - key: SPACES_REGION
        scope: RUN_AND_BUILD_TIME
        value: ${SPACES_REGION}

# ============================================
# Databases
# ============================================

# PostgreSQL cluster created separately
# Database ID: c172d515-f258-412a-b8e8-6e821eb953be
# Connection via DATABASE_URL environment variable

databases:
  - name: easyescrow-staging-postgres
    engine: PG
    production: false  # Staging environment
    cluster_name: easyescrow-staging-postgres

# ============================================
# Custom Domains (Optional)
# ============================================

# domains:
#   - domain: staging-api.easyescrow.ai
#     type: PRIMARY
#     zone: easyescrow.ai

# ============================================
# Features
# ============================================

features:
  - buildpack-stack=ubuntu-22

# ============================================
# Alerts
# ============================================

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

# ============================================
# Notes
# ============================================

# Deployment:
# 1. Ensure PostgreSQL cluster is online:
#    doctl databases list
#
# 2. Create app:
#    doctl apps create --spec .do/app-staging.yaml
#
# 3. Attach database via console or:
#    doctl apps update <APP_ID> --spec .do/app-staging.yaml
#
# 4. Set environment variables:
#    - DATABASE_URL: Get from database cluster
#    - REDIS_URL: Get from Upstash
#    - Other secrets via console
#
# 5. View logs:
#    doctl apps logs <APP_ID> --type run
#
# Cost: ~$20/month
# - App Platform: $5/month
# - PostgreSQL: $15/month
# - Redis (Upstash): FREE tier

