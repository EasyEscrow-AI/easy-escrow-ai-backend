# ============================================
# DigitalOcean App Platform Configuration
# EasyEscrow.ai Backend API - DEVELOPMENT
# ============================================

name: easyescrow-backend-dev
region: sgp1

# ============================================
# Services
# ============================================

services:
  - name: api-dev
    # GitHub repository configuration
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: master
      deploy_on_push: false  # Manual deployments for DEV
    
    # Use Dockerfile for consistency
    dockerfile_path: Dockerfile
    
    # Instance configuration (smallest for dev)
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/month - 512MB RAM, 1 vCPU
    
    # HTTP configuration
    http_port: 3000
    
    # Health check
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    
    # Environment variables
    envs:
      - key: NODE_ENV
        value: "development"
        scope: RUN_TIME
      - key: PORT
        value: "3000"
        scope: RUN_TIME
      - key: SOLANA_NETWORK
        value: "devnet"
        scope: RUN_TIME
      - key: SOLANA_COMMITMENT
        value: "confirmed"
        scope: RUN_TIME
      - key: MONITORING_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: WEBHOOK_ENABLED
        value: "false"
        scope: RUN_TIME
      - key: CORS_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: HELMET_ENABLED
        value: "false"
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: "debug"
        scope: RUN_TIME
      - key: PLATFORM_FEE_BPS
        value: "250"
        scope: RUN_TIME
      
      # Solana Configuration
      - key: SOLANA_RPC_URL
        value: "https://api.devnet.solana.com"
        scope: RUN_TIME
      - key: ESCROW_PROGRAM_ID
        value: "7dVEyFFeMzAT3oUpyvXwchGfPQDuXHdQv5tyfDBztKuV"
        scope: RUN_TIME
      - key: USDC_MINT_ADDRESS
        value: "Gh9ZwEmdLJ8DscKNTkTqPbNwLNNBjuSzaG9Vp2KGtKJr"
        scope: RUN_TIME
      
      # DigitalOcean Spaces Configuration (DEV uses test bucket)
      - key: SPACES_ENDPOINT
        value: "https://sgp1.digitaloceanspaces.com"
        scope: RUN_TIME
      - key: SPACES_REGION
        value: "sgp1"
        scope: RUN_TIME
      - key: SPACES_BUCKET
        value: "easyescrow-test"
        scope: RUN_TIME
      
      # ============================================
      # SECRETS - SET VIA DO APP PLATFORM CONSOLE
      # ============================================
      # DO NOT hardcode secrets in this file!
      # Set these via: https://cloud.digitalocean.com/apps
      # Go to Settings → App-Level Environment Variables
      #
      # Required secrets to configure:
      # - JWT_SECRET (type: SECRET)
      # - DATABASE_URL (scope: RUN_AND_BUILD_TIME)
      # - REDIS_URL (type: SECRET)
      # - SPACES_ACCESS_KEY_ID (type: SECRET)
      # - SPACES_SECRET_ACCESS_KEY (type: SECRET)

# ============================================
# Database
# ============================================
# Using staging database for now

# ============================================
# Features
# ============================================

features:
  - buildpack-stack=ubuntu-22

# ============================================
# Alerts
# ============================================

alerts:
  - rule: DEPLOYMENT_FAILED

