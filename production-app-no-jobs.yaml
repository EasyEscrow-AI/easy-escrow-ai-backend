#
# DigitalOcean App Platform Configuration - PRODUCTION Environment (Initial Creation)
# Simplified version without PRE_DEPLOY jobs for doctl compatibility
#

name: easyescrow-backend-production
region: sgp1

services:
  - name: api
    # Build configuration
    github:
      repo: VENTURE-AI-LABS/easy-escrow-ai-backend
      branch: master
      deploy_on_push: true
    
    # Use custom Dockerfile for building
    dockerfile_path: Dockerfile
    
    # Runtime configuration - start with 1 instance
    # Note: Horizontal scaling requires Professional tier or higher
    instance_count: 1
    instance_size_slug: basic-xs
    
    # Health check - DigitalOcean waits for this before marking deployment successful
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 20
      success_threshold: 1
      failure_threshold: 5
    
    # HTTP configuration
    http_port: 8080
    
    # Routes
    routes:
      - path: /
    
    #
    # ENVIRONMENT VARIABLES
    # All secrets are configured in DigitalOcean App Platform console
    #
    envs:
      #
      # Core Environment
      #
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      
      - key: SOLANA_NETWORK
        value: mainnet-beta
        scope: RUN_AND_BUILD_TIME
      
      - key: PORT
        value: "8080"
        scope: RUN_AND_BUILD_TIME
      
      - key: HOST
        value: 0.0.0.0
        scope: RUN_AND_BUILD_TIME
      
      - key: LOG_LEVEL
        value: info
        scope: RUN_AND_BUILD_TIME
      
      #
      # Solana RPC Configuration
      #
      - key: SOLANA_RPC_URL
        type: SECRET
        scope: RUN_TIME
      
      - key: SOLANA_RPC_URL_FALLBACK
        value: https://api.mainnet-beta.solana.com
        scope: RUN_TIME
      
      - key: SOLANA_RPC_TIMEOUT
        value: "30000"
        scope: RUN_TIME
      
      - key: SOLANA_RPC_RETRIES
        value: "3"
        scope: RUN_TIME
      
      - key: SOLANA_RPC_HEALTH_CHECK_INTERVAL
        value: "30000"
        scope: RUN_TIME
      
      #
      # PRODUCTION Program Configuration
      #
      - key: MAINNET_PROD_PROGRAM_ID
        type: SECRET
        scope: RUN_TIME
      
      - key: ESCROW_PROGRAM_ID
        type: SECRET
        scope: RUN_TIME
      
      #
      # PRODUCTION Wallet Configuration
      #
      - key: MAINNET_PROD_ADMIN_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_ADMIN_ADDRESS
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_FEE_COLLECTOR_PRIVATE_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: MAINNET_PROD_FEE_COLLECTOR_ADDRESS
        type: SECRET
        scope: RUN_TIME
      
      #
      # Token Configuration (Official Circle USDC Mainnet)
      #
      - key: MAINNET_PROD_USDC_MINT_ADDRESS
        value: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        scope: RUN_TIME
      
      - key: USDC_MINT_ADDRESS
        value: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        scope: RUN_TIME
      
      #
      # Database Configuration
      #
      - key: DATABASE_URL
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      
      - key: DATABASE_POOL_URL
        type: SECRET
        scope: RUN_TIME
      
      - key: DATABASE_POOL_SIZE
        value: "20"
        scope: RUN_TIME
      
      - key: DATABASE_POOL_TIMEOUT
        value: "30"
        scope: RUN_TIME
      
      #
      # Redis Configuration
      #
      - key: REDIS_URL
        type: SECRET
        scope: RUN_TIME
      
      #
      # Platform Fee Configuration
      #
      - key: PLATFORM_FEE_BPS
        value: "100"
        scope: RUN_TIME
      
      #
      # Monitoring & Health Checks
      #
      - key: MONITORING_ENDPOINT
        value: https://api.easyescrow.ai/health
        scope: RUN_TIME
      
      - key: HEALTH_CHECK_ENABLED
        value: "true"
        scope: RUN_TIME
      
      - key: HEALTH_CHECK_PATH
        value: /health
        scope: RUN_TIME
      
      - key: ENABLE_DEPOSIT_MONITORING
        value: "true"
        scope: RUN_TIME
      
      - key: DEPOSIT_POLL_INTERVAL_MS
        value: "10000"
        scope: RUN_TIME
      
      - key: TRANSACTION_CONFIRMATION_TIMEOUT
        value: "60000"
        scope: RUN_TIME
      
      #
      # JWT Configuration
      #
      - key: JWT_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: JWT_EXPIRATION
        value: 24h
        scope: RUN_TIME
      
      #
      # API Rate Limiting
      #
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
        scope: RUN_TIME
      
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
        scope: RUN_TIME
      
      #
      # CORS Configuration
      #
      - key: CORS_ORIGIN
        value: https://easyescrow.ai,https://www.easyescrow.ai
        scope: RUN_TIME
      
      #
      # Webhook Configuration
      #
      - key: WEBHOOK_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: WEBHOOK_MAX_RETRIES
        value: "5"
        scope: RUN_TIME
      
      - key: WEBHOOK_RETRY_DELAY
        value: "5000"
        scope: RUN_TIME
      
      #
      # Feature Flags
      #
      - key: ENABLE_WEBHOOKS
        value: "true"
        scope: RUN_TIME
      
      - key: ENABLE_RATE_LIMITING
        value: "true"
        scope: RUN_TIME
      
      - key: ENABLE_REQUEST_LOGGING
        value: "true"
        scope: RUN_TIME
      
      #
      # Swagger/Documentation (Disabled in production)
      #
      - key: ENABLE_SWAGGER
        value: "false"
        scope: RUN_TIME
      
      - key: SWAGGER_PATH
        value: /api/docs
        scope: RUN_TIME
      
      #
      # Monitoring & Analytics
      #
      - key: SENTRY_DSN
        type: SECRET
        scope: RUN_TIME
      
      - key: SENTRY_ENVIRONMENT
        value: production
        scope: RUN_TIME
      
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
        scope: RUN_TIME
      
      #
      # Email Configuration
      #
      - key: SMTP_HOST
        type: SECRET
        scope: RUN_TIME
      
      - key: SMTP_PORT
        value: "587"
        scope: RUN_TIME
      
      - key: SMTP_USER
        type: SECRET
        scope: RUN_TIME
      
      - key: SMTP_PASS
        type: SECRET
        scope: RUN_TIME
      
      - key: SMTP_FROM
        value: noreply@easyescrow.ai
        scope: RUN_TIME
      
      #
      # S3/Spaces Configuration
      #
      - key: DO_SPACES_ENDPOINT
        value: https://sgp1.digitaloceanspaces.com
        scope: RUN_TIME
      
      - key: DO_SPACES_BUCKET
        value: easyescrow-production
        scope: RUN_TIME
      
      - key: DO_SPACES_KEY
        type: SECRET
        scope: RUN_TIME
      
      - key: DO_SPACES_SECRET
        type: SECRET
        scope: RUN_TIME
      
      - key: DO_SPACES_REGION
        value: sgp1
        scope: RUN_TIME
      
      #
      # Logging Configuration
      #
      - key: LOG_FORMAT
        value: json
        scope: RUN_TIME
      
      - key: LOG_MAX_SIZE
        value: 20m
        scope: RUN_TIME
      
      - key: LOG_MAX_FILES
        value: "14"
        scope: RUN_TIME
      
      #
      # Notification Configuration
      #
      - key: SLACK_WEBHOOK
        type: SECRET
        scope: BUILD_TIME
      
      - key: DISCORD_WEBHOOK
        type: SECRET
        scope: BUILD_TIME

# Custom Domain Configuration
domains:
  - domain: api.easyescrow.ai
    type: PRIMARY

# Alerts
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: DEPLOYMENT_LIVE

