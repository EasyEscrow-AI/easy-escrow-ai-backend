# Kubernetes Deployment Configuration for EasyEscrow.ai Backend
# This is an example configuration - customize for your needs

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: easyescrow-config
  namespace: default
data:
  NODE_ENV: "production"
  PORT: "3000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SOLANA_COMMITMENT: "confirmed"
  SOLANA_NETWORK: "mainnet-beta"
  MONITORING_ENABLED: "true"
  MONITORING_INTERVAL_MS: "30000"
  EXPIRY_CHECK_INTERVAL_MS: "60000"
  AUTO_PROCESS_REFUNDS: "true"
  REFUND_BATCH_SIZE: "10"
  WEBHOOK_ENABLED: "true"
  WEBHOOK_MAX_RETRIES: "3"
  CORS_ENABLED: "true"
  HELMET_ENABLED: "true"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

---
# Secret for sensitive data (create using kubectl or external secret manager)
# kubectl create secret generic easyescrow-secrets \
#   --from-literal=database-url="postgresql://..." \
#   --from-literal=jwt-secret="..." \
#   --from-literal=redis-password="..." \
#   --from-literal=api-key="..."
apiVersion: v1
kind: Secret
metadata:
  name: easyescrow-secrets
  namespace: default
type: Opaque
# data:
#   database-url: <base64-encoded>
#   jwt-secret: <base64-encoded>
#   redis-password: <base64-encoded>
#   api-key: <base64-encoded>
#   solana-rpc-url: <base64-encoded>
#   escrow-program-id: <base64-encoded>
#   usdc-mint-address: <base64-encoded>
#   allowed-origins: <base64-encoded>
#   allowed-usdc-amounts: <base64-encoded>

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: easyescrow-backend
  namespace: default
  labels:
    app: easyescrow-backend
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: easyescrow-backend
  template:
    metadata:
      labels:
        app: easyescrow-backend
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Service account for RBAC
      serviceAccountName: easyescrow-backend
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      # Init container for database migrations
      initContainers:
      - name: migrate
        image: your-registry.com/easyescrow-backend:v1.0.0
        command: ["npx", "prisma", "migrate", "deploy"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: database-url
      
      # Main application container
      containers:
      - name: backend
        image: your-registry.com/easyescrow-backend:v1.0.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: easyescrow-config
        
        # Sensitive environment variables from Secret
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: jwt-secret
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: redis-password
              optional: true
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: api-key
        - name: SOLANA_RPC_URL
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: solana-rpc-url
        - name: ESCROW_PROGRAM_ID
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: escrow-program-id
        - name: USDC_MINT_ADDRESS
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: usdc-mint-address
        - name: ALLOWED_ORIGINS
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: allowed-origins
        - name: ALLOWED_USDC_AMOUNTS
          valueFrom:
            secretKeyRef:
              name: easyescrow-secrets
              key: allowed-usdc-amounts
        
        # Resource limits and requests
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        
        # Startup probe - gives the app time to start
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 12  # 120 seconds total
        
        # Liveness probe - restart if unhealthy
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        
        # Readiness probe - remove from load balancer if not ready
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Set to true if app doesn't write to filesystem
          capabilities:
            drop:
            - ALL
        
        # Volume mounts (if needed)
        # volumeMounts:
        # - name: logs
        #   mountPath: /app/logs
      
      # Volumes (if needed)
      # volumes:
      # - name: logs
      #   emptyDir: {}
      
      # Affinity rules (for high availability)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - easyescrow-backend
              topologyKey: kubernetes.io/hostname

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: easyescrow-backend
  namespace: default
  labels:
    app: easyescrow-backend
spec:
  type: LoadBalancer
  selector:
    app: easyescrow-backend
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: None

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: easyescrow-backend-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: easyescrow-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: easyescrow-backend
  namespace: default

---
# NetworkPolicy (optional - adjust based on your needs)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: easyescrow-backend-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: easyescrow-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443   # HTTPS (for Solana RPC)
    - protocol: TCP
      port: 80    # HTTP

---
# PodDisruptionBudget (for high availability)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: easyescrow-backend-pdb
  namespace: default
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: easyescrow-backend

