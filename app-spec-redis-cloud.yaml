alerts:
- rule: DEPLOYMENT_FAILED
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: api-dev
    match:
      path:
        prefix: /
name: easyescrow-backend-dev
region: sgp
services:
- dockerfile_path: Dockerfile
  envs:
  - key: NODE_ENV
    scope: RUN_TIME
    value: development
  - key: PORT
    scope: RUN_TIME
    value: "3000"
  - key: SOLANA_NETWORK
    scope: RUN_TIME
    value: devnet
  - key: SOLANA_COMMITMENT
    scope: RUN_TIME
    value: confirmed
  - key: MONITORING_ENABLED
    scope: RUN_TIME
    value: "true"
  - key: WEBHOOK_ENABLED
    scope: RUN_TIME
    value: "false"
  - key: CORS_ENABLED
    scope: RUN_TIME
    value: "true"
  - key: HELMET_ENABLED
    scope: RUN_TIME
    value: "false"
  - key: LOG_LEVEL
    scope: RUN_TIME
    value: debug
  - key: PLATFORM_FEE_BPS
